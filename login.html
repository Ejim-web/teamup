<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
  getAuth, 
  signInWithEmailAndPassword, 
  createUserWithEmailAndPassword 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

const email = document.querySelector("input[type='email']");
const password = document.querySelector("input[type='password']");

// LOGIN
window.login = async function () {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
    window.location.href = "index.html";
  } catch (err) {
    alert(err.message);
  }
};

// SIGN UP (🔥 THIS IS THE IMPORTANT PART)
window.signup = async function () {
  try {
    const userCred = await createUserWithEmailAndPassword(
      auth,
      email.value,
      password.value
    );

    // ✅ SAVE USER TO FIRESTORE
    await setDoc(doc(db, "users", userCred.user.uid), {
      email: userCred.user.email,
      name: userCred.user.email.split("@")[0],
      photo: ""
    });

    alert("Account created!");
    window.location.href = "index.html";
  } catch (err) {
    alert(err.message);
  }
};
      </script>
