<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>TeamUp Global – Real App</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Firebase SDKs (modular) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion, arrayRemove, onSnapshot, collection, query, where, getDocs, addDoc, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Firebase config (yours)
    const firebaseConfig = {
      apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
      authDomain: "teamup-68a21.firebaseapp.com",
      projectId: "teamup-68a21",
      storageBucket: "teamup-68a21.firebasestorage.app",
      messagingSenderId: "379106762572",
      appId: "1:379106762572:web:a1537754ed17d3a60339e9",
      measurementId: "G-EJ59MW0TMC"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Global state
    let currentUser = null;
    let currentUserProfile = null;
    let unsubscribeSwipes = null;
    let unsubscribeMatches = null;
    let activeChatListener = null;

    // DOM elements
    const loginScreen = document.getElementById('loginScreen');
    const mainApp = document.getElementById('mainApp');
    const userEmailSpan = document.getElementById('userEmailDisplay');
    const errorMsgDiv = document.getElementById('errorMsg');
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const loginBtn = document.getElementById('loginBtn');
    const signupBtn = document.getElementById('signupBtn');
    const showLoginLink = document.getElementById('showLoginLink');
    const logoutBtn = document.getElementById('logoutBtn');
    const contentArea = document.getElementById('contentArea');
    const notificationBell = document.getElementById('notificationBell');
    const notificationBadge = document.getElementById('notificationBadge');
    const matchesBadge = document.getElementById('matchesBadge');

    // Helper: show toast
    function showToast(message, duration = 3000) {
      let toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerText = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), duration);
    }

    // Load user profile from Firestore
    async function loadUserProfile(uid) {
      const docRef = doc(db, "users", uid);
      const docSnap = await getDoc(docRef);
      if (docSnap.exists()) {
        currentUserProfile = docSnap.data();
        return currentUserProfile;
      } else {
        // Create default profile
        const defaultProfile = {
          email: currentUser.email,
          name: currentUser.email.split('@')[0],
          bio: "Edit your bio...",
          avatar: "👤",
          gender: "other",
          preference: "everyone",
          location: "Unknown",
          lastActive: new Date().toISOString()
        };
        await setDoc(docRef, defaultProfile);
        currentUserProfile = defaultProfile;
        return defaultProfile;
      }
    }

    // Get all users except current and already liked/matched
    async function getAvailableProfiles() {
      const usersSnapshot = await getDocs(collection(db, "users"));
      const users = [];
      usersSnapshot.forEach(doc => {
        if (doc.id !== currentUser.uid) users.push({ uid: doc.id, ...doc.data() });
      });
      // Get already liked (outgoing likes)
      const userRef = doc(db, "users", currentUser.uid);
      const userSnap = await getDoc(userRef);
      const outgoingLikes = userSnap.data()?.likes || [];
      const matches = userSnap.data()?.matches || [];
      const filtered = users.filter(u => !outgoingLikes.includes(u.uid) && !matches.includes(u.uid));
      // Apply gender preference
      const pref = currentUserProfile.preference || "everyone";
      if (pref === "men") return filtered.filter(u => u.gender === "male");
      if (pref === "women") return filtered.filter(u => u.gender === "female");
      return filtered;
    }

    // Render swipe card
    let currentProfileIndex = 0;
    let availableProfiles = [];
    let swipeContainer = null;

    async function renderSwipeCard() {
      if (!swipeContainer) return;
      if (currentProfileIndex >= availableProfiles.length) {
        swipeContainer.innerHTML = `<div class="no-profiles">✨ No more new people nearby ✨</div>`;
        return;
      }
      const profile = availableProfiles[currentProfileIndex];
      const card = document.createElement('div');
      card.className = 'card';
      card.setAttribute('data-uid', profile.uid);
      card.innerHTML = `
        <div class="card-img">${profile.avatar || '👤'}</div>
        <div class="card-info">
          <h3>${profile.name || 'User'}, ${profile.age || '?'}</h3>
          <div class="location"><i class="fas fa-map-marker-alt"></i> ${profile.location || 'Unknown'}</div>
          <div class="last-active"><i class="fas fa-circle" style="font-size:10px; color:#22c55e;"></i> Online</div>
          <div class="stats-row"><span><i class="fas fa-futbol"></i> TeamUp</span></div>
          <p style="margin-top:12px;">${profile.bio || ''}</p>
        </div>
      `;
      swipeContainer.innerHTML = '';
      swipeContainer.appendChild(card);
      attachSwipeEvents(card);
    }

    function attachSwipeEvents(card) {
      let startX = 0, currentX = 0, isDragging = false;
      const onStart = (e) => {
        e.preventDefault();
        const clientX = e.type === 'mousedown' ? e.clientX : e.touches[0].clientX;
        startX = clientX;
        isDragging = true;
        card.style.transition = 'none';
      };
      const onMove = (e) => {
        if (!isDragging) return;
        const clientX = e.type === 'mousemove' ? e.clientX : e.touches[0].clientX;
        const deltaX = clientX - startX;
        const rotate = deltaX / 20;
        currentX = deltaX;
        card.style.transform = `translateX(${deltaX}px) rotate(${rotate}deg)`;
        card.style.opacity = 1 - Math.abs(deltaX) / 300;
      };
      const onEnd = () => {
        if (!isDragging) return;
        isDragging = false;
        const threshold = 120;
        if (Math.abs(currentX) > threshold) {
          if (currentX > 0) swipeRight();
          else swipeLeft();
        } else {
          card.style.transition = 'transform 0.3s ease';
          card.style.transform = '';
          card.style.opacity = '';
        }
        currentX = 0;
      };
      card.addEventListener('mousedown', onStart);
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onEnd);
      card.addEventListener('touchstart', onStart);
      card.addEventListener('touchmove', onMove);
      card.addEventListener('touchend', onEnd);
    }

    async function swipeLeft() {
      if (!swipeContainer?.firstChild) return;
      const card = swipeContainer.firstChild;
      card.style.transition = 'transform 0.3s ease';
      card.style.transform = 'translateX(-400px) rotate(-30deg)';
      card.style.opacity = '0';
      setTimeout(() => {
        currentProfileIndex++;
        renderSwipeCard();
      }, 300);
    }

    async function swipeRight() {
      if (!swipeContainer?.firstChild) return;
      const card = swipeContainer.firstChild;
      const likedUid = card.getAttribute('data-uid');
      const profile = availableProfiles[currentProfileIndex];
      // Send like (add to current user's likes array)
      const userRef = doc(db, "users", currentUser.uid);
      await updateDoc(userRef, {
        likes: arrayUnion(likedUid)
      });
      // Check if mutual (if liked user already liked current user)
      const likedUserRef = doc(db, "users", likedUid);
      const likedSnap = await getDoc(likedUserRef);
      const likedUserLikes = likedSnap.data()?.likes || [];
      if (likedUserLikes.includes(currentUser.uid)) {
        // It's a match! Add to both users' matches
        await updateDoc(userRef, {
          matches: arrayUnion(likedUid)
        });
        await updateDoc(likedUserRef, {
          matches: arrayUnion(currentUser.uid)
        });
        showToast(`✨ It's a match! You and ${profile.name} can now chat. ✨`, 4000);
        // Also create a chat room? We'll derive messages from match UIDs.
      } else {
        showToast(`👍 You liked ${profile.name}!`, 1500);
      }
      // Animate and next
      card.style.transition = 'transform 0.3s ease';
      card.style.transform = 'translateX(400px) rotate(30deg)';
      card.style.opacity = '0';
      setTimeout(() => {
        currentProfileIndex++;
        renderSwipeCard();
      }, 300);
    }

    async function loadSwipeScreen() {
      availableProfiles = await getAvailableProfiles();
      currentProfileIndex = 0;
      contentArea.innerHTML = `
        <div class="swipe-container" id="swipeContainer"></div>
        <div class="swipe-buttons">
          <button class="btn-pass" id="passBtn"><i class="fas fa-times"></i></button>
          <button class="btn-like" id="likeBtn"><i class="fas fa-heart"></i></button>
        </div>
      `;
      swipeContainer = document.getElementById('swipeContainer');
      if (availableProfiles.length === 0) {
        swipeContainer.innerHTML = `<div class="no-profiles">No profiles matching your preference. Update your settings in Profile.</div>`;
      } else {
        renderSwipeCard();
      }
      document.getElementById('passBtn').onclick = () => swipeLeft();
      document.getElementById('likeBtn').onclick = () => swipeRight();
    }

    // Matches screen (show matched users and last message preview)
    async function loadMatchesScreen() {
      const userRef = doc(db, "users", currentUser.uid);
      const userSnap = await getDoc(userRef);
      const matches = userSnap.data()?.matches || [];
      if (matches.length === 0) {
        contentArea.innerHTML = `<div class="no-profiles">💬 No matches yet. Swipe right to find teammates!</div>`;
        return;
      }
      let html = `<div class="people-list">`;
      for (const matchUid of matches) {
        const matchSnap = await getDoc(doc(db, "users", matchUid));
        const matchData = matchSnap.data();
        // Get last message (we'll listen in real time)
        const messagesRef = collection(db, "messages");
        const q = query(messagesRef, where("participants", "array-contains", currentUser.uid), orderBy("timestamp", "desc"));
        const msgsSnap = await getDocs(q);
        let lastMsg = "Say hi!";
        for (const msgDoc of msgsSnap.docs) {
          const msg = msgDoc.data();
          if (msg.participants.includes(matchUid)) {
            lastMsg = msg.sender === currentUser.uid ? `You: ${msg.text}` : `${matchData.name}: ${msg.text}`;
            break;
          }
        }
        html += `
          <div class="person-card" data-uid="${matchUid}">
            <div class="person-avatar">${matchData.avatar || '👤'}</div>
            <div class="person-info">
              <strong>${matchData.name || 'User'} <span class="online-indicator"></span></strong>
              <div class="last-message">${lastMsg}</div>
            </div>
          </div>
        `;
      }
      html += `</div>`;
      contentArea.innerHTML = html;
      document.querySelectorAll('.person-card').forEach(el => {
        el.addEventListener('click', () => openChat(el.getAttribute('data-uid')));
      });
    }

    // Open chat with real-time listener
    let currentChatPartner = null;
    async function openChat(partnerUid) {
      if (activeChatListener) activeChatListener();
      const partnerSnap = await getDoc(doc(db, "users", partnerUid));
      const partner = partnerSnap.data();
      contentArea.innerHTML = `
        <div class="chat-view">
          <div class="chat-header">
            <button id="backToMatches" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">←</button>
            <div class="person-avatar" style="width:48px; height:48px;">${partner.avatar || '👤'}</div>
            <strong>${partner.name}</strong>
          </div>
          <div class="chat-messages" id="chatMessages"></div>
          <div class="chat-input">
            <input type="text" id="chatInput" placeholder="Message...">
            <button id="sendMsgBtn"><i class="fas fa-paper-plane"></i></button>
          </div>
        </div>
      `;
      document.getElementById('backToMatches').onclick = () => loadMatchesScreen();

      const messagesRef = collection(db, "messages");
      const q = query(messagesRef, where("participants", "array-contains", currentUser.uid), orderBy("timestamp", "asc"));
      activeChatListener = onSnapshot(q, (snapshot) => {
        const chatDiv = document.getElementById('chatMessages');
        if (!chatDiv) return;
        const relevant = [];
        snapshot.forEach(doc => {
          const msg = doc.data();
          if (msg.participants.includes(partnerUid)) {
            relevant.push(msg);
          }
        });
        chatDiv.innerHTML = relevant.map(msg => `
          <div class="message ${msg.sender === currentUser.uid ? 'me' : 'other'}">
            ${msg.text}
            <div style="font-size:0.65rem; opacity:0.7; margin-top:4px;">${new Date(msg.timestamp?.toDate()).toLocaleTimeString()}</div>
          </div>
        `).join('');
        chatDiv.scrollTop = chatDiv.scrollHeight;
      });

      const sendBtn = document.getElementById('sendMsgBtn');
      const input = document.getElementById('chatInput');
      const send = async () => {
        const text = input.value.trim();
        if (!text) return;
        await addDoc(collection(db, "messages"), {
          text,
          sender: currentUser.uid,
          participants: [currentUser.uid, partnerUid],
          timestamp: serverTimestamp()
        });
        input.value = '';
      };
      sendBtn.onclick = send;
      input.addEventListener('keypress', (e) => { if (e.key === 'Enter') send(); });
    }

    // Profile editor
    async function loadProfileScreen() {
      const profile = currentUserProfile;
      contentArea.innerHTML = `
        <div class="profile-editor">
          <div class="profile-pic" id="avatarPicker">${profile.avatar || '👤'}</div>
          <input type="text" id="profileName" placeholder="Name" value="${(profile.name || '').replace(/"/g, '&quot;')}">
          <textarea id="profileBio" placeholder="Bio" rows="3">${profile.bio || ''}</textarea>
          <div class="row-2cols">
            <select id="profileGender">
              <option value="male" ${profile.gender === 'male' ? 'selected' : ''}>Male</option>
              <option value="female" ${profile.gender === 'female' ? 'selected' : ''}>Female</option>
              <option value="non-binary" ${profile.gender === 'non-binary' ? 'selected' : ''}>Non-binary</option>
              <option value="other" ${profile.gender === 'other' ? 'selected' : ''}>Other</option>
            </select>
            <select id="profilePreference">
              <option value="everyone" ${profile.preference === 'everyone' ? 'selected' : ''}>Show Everyone</option>
              <option value="men" ${profile.preference === 'men' ? 'selected' : ''}>Show Men</option>
              <option value="women" ${profile.preference === 'women' ? 'selected' : ''}>Show Women</option>
            </select>
          </div>
          <button class="save-profile-btn" id="saveProfileBtn">Save Profile</button>
          <div class="location-info" id="locationDisplay"><i class="fas fa-spinner fa-spin"></i> Getting location...</div>
        </div>
      `;
      // Avatar cycle
      const avatars = ['👤', '😎', '🏃', '⚽', '🏀', '🎾', '🏋️', '🧘'];
      let avatarIndex = avatars.indexOf(profile.avatar);
      if (avatarIndex === -1) avatarIndex = 0;
      const avatarEl = document.getElementById('avatarPicker');
      avatarEl.onclick = () => {
        avatarIndex = (avatarIndex + 1) % avatars.length;
        avatarEl.innerText = avatars[avatarIndex];
      };
      document.getElementById('saveProfileBtn').onclick = async () => {
        const newName = document.getElementById('profileName').value;
        const newBio = document.getElementById('profileBio').value;
        const newAvatar = avatarEl.innerText;
        const newGender = document.getElementById('profileGender').value;
        const newPreference = document.getElementById('profilePreference').value;
        const userRef = doc(db, "users", currentUser.uid);
        await updateDoc(userRef, {
          name: newName,
          bio: newBio,
          avatar: newAvatar,
          gender: newGender,
          preference: newPreference,
          lastActive: new Date().toISOString()
        });
        currentUserProfile = { ...currentUserProfile, name: newName, bio: newBio, avatar: newAvatar, gender: newGender, preference: newPreference };
        showToast('Profile saved!', 1500);
        if (document.querySelector('.tab.active')?.getAttribute('data-tab') === 'swipe') loadSwipeScreen();
      };
      // Simple geolocation (get city via free API)
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(async (pos) => {
          const { latitude, longitude } = pos.coords;
          try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=10`);
            const data = await res.json();
            const city = data.address?.city || data.address?.town || "Unknown";
            document.getElementById('locationDisplay').innerHTML = `<i class="fas fa-map-marker-alt"></i> ${city}`;
            await updateDoc(doc(db, "users", currentUser.uid), { location: city });
          } catch {
            document.getElementById('locationDisplay').innerHTML = `<i class="fas fa-map-marker-alt"></i> ${latitude.toFixed(1)}, ${longitude.toFixed(1)}`;
          }
        }, () => {
          document.getElementById('locationDisplay').innerHTML = `<i class="fas fa-map-marker-alt"></i> Location access denied.`;
        });
      } else {
        document.getElementById('locationDisplay').innerHTML = `<i class="fas fa-map-marker-alt"></i> Geolocation not supported.`;
      }
    }

    // Notification badge (unread chats + new matches)
    // Simplified: count pending matches not viewed? For brevity, we'll update when matches change.
    async function updateNotificationBadges() {
      const userRef = doc(db, "users", currentUser.uid);
      const userSnap = await getDoc(userRef);
      const matches = userSnap.data()?.matches || [];
      const viewedMatches = JSON.parse(localStorage.getItem(`viewedMatches_${currentUser.uid}`) || '[]');
      const newMatches = matches.filter(m => !viewedMatches.includes(m));
      matchesBadge.style.display = newMatches.length ? 'flex' : 'none';
      matchesBadge.innerText = newMatches.length;
      notificationBadge.style.display = (newMatches.length) ? 'flex' : 'none';
      notificationBadge.innerText = newMatches.length;
    }

    // Mark matches as seen when entering matches tab
    function markMatchesSeen() {
      if (!currentUser) return;
      const matches = currentUserProfile?.matches || [];
      localStorage.setItem(`viewedMatches_${currentUser.uid}`, JSON.stringify(matches));
      updateNotificationBadges();
    }

    // Auth state listener
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        await loadUserProfile(user.uid);
        loginScreen.style.display = 'none';
        mainApp.style.display = 'flex';
        userEmailSpan.innerText = user.email;
        await updateNotificationBadges();
        // Ensure matches are loaded
        loadSwipeScreen();
        // Start listener for new matches
        const userRef = doc(db, "users", currentUser.uid);
        onSnapshot(userRef, (docSnap) => {
          if (docSnap.exists()) {
            currentUserProfile = docSnap.data();
            updateNotificationBadges();
          }
        });
      } else {
        loginScreen.style.display = 'flex';
        mainApp.style.display = 'none';
        currentUser = null;
        if (activeChatListener) activeChatListener();
        availableProfiles = [];
        currentProfileIndex = 0;
      }
    });

    // Login / Signup
    function showError(msg) {
      errorMsgDiv.innerText = msg;
      setTimeout(() => errorMsgDiv.innerText = '', 3000);
    }
    loginBtn.onclick = async () => {
      const email = loginEmail.value.trim();
      const pwd = loginPassword.value.trim();
      if (!email || !pwd) return showError('Enter email and password');
      try {
        await signInWithEmailAndPassword(auth, email, pwd);
      } catch (err) {
        showError(err.message);
      }
    };
    signupBtn.onclick = async () => {
      const email = loginEmail.value.trim();
      const pwd = loginPassword.value.trim();
      if (!email || !pwd) return showError('Enter email and password');
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, pwd);
        // Create default profile in Firestore
        await setDoc(doc(db, "users", cred.user.uid), {
          email: email,
          name: email.split('@')[0],
          bio: "New to TeamUp!",
          avatar: "👤",
          gender: "other",
          preference: "everyone",
          location: "Unknown",
          likes: [],
          matches: [],
          lastActive: new Date().toISOString()
        });
        showError('Account created! Logging in...');
      } catch (err) {
        showError(err.message);
      }
    };
    showLoginLink.onclick = (e) => { e.preventDefault(); loginBtn.click(); };
    logoutBtn.onclick = async () => { await signOut(auth); };

    // Tab switching
    const tabs = document.querySelectorAll('.tab');
    tabs.forEach(tab => {
      tab.addEventListener('click', async () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const tabName = tab.getAttribute('data-tab');
        if (tabName === 'swipe') loadSwipeScreen();
        else if (tabName === 'matches') {
          markMatchesSeen();
          loadMatchesScreen();
        } else if (tabName === 'profile') loadProfileScreen();
      });
    });
    notificationBell.onclick = () => showToast(`You have new activities`, 2000);
  </script>

<body>
<div class="app-container">
  <div id="loginScreen" class="login-screen">
    <div class="custom-logo"><span>TU</span></div>
    <h1>TeamUp Global</h1>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button id="loginBtn">Login</button>
    <button id="signupBtn">Create Account</button>
    <div id="errorMsg" class="error-msg"></div>
    <p>Already have an account? <a href="#" id="showLoginLink">Login</a></p>
  </div>
  <div id="mainApp">
    <div class="app-header">
      <h2>TeamUp Global</h2>
      <div class="header-actions">
        <span class="user-email" id="userEmailDisplay"></span>
        <div class="right-icons">
          <div class="notification-bell" id="notificationBell"><i class="fas fa-bell"></i><span class="notification-badge" id="notificationBadge" style="display:none;">0</span></div>
          <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
      </div>
    </div>
    <div class="content-area" id="contentArea"></div>
    <div class="tab-bar">
      <div class="tab active" data-tab="swipe"><i class="fas fa-fire"></i></div>
      <div class="tab" data-tab="matches"><i class="fas fa-comment-dots"></i><span class="badge" id="matchesBadge" style="display:none;">0</span></div>
      <div class="tab" data-tab="profile"><i class="fas fa-user"></i></div>
    </div>
  </div>
</div>
</body>
</html>
