<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f2f2;
    }

    header {
      background: #176b5c;
      color: white;
      text-align: center;
      padding: 20px;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .logout {
      background: red;
      color: white;
      margin-top: 10px;
    }

    .section {
      padding: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 12px 0;
      border-radius: 12px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }

    .add-btn {
      background: #176b5c;
      color: white;
      margin-top: 10px;
    }

    .pending {
      background: #ccc;
      color: #555;
      margin-top: 10px;
    }

    .accept-btn {
      background: green;
      color: white;
      margin-right: 5px;
    }

    .reject-btn {
      background: red;
      color: white;
    }
  </style>
</head>

<body>

<header>
  <h2>TeamUp Global</h2>
  <button class="logout" onclick="logout()">Logout</button>
</header>

<div class="section">
  <h3>Friend Requests</h3>
  <div id="requests"></div>
</div>

<div class="section">
  <h3>All Users</h3>
  <div id="users"></div>
</div>

<div class="section">
  <h3>Friends</h3>
  <div id="friends"></div>
</div>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUserId = null;

// ✅ AUTH CHECK
firebase.auth().onAuthStateChanged(user => {
  if(user){
    currentUserId = user.uid;
    loadUsers();
    loadRequests();
    loadFriends();
  } else {
    window.location.href = "index.html";
  }
});

// ✅ LOAD USERS
async function loadUsers(){
  const usersDiv = document.getElementById("users");
  usersDiv.innerHTML = "";

  const snapshot = await db.collection("users").get();

  for (const doc of snapshot.docs) {
    if(doc.id === currentUserId) continue;

    const data = doc.data();

    const name = data.name || "No Name";
    const email = data.email || "No Email";

    // check if already sent request
    const req = await db.collection("friendRequests")
      .where("from", "==", currentUserId)
      .where("to", "==", doc.id)
      .get();

    let button = `<button class="add-btn" onclick="addFriend('${doc.id}')">Add Friend</button>`;

    if(!req.empty){
      button = `<button class="pending">Pending ⏳</button>`;
    }

    usersDiv.innerHTML += `
      <div class="card">
        <b>${name}</b><br>
        <small>${email}</small><br>
        ${button}
      </div>
    `;
  }
}

// ✅ SEND REQUEST
function addFriend(userId){
  db.collection("friendRequests").add({
    from: currentUserId,
    to: userId,
    status: "pending"
  }).then(()=>{
    loadUsers();
  });
}

// ✅ LOAD FRIEND REQUESTS
async function loadRequests(){
  const reqDiv = document.getElementById("requests");
  reqDiv.innerHTML = "";

  const snapshot = await db.collection("friendRequests")
    .where("to", "==", currentUserId)
    .where("status", "==", "pending")
    .get();

  for (const doc of snapshot.docs) {
    const data = doc.data();

    const userDoc = await db.collection("users").doc(data.from).get();
    const user = userDoc.data();

    reqDiv.innerHTML += `
      <div class="card">
        <b>${user.name || "User"}</b><br><br>
        <button class="accept-btn" onclick="acceptRequest('${doc.id}', '${data.from}')">Accept</button>
        <button class="reject-btn" onclick="rejectRequest('${doc.id}')">Reject</button>
      </div>
    `;
  }
}

// ✅ ACCEPT REQUEST
function acceptRequest(reqId, senderId){
  db.collection("friends").add({
    users: [currentUserId, senderId]
  });

  db.collection("friendRequests").doc(reqId).update({
    status: "accepted"
  });

  loadRequests();
  loadFriends();
}

// ✅ REJECT
function rejectRequest(reqId){
  db.collection("friendRequests").doc(reqId).delete();
  loadRequests();
}

// ✅ LOAD FRIENDS
async function loadFriends(){
  const div = document.getElementById("friends");
  div.innerHTML = "";

  const snapshot = await db.collection("friends").get();

  for (const doc of snapshot.docs) {
    const users = doc.data().users;

    if(users.includes(currentUserId)){
      const friendId = users.find(id => id !== currentUserId);

      const userDoc = await db.collection("users").doc(friendId).get();
      const user = userDoc.data();

      div.innerHTML += `
        <div class="card">
          <b>${user.name || "No Name"}</b><br>
          <small>${user.email || ""}</small>
        </div>
      `;
    }
  }
}

// ✅ LOGOUT
function logout(){
  firebase.auth().signOut().then(()=>{
    window.location.href = "index.html";
  });
}
</script>

</body>
</html>
