<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f2f2;
    }

    header {
      background: #176b5c;
      color: white;
      text-align: center;
      padding: 20px;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .logout {
      background: red;
      color: white;
      margin-top: 10px;
    }

    .section {
      padding: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .add-btn {
      background: #176b5c;
      color: white;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>
  <h2>TeamUp Global</h2>
  <button class="logout" onclick="logout()">Logout</button>
</header>

<div class="section">
  <h3>All Users</h3>
  <div id="users">Loading...</div>
</div>

<div class="section">
  <h3>Friends</h3>
  <div id="friends"></div>
</div>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
    authDomain: "teamup-68a21.firebaseapp.com",
    projectId: "teamup-68a21",
    storageBucket: "teamup-68a21.appspot.com",
    messagingSenderId: "379106762572",
    appId: "1:379106762572:web:a1537754ed17d3a60339e9",
    measurementId: "G-EJ59MW0TMC"
  };

  firebase.initializeApp(firebaseConfig);

  // 🔥 IMPORTANT: Disable auto login
  firebase.auth().setPersistence(firebase.auth.Auth.Persistence.NONE);

  const db = firebase.firestore();
  let currentUserId = null;

  // ✅ AUTH CHECK
  firebase.auth().onAuthStateChanged(user => {
    if (user) {
      currentUserId = user.uid;
      loadUsers();
    } else {
      window.location.href = "index.html";
    }
  });

  // ✅ LOAD USERS
  function loadUsers() {
    db.collection("users").get()
    .then(snapshot => {
      const usersDiv = document.getElementById("users");
      usersDiv.innerHTML = "";

      snapshot.forEach(doc => {
        if (doc.id === currentUserId) return;

        const data = doc.data();
        const name = data.name || "No Name";
        const email = data.email || "No Email";

        usersDiv.innerHTML += `
          <div class="card">
            <b>${name}</b><br>
            <small>${email}</small><br>
            <button class="add-btn" onclick="addFriend('${doc.id}')">Add Friend</button>
          </div>
        `;
      });

      if (usersDiv.innerHTML === "") {
        usersDiv.innerHTML = "No users found";
      }
    })
    .catch(err => {
      console.error(err);
      document.getElementById("users").innerHTML = "Error loading users";
    });
  }

  // ✅ ADD FRIEND
  function addFriend(userId) {
    db.collection("friendRequests").add({
      from: currentUserId,
      to: userId,
      status: "pending"
    })
    .then(() => {
      alert("Friend request sent");
    })
    .catch(err => {
      console.error(err);
      alert("Error sending request");
    });
  }

  // ✅ FIXED LOGOUT (STRONG VERSION)
  function logout() {
    firebase.auth().signOut()
    .then(() => {
      localStorage.clear();
      sessionStorage.clear();
      window.location.href = "index.html";
    })
    .catch(error => {
      console.error(error);
      alert("Logout failed");
    });
  }
</script>

</body>
  </html>
