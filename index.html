<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 30px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: white;
      color: black;
      padding: 15px;
      margin: 10px 0;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 5px 0;
      border-radius: 20px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 20px;
      border: none;
      background: black;
      color: white;
      margin-top: 10px;
    }

    #emailBox {
      display: none;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>TeamUp Global</h1>

  <div class="btn" onclick="googleLogin()">
    Continue with Google
  </div>

  <div class="btn" onclick="phoneLogin()">
    Continue with Phone Number
  </div>

  <div class="btn" onclick="showEmail()">
    Continue with Email
  </div>

  <div id="emailBox">
    <input id="name" placeholder="Full Name">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="emailAuth()">Continue</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ✅ YOUR ORIGINAL CONFIG (NOT CHANGED)
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

// SHOW EMAIL FORM
window.showEmail = function () {
  document.getElementById("emailBox").style.display = "block";
};

// GOOGLE LOGIN
window.googleLogin = async function () {
  try {
    const provider = new GoogleAuthProvider();
    const result = await signInWithPopup(auth, provider);

    await setDoc(doc(db, "users", result.user.uid), {
      name: result.user.displayName || "User",
      email: result.user.email,
      uid: result.user.uid
    });

    alert("Google login successful");
  } catch (error) {
    alert("Enable Google sign-in in Firebase");
  }
};

// PHONE LOGIN (LATER)
window.phoneLogin = function () {
  alert("Phone login not ready yet");
};

// EMAIL LOGIN / SIGNUP
window.emailAuth = async function () {
  const name = document.getElementById("name").value || "User";
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const userCred = await createUserWithEmailAndPassword(auth, email, password);

    await setDoc(doc(db, "users", userCred.user.uid), {
      name: name,
      email: email,
      uid: userCred.user.uid
    });

    alert("Signup successful");
  } catch {
    const userCred = await signInWithEmailAndPassword(auth, email, password);

    await setDoc(doc(db, "users", userCred.user.uid), {
      name: name,
      email: email,
      uid: userCred.user.uid
    }, { merge: true });

    alert("Login successful");
  }
};
</script>

</body>
</html>
