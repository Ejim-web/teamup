<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #ece5dd;
    }

    .header {
      background: #075e54;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .section {
      padding: 10px;
      background: #ddd;
      font-weight: bold;
    }

    .chat-item {
      background: white;
      padding: 12px;
      border-bottom: 1px solid #ddd;
      cursor: pointer;
    }

    .chat-item small {
      color: gray;
      float: right;
    }

    #chatBox {
      height: 300px;
      overflow-y: auto;
      padding: 10px;
      background: #e5ddd5;
    }

    .msg {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      max-width: 70%;
    }

    .me {
      background: #dcf8c6;
      margin-left: auto;
    }

    .other {
      background: white;
    }

    input {
      width: 70%;
      padding: 10px;
      margin: 10px;
      border-radius: 20px;
      border: none;
    }

    button {
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #25d366;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="header">TeamUp Global</div>

<div id="auth">
  <input id="name" placeholder="Name"><br>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">

  <p id="welcome"></p>

  <div class="section">Chats</div>
  <div id="chatList"></div>

  <div class="section">Start New Chat</div>
  <div id="usersList"></div>

  <h3 id="chatTitle"></h3>
  <div id="chatBox"></div>

  <input id="message" placeholder="Type message">
  <button onclick="sendMessage()">Send</button>

  <br><br>
  <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  doc,
  setDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 YOUR CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const nameInput = document.getElementById("name");
const email = document.getElementById("email");
const password = document.getElementById("password");
const usersList = document.getElementById("usersList");
const chatList = document.getElementById("chatList");
const chatBox = document.getElementById("chatBox");
const message = document.getElementById("message");
const welcome = document.getElementById("welcome");
const chatTitle = document.getElementById("chatTitle");

let currentUser;
let selectedUser;
let unsubscribe;

/* AUTH */
window.signup = async () => {
  const cred = await createUserWithEmailAndPassword(auth, email.value, password.value);
  await setDoc(doc(db, "users", cred.user.uid), {
    name: nameInput.value || cred.user.email,
    email: cred.user.email
  });
};

window.login = () => {
  signInWithEmailAndPassword(auth, email.value, password.value);
};

onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";
    welcome.innerText = "Welcome " + user.email;
    loadUsers();
    loadChatList();
  }
});

/* USERS (for new chat) */
async function loadUsers() {
  const snap = await getDocs(collection(db, "users"));
  usersList.innerHTML = "";

  snap.forEach(d => {
    if (d.id === currentUser.uid) return;

    const data = d.data();
    const div = document.createElement("div");
    div.className = "chat-item";
    div.innerText = data.name || data.email;

    div.onclick = () => openChat(d.id, data.name);

    usersList.appendChild(div);
  });
}

/* CHAT LIST */
async function loadChatList() {
  const snap = await getDocs(collection(db, "chats"));
  chatList.innerHTML = "";

  snap.forEach(d => {
    const data = d.data();

    if (!data.participants.includes(currentUser.uid)) return;

    const otherUser = data.participants.find(u => u !== currentUser.uid);

    const div = document.createElement("div");
    div.className = "chat-item";

    div.innerHTML = `
      ${otherUser}
      <small>${data.lastMessage || ""}</small>
    `;

    div.onclick = () => openChat(otherUser, otherUser);

    chatList.appendChild(div);
  });
}

/* OPEN CHAT */
function openChat(uid, name) {
  selectedUser = uid;
  chatTitle.innerText = "Chat with " + name;
  loadMessages();
}

/* SEND MESSAGE */
window.sendMessage = async () => {
  if (!selectedUser) return alert("Select user");

  const text = message.value.trim();
  if (!text) return;

  const chatId = [currentUser.uid, selectedUser].sort().join("_");

  await setDoc(doc(db, "chats", chatId), {
    participants: [currentUser.uid, selectedUser],
    lastMessage: text,
    updatedAt: Date.now()
  }, { merge: true });

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text,
    sender: currentUser.uid,
    createdAt: Date.now()
  });

  message.value = "";
  loadChatList(); // refresh chat list
};

/* LOAD MESSAGES */
function loadMessages() {
  const chatId = [currentUser.uid, selectedUser].sort().join("_");

  if (unsubscribe) unsubscribe();

  const q = query(collection(db, "chats", chatId, "messages"), orderBy("createdAt"));

  unsubscribe = onSnapshot(q, snap => {
    chatBox.innerHTML = "";

    snap.forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "msg " + (data.sender === currentUser.uid ? "me" : "other");
      div.innerText = data.text;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

/* LOGOUT */
window.logout = () => signOut(auth);
</script>

</body>
</html>
