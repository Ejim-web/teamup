<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f2f2;
    }

    header {
      background: #176b5c;
      color: white;
      text-align: center;
      padding: 20px;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .logout {
      background: red;
      color: white;
      margin-top: 10px;
    }

    .section {
      padding: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .add-btn {
      background: #176b5c;
      color: white;
      margin-top: 10px;
    }

    .pending {
      background: gray;
      color: white;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>
  <h2>TeamUp Global</h2>
  <button class="logout" onclick="logout()">Logout</button>
</header>

<div class="section">
  <h3>Friend Requests</h3>
  <div id="requests"></div>
</div>

<div class="section">
  <h3>All Users</h3>
  <div id="users"></div>
</div>

<div class="section">
  <h3>Friends</h3>
  <div id="friends"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9"
};

firebase.initializeApp(firebaseConfig);
firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);

const db = firebase.firestore();
let currentUserId = null;

firebase.auth().onAuthStateChanged(user => {
  if (!user) {
    window.location.replace("index.html");
    return;
  }

  currentUserId = user.uid;
  loadUsers();
  loadRequests();
  loadFriends();
});

function loadUsers(){
  db.collection("users").get().then(snapshot => {
    const usersDiv = document.getElementById("users");
    usersDiv.innerHTML = "";

    snapshot.forEach(doc => {
      if(doc.id === currentUserId) return;

      const data = doc.data();
      const name = data.name || "No Name";
      const email = data.email || "No Email";

      // check if request already sent
      db.collection("friendRequests")
      .where("from", "==", currentUserId)
      .where("to", "==", doc.id)
      .get()
      .then(res => {

        let button = `<button class="add-btn" onclick="addFriend('${doc.id}')">Add Friend</button>`;

        if(!res.empty){
          button = `<button class="pending">Pending ⏳</button>`;
        }

        usersDiv.innerHTML += `
          <div class="card">
            <b>${name}</b><br>
            <small>${email}</small><br>
            ${button}
          </div>
        `;
      });
    });
  });
}

function addFriend(userId){
  db.collection("friendRequests").add({
    from: currentUserId,
    to: userId,
    status: "pending"
  }).then(() => {
    alert("Request sent");
    loadUsers();
  });
}

function loadRequests(){
  db.collection("friendRequests")
  .where("to", "==", currentUserId)
  .where("status", "==", "pending")
  .get()
  .then(snapshot => {
    const reqDiv = document.getElementById("requests");
    reqDiv.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      db.collection("users").doc(data.from).get().then(userDoc => {
        const user = userDoc.data();

        reqDiv.innerHTML += `
          <div class="card">
            <b>${user.name || "No Name"}</b><br>
            <button onclick="acceptRequest('${doc.id}')">Accept</button>
          </div>
        `;
      });
    });
  });
}

function acceptRequest(id){
  db.collection("friendRequests").doc(id).update({
    status: "accepted"
  }).then(() => {
    loadRequests();
    loadFriends();
  });
}

function loadFriends(){
  db.collection("friendRequests")
  .where("status", "==", "accepted")
  .get()
  .then(snapshot => {
    const friendsDiv = document.getElementById("friends");
    friendsDiv.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      if(data.from === currentUserId || data.to === currentUserId){
        const friendId = data.from === currentUserId ? data.to : data.from;

        db.collection("users").doc(friendId).get().then(userDoc => {
          const user = userDoc.data();

          friendsDiv.innerHTML += `
            <div class="card">
              <b>${user.name || "No Name"}</b><br>
              <small>${user.email || ""}</small>
            </div>
          `;
        });
      }
    });
  });
}

function logout(){
  firebase.auth().signOut()
  .then(() => {
    window.location.replace("index.html");
  })
  .catch(err => {
    console.error(err);
    alert("Logout failed");
  });
}
</script>

</body>
</html>
