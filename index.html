<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 20px auto;
      border-radius: 50%;
      background: white;
      color: #ff4b2b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
    }

    button {
      padding: 12px;
      border-radius: 20px;
      border: none;
      background: white;
      color: #ff4b2b;
      font-weight: bold;
      margin: 10px;
    }

    #users {
      margin: 10px;
    }

    .user {
      background: rgba(255,255,255,0.2);
      padding: 10px;
      border-radius: 15px;
      margin: 5px;
      cursor: pointer;
    }

    #chatBox {
      height: 250px;
      overflow-y: auto;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      margin: 10px;
      padding: 10px;
    }

    .message {
      padding: 10px;
      margin: 5px;
      border-radius: 15px;
      max-width: 70%;
      display: inline-block;
    }

    .me {
      background: white;
      color: #ff4b2b;
      float: right;
    }

    .other {
      background: rgba(255,255,255,0.6);
      color: black;
      float: left;
    }

    .input-area {
      display: flex;
      margin: 10px;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
    }
  </style>
</head>

<body>

<div class="logo">TG</div>
<h2>TeamUp Global</h2>

<div id="auth">
  <button onclick="login()">Continue with Google</button>
</div>

<div id="app" style="display:none;">

  <h3 id="welcome"></h3>

  <div id="users"></div>

  <div id="chatSection" style="display:none;">
    <h4 id="chatWith"></h4>

    <div id="chatBox"></div>

    <div class="input-area">
      <input id="message" placeholder="Type message">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <button onclick="logout()">Logout</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithRedirect,
  onAuthStateChanged,
  signOut,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  setDoc,
  doc,
  getDocs,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:b80b61d82df788cc0339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const provider = new GoogleAuthProvider();

let currentUser;
let selectedUserId;

const authDiv = document.getElementById("auth");
const appDiv = document.getElementById("app");
const usersDiv = document.getElementById("users");
const chatBox = document.getElementById("chatBox");
const message = document.getElementById("message");
const chatSection = document.getElementById("chatSection");
const chatWith = document.getElementById("chatWith");

// 🔥 KEEP USER LOGGED IN
setPersistence(auth, browserLocalPersistence);

// LOGIN
window.login = async () => {
  await signInWithRedirect(auth, provider);
};

// AUTH STATE (MAIN FIX)
onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;

    authDiv.style.display = "none";
    appDiv.style.display = "block";

    document.getElementById("welcome").innerText =
      "Welcome " + (user.displayName || user.email);

    // SAVE USER
    await setDoc(doc(db, "users", user.uid), {
      name: user.displayName || user.email
    });

    loadUsers();

  } else {
    authDiv.style.display = "block";
    appDiv.style.display = "none";
  }
});

// LOAD USERS
async function loadUsers() {
  const snapshot = await getDocs(collection(db, "users"));
  usersDiv.innerHTML = "<h4>Users</h4>";

  snapshot.forEach(docSnap => {
    if (docSnap.id === currentUser.uid) return;

    const data = docSnap.data();

    const div = document.createElement("div");
    div.className = "user";
    div.innerText = data.name;

    div.onclick = () => openChat(docSnap.id, data.name);

    usersDiv.appendChild(div);
  });
}

// OPEN CHAT
function openChat(userId, name) {
  selectedUserId = userId;
  chatSection.style.display = "block";
  chatWith.innerText = "Chat with " + name;

  loadMessages();
}

// SEND MESSAGE
window.sendMessage = async () => {
  if (!message.value) return;

  const chatId = [currentUser.uid, selectedUserId].sort().join("_");

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text: message.value,
    sender: currentUser.uid,
    createdAt: serverTimestamp()
  });

  message.value = "";
};

// LOAD MESSAGES
function loadMessages() {
  const chatId = [currentUser.uid, selectedUserId].sort().join("_");

  const q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("createdAt")
  );

  onSnapshot(q, snapshot => {
    chatBox.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className =
        "message " + (data.sender === currentUser.uid ? "me" : "other");

      div.innerText = data.text;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

// LOGOUT
window.logout = () => signOut(auth);
</script>

</body>
</html>
