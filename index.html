<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 30px auto 10px;
      border-radius: 50%;
      background: white;
      color: #ff4b2b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
    }

    input {
      padding: 12px;
      border-radius: 20px;
      border: none;
      margin: 5px;
      width: 80%;
    }

    button {
      padding: 14px 20px;
      border-radius: 25px;
      border: none;
      background: white;
      color: #ff4b2b;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    #chatBox {
      height: 300px;
      overflow-y: auto;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 10px;
      margin: 20px;
    }

    .message {
      display: flex;
      align-items: center;
      margin: 5px 0;
    }

    .msgText {
      padding: 10px;
      border-radius: 20px;
      max-width: 60%;
    }

    .me .msgText {
      background: white;
      color: #ff4b2b;
      margin-left: auto;
    }

    .other .msgText {
      background: rgba(255,255,255,0.6);
      color: black;
      margin-right: auto;
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      margin: 0 5px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="logo">TG</div>
<h1>TeamUp Global</h1>

<!-- LOGIN -->
<div id="auth">
  <button onclick="googleLogin()">Continue with Google</button>
</div>

<!-- PROFILE SETUP -->
<div id="setup" class="hidden">
  <h3>Complete Your Profile</h3>
  <input id="fullname" placeholder="Full Name"><br>
  <input id="dob" type="date"><br>
  <input id="location" placeholder="Location"><br>
  <button onclick="saveProfile()">Continue</button>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <p id="welcome"></p>

  <div id="chatBox"></div>

  <input id="message" placeholder="Type message">
  <button onclick="sendMessage()">Send</button>

  <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithRedirect,
  getRedirectResult,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:b80b61d82df788cc0339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const provider = new GoogleAuthProvider();

const authDiv = document.getElementById("auth");
const setupDiv = document.getElementById("setup");
const appDiv = document.getElementById("app");

const chatBox = document.getElementById("chatBox");
const message = document.getElementById("message");
const welcome = document.getElementById("welcome");

let currentUser;

/* LOGIN */
window.googleLogin = async () => {
  await signInWithRedirect(auth, provider);
};

getRedirectResult(auth).catch(()=>{});

/* AUTH CHECK */
onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;

    const userRef = doc(db, "users", user.uid);
    const snap = await getDoc(userRef);

    if (!snap.exists()) {
      authDiv.style.display = "none";
      setupDiv.style.display = "block";
    } else {
      startApp(snap.data());
    }
  }
});

/* SAVE PROFILE */
window.saveProfile = async () => {
  const name = document.getElementById("fullname").value;
  const dob = document.getElementById("dob").value;
  const location = document.getElementById("location").value;

  if (!name || !dob || !location) {
    alert("Fill everything");
    return;
  }

  const data = {
    name,
    dob,
    location,
    photo: currentUser.photoURL || ""
  };

  await setDoc(doc(db, "users", currentUser.uid), data);

  startApp(data);
};

/* START APP */
function startApp(userData) {
  authDiv.style.display = "none";
  setupDiv.style.display = "none";
  appDiv.style.display = "block";

  welcome.innerText = "Welcome " + userData.name;

  loadMessages();
}

/* SEND MESSAGE */
window.sendMessage = async () => {
  if (!message.value) return;

  await addDoc(collection(db, "messages"), {
    text: message.value,
    user: currentUser.uid,
    createdAt: serverTimestamp()
  });

  message.value = "";
};

/* LOAD CHAT */
function loadMessages() {
  const q = query(collection(db, "messages"), orderBy("createdAt"));

  onSnapshot(q, snap => {
    chatBox.innerHTML = "";

    snap.forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "message " + (data.user === currentUser.uid ? "me" : "other");

      const text = document.createElement("div");
      text.className = "msgText";
      text.innerText = data.text;

      div.appendChild(text);
      chatBox.appendChild(div);
    });
  });
}

/* LOGOUT */
window.logout = () => signOut(auth);
</script>

</body>
</html>
