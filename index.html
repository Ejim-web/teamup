<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 20px auto;
      border-radius: 50%;
      background: white;
      color: #ff4b2b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      cursor: pointer;
      overflow: hidden;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    input {
      width: 80%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 20px;
      border: none;
    }

    button {
      padding: 12px;
      border-radius: 20px;
      border: none;
      background: white;
      color: #ff4b2b;
      font-weight: bold;
    }

    #chatBox {
      height: 250px;
      overflow-y: auto;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 10px;
      margin: 10px;
    }

    .message {
      padding: 10px;
      margin: 5px;
      border-radius: 20px;
      max-width: 70%;
      display: inline-block;
      clear: both;
    }

    .me { background: white; color: #ff4b2b; float: right; }
    .other { background: rgba(255,255,255,0.6); color: black; float: left; }

    .input-area {
      display: flex;
      margin: 10px;
      gap: 5px;
    }

    .input-area input { flex: 1; }
  </style>
</head>

<body>

<input type="file" id="profileInput" style="display:none">

<div class="logo" onclick="profileInput.click()">
  <img id="profileImage" style="display:none;">
  <span id="initials">TG</span>
</div>

<h2>TeamUp Global</h2>

<div id="auth">
  <input id="username" placeholder="Username">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <p id="welcome"></p>

  <input id="chatUser" placeholder="Enter username to chat">
  <button onclick="startChat()">Start Chat</button>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="message">
    <button onclick="sendMessage()">Send</button>
  </div>

  <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth, createUserWithEmailAndPassword,
  signInWithEmailAndPassword, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore, collection, addDoc, query, orderBy,
  onSnapshot, serverTimestamp, doc, setDoc, getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ✅ YOUR ORIGINAL CONFIG (UNCHANGED)
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:b80b61d82df788cc0339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// DOM
const usernameInput = document.getElementById("username");
const email = document.getElementById("email");
const password = document.getElementById("password");
const message = document.getElementById("message");
const welcome = document.getElementById("welcome");
const chatBox = document.getElementById("chatBox");
const authDiv = document.getElementById("auth");
const appDiv = document.getElementById("app");

let currentUser;
let currentChatId = null;

// SIGNUP
window.signup = async () => {
  try {
    const userCred = await createUserWithEmailAndPassword(auth, email.value, password.value);

    await setDoc(doc(db, "users", userCred.user.uid), {
      username: usernameInput.value
    });

  } catch (e) {
    alert(e.message);
  }
};

// LOGIN
window.login = () => {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

// AUTH STATE
onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;

    const snap = await getDoc(doc(db, "users", user.uid));
    currentUser.username = snap.data()?.username || user.email;

    authDiv.style.display = "none";
    appDiv.style.display = "block";
    welcome.innerText = "Welcome " + currentUser.username;

  } else {
    authDiv.style.display = "block";
    appDiv.style.display = "none";
  }
});

// START CHAT
window.startChat = () => {
  const other = document.getElementById("chatUser").value;
  if (!other) return alert("Enter username");

  currentChatId = [currentUser.username, other].sort().join("_");
  loadMessages();
};

// SEND MESSAGE
window.sendMessage = async () => {
  if (!currentChatId) return alert("Start chat first");

  await addDoc(collection(db, "chats", currentChatId, "messages"), {
    text: message.value,
    user: currentUser.username,
    createdAt: serverTimestamp()
  });

  message.value = "";
};

// LOAD MESSAGES
function loadMessages() {
  const q = query(
    collection(db, "chats", currentChatId, "messages"),
    orderBy("createdAt")
  );

  onSnapshot(q, snap => {
    chatBox.innerHTML = "";

    snap.forEach(doc => {
      const data = doc.data();
      const div = document.createElement("div");

      div.className = "message " +
        (data.user === currentUser.username ? "me" : "other");

      div.innerText = data.text;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

window.logout = () => signOut(auth);

// PROFILE IMAGE (LOCAL ONLY)
const profileInput = document.getElementById("profileInput");
const profileImage = document.getElementById("profileImage");
const initials = document.getElementById("initials");

profileInput.onchange = e => {
  const reader = new FileReader();
  reader.onload = () => {
    profileImage.src = reader.result;
    profileImage.style.display = "block";
    initials.style.display = "none";
    localStorage.setItem("pic", reader.result);
  };
  reader.readAsDataURL(e.target.files[0]);
};

window.onload = () => {
  const pic = localStorage.getItem("pic");
  if (pic) {
    profileImage.src = pic;
    profileImage.style.display = "block";
    initials.style.display = "none";
  }
};
</script>

</body>
</html>
