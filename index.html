<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    .header {
      text-align: center;
      padding: 20px;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: auto;
      border-radius: 50%;
      background: #ff4b2b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 24px;
    }

    input {
      width: 80%;
      padding: 12px;
      margin: 8px;
      border-radius: 20px;
      border: none;
    }

    button {
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      background: #ff4b2b;
      color: white;
      cursor: pointer;
    }

    #chatBox {
      height: 300px;
      overflow-y: auto;
      padding: 10px;
    }

    .message {
      margin: 5px;
      padding: 10px;
      border-radius: 20px;
      max-width: 70%;
    }

    .me {
      background: #ff4b2b;
      margin-left: auto;
    }

    .other {
      background: #555;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 10px;
    }
  </style>
</head>

<body>

<div class="header">
  <div class="logo">TG</div>
  <h2>TeamUp Global</h2>
</div>

<div id="auth" style="text-align:center;">
  <input type="text" id="name" placeholder="Full Name"><br>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <div class="topbar">
    <span id="welcome"></span>
    <button onclick="logout()">Logout</button>
  </div>

  <div id="chatBox"></div>

  <input id="message" placeholder="Type message">
  <button onclick="sendMessage()">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:b80b61d82df788cc0339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;
let currentName = "";

const nameInput = document.getElementById("name");
const email = document.getElementById("email");
const password = document.getElementById("password");
const message = document.getElementById("message");
const welcome = document.getElementById("welcome");
const chatBox = document.getElementById("chatBox");

window.signup = async function () {
  if (!nameInput.value) {
    alert("Enter your full name");
    return;
  }

  currentName = nameInput.value;

  await createUserWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

window.login = function () {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";

    welcome.innerText = "Hi, " + (currentName || user.email);

    loadMessages();
  } else {
    document.getElementById("auth").style.display = "block";
    document.getElementById("app").style.display = "none";
  }
});

window.sendMessage = async function () {
  if (!message.value) return;

  await addDoc(collection(db, "messages"), {
    text: message.value,
    user: currentUser.email,
    name: currentName || currentUser.email,
    createdAt: serverTimestamp()
  });

  message.value = "";
};

function loadMessages() {
  const q = query(collection(db, "messages"), orderBy("createdAt"));

  onSnapshot(q, snapshot => {
    chatBox.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "message " + (data.user === currentUser.email ? "me" : "other");

      div.innerText = (data.name || data.user) + ": " + data.text;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

window.logout = function () {
  signOut(auth);
};
</script>

</body>
</html>
