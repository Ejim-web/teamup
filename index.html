<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #ece5dd;
    }

    header {
      background: #075e54;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .welcome {
      padding: 10px;
      background: #ddd;
      font-weight: bold;
    }

    .form {
      padding: 15px;
      background: #fff;
    }

    .form input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 25px;
      border: none;
      background: #eee;
    }

    .form button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: none;
      border-radius: 25px;
      background: #25d366;
      color: white;
      font-size: 16px;
    }

    .user {
      display: flex;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid #ddd;
      background: white;
      cursor: pointer;
    }

    .avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: #25d366;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      margin-right: 10px;
    }

    .user-info {
      flex: 1;
    }

    .name {
      font-weight: bold;
    }

    .sub {
      font-size: 12px;
      color: gray;
    }

    #usersList {
      margin-top: 5px;
    }
  </style>
</head>

<body>

<header>TeamUp Global</header>

<div class="welcome" id="welcomeText">
  Welcome Guest
</div>

<div class="form">
  <input type="text" id="name" placeholder="Name">
  <input type="email" id="email" placeholder="Email">

  <button onclick="signUp()">Sign Up</button>
  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>
</div>

<div id="usersList"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ✅ YOUR REAL CONFIG (already correct)
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.firebasestorage.app",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9",
  measurementId: "G-EJ59MW0TMC"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===== AUTH =====

window.signUp = async () => {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();

  if (!email) return alert("Enter email");

  await addDoc(collection(db, "users"), {
    name: name || "User",
    email: email
  });

  localStorage.setItem("userEmail", email);
  alert("Account created!");
  location.reload();
};

window.login = () => {
  const email = document.getElementById("email").value.trim();

  if (!email) return alert("Enter email");

  localStorage.setItem("userEmail", email);
  location.reload();
};

window.logout = () => {
  localStorage.clear();
  location.reload();
};

// ===== LOAD USERS =====

async function loadUsers() {
  const usersList = document.getElementById("usersList");
  const currentEmail = localStorage.getItem("userEmail");

  usersList.innerHTML = "Loading users...";

  const snap = await getDocs(collection(db, "users"));

  usersList.innerHTML = "";

  if (snap.empty) {
    usersList.innerHTML = "<p style='padding:10px;'>No users found</p>";
    return;
  }

  snap.forEach(doc => {
    const data = doc.data();

    if (data.email === currentEmail) return;

    const initials = (data.name || data.email)
      .split(" ")
      .map(w => w[0])
      .join("")
      .substring(0, 2)
      .toUpperCase();

    const div = document.createElement("div");
    div.className = "user";

    div.innerHTML = `
      <div class="avatar">${initials}</div>
      <div class="user-info">
        <div class="name">${data.name || data.email}</div>
        <div class="sub">Tap to chat</div>
      </div>
    `;

    div.onclick = () => {
      localStorage.setItem("chatUserEmail", data.email);
      localStorage.setItem("chatUserName", data.name || data.email);
      window.location.href = "chat.html";
    };

    usersList.appendChild(div);
  });
}

// ===== INIT =====

const currentEmail = localStorage.getItem("userEmail");

document.getElementById("welcomeText").innerText =
  currentEmail ? "Welcome " + currentEmail : "Welcome Guest";

if (currentEmail) loadUsers();

</script>

</body>
</html>
