<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    .logo {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: #ff4b2b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      margin: 20px auto;
    }

    h1 {
      text-align: center;
    }

    #auth {
      text-align: center;
      margin-top: 40px;
    }

    input {
      width: 80%;
      padding: 12px;
      margin: 8px;
      border-radius: 20px;
      border: none;
    }

    button {
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      margin: 5px;
      background: #ff4b2b;
      color: white;
    }

    #chatBox {
      padding: 10px;
      height: 350px;
      overflow-y: auto;
    }

    .message {
      padding: 10px;
      border-radius: 20px;
      margin: 5px;
      max-width: 70%;
    }

    .me {
      background: #ff4b2b;
      margin-left: auto;
    }

    .other {
      background: #444;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: rgba(0,0,0,0.3);
    }

    .input-area {
      display: flex;
      padding: 10px;
    }

    .input-area input {
      flex: 1;
    }
  </style>
</head>

<body>

<div class="logo">TG</div>
<h1>TeamUp Global</h1>

<div id="auth">
  <!-- ✅ NEW: FULL NAME INPUT -->
  <input type="text" id="fullname" placeholder="Full Name"><br>

  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <div class="topbar">
    <span id="welcome"></span>
    <button onclick="logout()">Logout</button>
  </div>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="message" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:b80b61d82df788cc0339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const fullname = document.getElementById("fullname");
const email = document.getElementById("email");
const password = document.getElementById("password");
const message = document.getElementById("message");

const chatBox = document.getElementById("chatBox");
const welcome = document.getElementById("welcome");

const authDiv = document.getElementById("auth");
const appDiv = document.getElementById("app");

let currentUser;
let currentName = "";

/* ✅ SIGNUP (SAVE NAME TO FIRESTORE) */
window.signup = async function () {
  const userCred = await createUserWithEmailAndPassword(auth, email.value, password.value);

  await setDoc(doc(db, "users", userCred.user.uid), {
    name: fullname.value,
    email: email.value
  });
};

/* ✅ LOGIN */
window.login = function () {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

/* ✅ AUTH STATE */
onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;

    authDiv.style.display = "none";
    appDiv.style.display = "block";

    // ✅ GET NAME FROM DATABASE
    const docSnap = await getDoc(doc(db, "users", user.uid));
    if (docSnap.exists()) {
      currentName = docSnap.data().name;
    }

    welcome.innerText = "Hi, " + currentName;

    loadMessages();
  } else {
    authDiv.style.display = "block";
    appDiv.style.display = "none";
  }
});

/* ✅ SEND MESSAGE WITH NAME */
window.sendMessage = async function () {
  if (!message.value) return;

  await addDoc(collection(db, "messages"), {
    text: message.value,
    name: currentName,
    createdAt: serverTimestamp()
  });

  message.value = "";
};

/* ✅ LOAD MESSAGES */
function loadMessages() {
  const q = query(collection(db, "messages"), orderBy("createdAt"));

  onSnapshot(q, (snapshot) => {
    chatBox.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");

      div.className = "message " + (data.name === currentName ? "me" : "other");

      div.innerText = data.name + ": " + data.text;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

/* ✅ LOGOUT */
window.logout = function () {
  signOut(auth);
};
</script>

</body>
</html>
