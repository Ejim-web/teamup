<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #ece5dd;
    }

    .header {
      background: #075e54;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 8px;
      border-radius: 20px;
      border: none;
    }

    button {
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #25d366;
      color: white;
      margin: 5px;
      cursor: pointer;
    }

    #usersList div {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      background: white;
      cursor: pointer;
    }

    #chatBox {
      height: 300px;
      overflow-y: auto;
      padding: 10px;
      background: #e5ddd5;
    }

    .msg {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      max-width: 70%;
      font-size: 14px;
    }

    .me {
      background: #dcf8c6;
      margin-left: auto;
    }

    .other {
      background: white;
    }

    .time {
      font-size: 10px;
      color: gray;
      margin-top: 4px;
    }
  </style>
</head>

<body>

<div class="header">TeamUp Global</div>

<div id="auth">
  <input id="name" placeholder="Name">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <p id="welcome"></p>

  <h3>Users</h3>
  <div id="usersList"></div>

  <h3 id="chatTitle"></h3>
  <div id="chatBox"></div>

  <input id="message" placeholder="Type message">
  <button onclick="sendMessage()">Send</button>

  <br>
  <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp,
  doc,
  setDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ✅ FIXED CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9",
  measurementId: "G-EJ59MW0TMC"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const nameInput = document.getElementById("name");
const email = document.getElementById("email");
const password = document.getElementById("password");
const usersList = document.getElementById("usersList");
const chatBox = document.getElementById("chatBox");
const message = document.getElementById("message");
const welcome = document.getElementById("welcome");
const chatTitle = document.getElementById("chatTitle");

let currentUser;
let selectedUser;
let unsubscribe;

/* SIGNUP */
window.signup = async () => {
  try {
    const cred = await createUserWithEmailAndPassword(
      auth,
      email.value.trim(),
      password.value.trim()
    );

    await setDoc(doc(db, "users", cred.user.uid), {
      name: nameInput.value.trim() || cred.user.email,
      email: cred.user.email
    });

    alert("Account created!");
  } catch (e) {
    alert(e.message);
  }
};

/* LOGIN */
window.login = () => {
  signInWithEmailAndPassword(auth, email.value.trim(), password.value.trim())
    .catch(e => alert(e.message));
};

/* AUTH STATE */
onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";
    welcome.innerText = "Welcome " + user.email;
    loadUsers();
  } else {
    document.getElementById("auth").style.display = "block";
    document.getElementById("app").style.display = "none";
  }
});

/* LOAD USERS */
async function loadUsers() {
  const snap = await getDocs(collection(db, "users"));
  usersList.innerHTML = "";

  snap.forEach(d => {
    if (d.id === currentUser.uid) return;

    const data = d.data();
    const div = document.createElement("div");
    div.innerText = data.name || data.email;

    div.onclick = () => openChat(d.id, div.innerText);

    usersList.appendChild(div);
  });
}

/* OPEN CHAT */
function openChat(uid, name) {
  selectedUser = uid;
  chatTitle.innerText = "Chat with " + name;
  loadMessages();
}

/* SEND MESSAGE */
window.sendMessage = async () => {
  if (!selectedUser) return alert("Select a user first");

  const text = message.value.trim();
  if (!text) return;

  const chatId = [currentUser.uid, selectedUser].sort().join("_");

  await setDoc(doc(db, "chats", chatId), {
    participants: [currentUser.uid, selectedUser]
  }, { merge: true });

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text: text,
    senderId: currentUser.uid,
    timestamp: serverTimestamp()
  });

  message.value = "";
};

/* LOAD MESSAGES */
function loadMessages() {
  const chatId = [currentUser.uid, selectedUser].sort().join("_");

  if (unsubscribe) unsubscribe();

  const q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("timestamp")
  );

  unsubscribe = onSnapshot(q, snap => {
    chatBox.innerHTML = "";

    snap.forEach(d => {
      const data = d.data();

      const div = document.createElement("div");
      div.className = "msg " + (data.senderId === currentUser.uid ? "me" : "other");

      const time = data.timestamp?.toDate().toLocaleTimeString();

      div.innerHTML = `
        ${data.text}
        <div class="time">${time || ""}</div>
      `;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

/* LOGOUT */
window.logout = () => signOut(auth);
</script>

</body>
</html>
