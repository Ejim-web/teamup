<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f0f2f5;
    }

    header {
      background: #075E54;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    #welcome {
      padding: 10px;
      background: #ddd;
      font-weight: bold;
    }

    .form {
      padding: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 20px;
      border: none;
      background: #eee;
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 5px 0;
      border: none;
      border-radius: 25px;
      background: #25D366;
      color: white;
      font-size: 16px;
      font-weight: bold;
    }

    #usersList {
      margin-top: 10px;
    }

    .user {
      display: flex;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid #ddd;
      background: white;
      cursor: pointer;
    }

    .user:hover {
      background: #f5f5f5;
    }

    .avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: #25D366;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      margin-right: 12px;
      font-size: 18px;
    }

    .user-info {
      display: flex;
      flex-direction: column;
    }

    .name {
      font-weight: bold;
    }

    .sub {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

<header>TeamUp Global</header>

<div id="welcome">Welcome Guest</div>

<div class="form">
  <input type="text" id="name" placeholder="Name">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="signUp()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="usersList"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    getDocs
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ✅ YOUR FIREBASE CONFIG (UNCHANGED)
  const firebaseConfig = {
    apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
    authDomain: "teamup-68a21.firebaseapp.com",
    projectId: "teamup-68a21",
    storageBucket: "teamup-68a21.firebasestorage.app",
    messagingSenderId: "379106762572",
    appId: "1:379106762572:web:a1537754ed17d3a60339e9",
    measurementId: "G-EJ59MW0TMC"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const usersList = document.getElementById("usersList");
  const welcome = document.getElementById("welcome");
  const form = document.querySelector(".form");

  // ✅ SIGN UP
  window.signUp = async () => {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;

    if (!email) return alert("Enter email");

    await addDoc(collection(db, "users"), {
      name,
      email
    });

    localStorage.setItem("userEmail", email);

    location.reload();
  };

  // ✅ LOGIN
  window.login = async () => {
    const email = document.getElementById("email").value;

    if (!email) return alert("Enter email");

    localStorage.setItem("userEmail", email);

    location.reload();
  };

  // ✅ LOAD USERS (FIXED)
  async function loadUsers() {
    usersList.innerHTML = "";

    const currentEmail = localStorage.getItem("userEmail");

    const snap = await getDocs(collection(db, "users"));

    snap.forEach(doc => {
      const data = doc.data();

      // ❌ REMOVE YOURSELF
      if (data.email === currentEmail) return;

      const div = document.createElement("div");
      div.className = "user";

      const avatar = document.createElement("div");
      avatar.className = "avatar";

      const displayName = data.name || data.email;

      avatar.innerText = displayName.charAt(0).toUpperCase();

      const info = document.createElement("div");
      info.className = "user-info";

      const name = document.createElement("div");
      name.className = "name";
      name.innerText = displayName;

      const sub = document.createElement("div");
      sub.className = "sub";
      sub.innerText = "Tap to chat";

      info.appendChild(name);
      info.appendChild(sub);

      div.appendChild(avatar);
      div.appendChild(info);

      div.onclick = () => {
        localStorage.setItem("chatUserEmail", data.email);
        localStorage.setItem("chatUserName", displayName);
        window.location.href = "chat.html";
      };

      usersList.appendChild(div);
    });
  }

  // ✅ AUTO LOGIN CHECK
  const savedEmail = localStorage.getItem("userEmail");

  if (savedEmail) {
    welcome.innerText = "Welcome " + savedEmail;
    form.style.display = "none"; // 🔥 FIX
    loadUsers();
  } else {
    welcome.innerText = "Welcome Guest";
  }

</script>

</body>
</html>
