async function uploadImageToImgBB(file) {
  const formData = new FormData();
  formData.append("image", file);
  formData.append("key", IMGBB_API_KEY);
  const response = await fetch("https://api.imgbb.com/1/upload", { method:"POST", body:formData });

  if (result.success) return result.data.url;
  else throw new Error(result.error?.message || "Upload failed");
}

function showToast(m,i="❤️"){const e=document.querySelector(".toast");if(e)e.remove();const t=document.createElement("div");t.className="toast",t.innerHTML=`${i} ${m}`,document.body.appendChild(t),setTimeout(()=>t.remove(),3000);}
async function requestNotificationPermission(){if("Notification"in window&&Notification.permission!=="granted"&&!notificationPermissionAsked){notificationPermissionAsked=true;const perm=await Notification.requestPermission();if(perm==="granted")showToast("Notifications enabled!","🔔");}}
function sendNotification(title,body){if("Notification"in window&&Notification.permission==="granted")new Notification(title,{body,icon:"https://ejim-web.github.io/teamup/logo.png"});}
async function setUserOnline(uid,on){try{await updateDoc(doc(db,"users",uid),{online:on,lastSeen:serverTimestamp()});}catch(e){}}
async function createOrUpdateUserProfile(user,name,photoUrl){const ref=doc(db,"users",user.uid),s=await getDoc(ref);if(!s.exists()){await setDoc(ref,{email:user.email,name:name||user.email.split('@')[0],age:null,minAge:18,maxAge:99,gender:null,lookingFor:"Everyone",location:null,bio:"New to TeamUp!",photoIcon:photoUrl?"📸":"🧑",photoUrl:photoUrl||null,online:true,lastSeen:serverTimestamp(),joinDate:serverTimestamp(),likesReceived:0,swipedRight:[],swipedLeft:[],likedBy:[],blockedBy:[],coords:null});}else if(photoUrl&&!s.data().photoUrl){await updateDoc(ref,{photoUrl,photoIcon:"📸"});}}
async function updateLocation(){if(!currentUserId)return;navigator.geolocation.getCurrentPosition(async(pos)=>{const geoPoint=new firebase.firestore.GeoPoint(pos.coords.latitude,pos.coords.longitude);await updateDoc(doc(db,"users",currentUserId),{coords:geoPoint});currentUserCoords={lat:pos.coords.latitude,lng:pos.coords.longitude};},()=>{},{});}
function getDistance(lat1,lon1,lat2,lon2){const R=6371;const dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180,a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
async function blockUser(blockedId){if(!currentUserId)return;await updateDoc(doc(db,"users",currentUserId),{blockedBy:arrayUnion(blockedId)});showToast("User blocked","🚫");refreshContent();if(profileModal.style.display==="flex")profileModal.style.display="none";}
async function undoLastSwipe(){if(!lastSwipe)return showToast("Nothing to undo","↩️");const{userId,liked}=lastSwipe;const userRef=doc(db,"users",currentUserId);if(liked){await updateDoc(userRef,{swipedRight:arrayRemove(userId)});await updateDoc(doc(db,"users",userId),{likedBy:arrayRemove(currentUserId),likesReceived:increment(-1)});showToast("Undid like","↩️");}else{await updateDoc(userRef,{swipedLeft:arrayRemove(userId)});showToast("Undid pass","↩️");}lastSwipe=null;refreshContent();}
async function getAllUsers(uid){const q=query(collection(db,"users"),limit(100)),snap=await getDocs(q),users=[];snap.forEach(d=>{if(d.id!==uid)users.push({id:d.id,...d.data()});});return users;}
async function getSwipeCandidates(uid){const userDoc=await getDoc(doc(db,"users",uid)),userData=userDoc.data();if(!userData)return[];const swipedRight=userData.swipedRight||[],swipedLeft=userData.swipedLeft||[],lookingFor=userData.lookingFor||"Everyone",minAge=userData.minAge||18,maxAge=userData.maxAge||99,blockedBy=userData.blockedBy||[];let all=await getAllUsers(uid);if(lookingFor!=="Everyone")all=all.filter(u=>u.gender===lookingFor);all=all.filter(u=>u.age>=minAge&&u.age<=maxAge);all=all.filter(u=>!blockedBy.includes(u.id));const unseen=all.filter(u=>!swipedRight.includes(u.id)&&!swipedLeft.includes(u.id));const passed=all.filter(u=>swipedLeft.includes(u.id)&&!swipedRight.includes(u.id));const shuffle=arr=>{for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;};return[...shuffle(unseen),...shuffle(passed)];}
async function handleSwipe(swipedUserId,liked){if(!currentUserId)return;const userRef=doc(db,"users",currentUserId);if(!liked){await updateDoc(userRef,{swipedLeft:arrayUnion(swipedUserId)});lastSwipe={userId:swipedUserId,liked:false};showToast("Passed 👎","↪️");return;}await updateDoc(userRef,{swipedRight:arrayUnion(swipedUserId)});await updateDoc(doc(db,"users",swipedUserId),{likedBy:arrayUnion(currentUserId),likesReceived:increment(1)});lastSwipe={userId:swipedUserId,liked:true};const otherDoc=await getDo
