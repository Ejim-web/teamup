<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #e5ddd5;
    }

    header {
      background: #075E54;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .welcome {
      padding: 10px;
      background: #d9d9d9;
      font-weight: bold;
    }

    .upload-box {
      padding: 10px;
      background: #fff;
      display: flex;
      gap: 10px;
    }

    .user {
      display: flex;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid #ddd;
      background: #fff;
      cursor: pointer;
    }

    .user:hover {
      background: #f5f5f5;
    }

    .avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      margin-right: 12px;
      object-fit: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }

    .user-info {
      display: flex;
      flex-direction: column;
    }

    .name {
      font-weight: bold;
    }

    .sub {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

<header>TeamUp Global</header>

<div class="welcome" id="welcome"></div>

<div class="upload-box">
  <input type="file" id="fileInput" accept="image/*">
  <button onclick="uploadImage()">Upload</button>
</div>

<div id="usersList"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.firebasestorage.app",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9",
  measurementId: "G-EJ59MW0TMC"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

/* UI */
const usersList = document.getElementById("usersList");
const welcome = document.getElementById("welcome");

/* FIX WELCOME NULL */
let currentUserEmail = localStorage.getItem("userEmail");

if (!currentUserEmail) {
  currentUserEmail = "Guest";
}

welcome.innerText = "Welcome " + currentUserEmail;

/* COLOR */
function getColor(name) {
  const colors = ["#25D366","#34B7F1","#FF6B6B","#FFA500","#6A5ACD","#20B2AA"];
  return colors[name.charCodeAt(0) % colors.length];
}

/* LOAD USERS */
async function loadUsers() {
  const snap = await getDocs(collection(db, "users"));
  usersList.innerHTML = "";

  snap.forEach(docSnap => {
    const data = docSnap.data();

    if (data.email === currentUserEmail) return;

    const name = data.name || data.email;
    const initials = name.split(" ").map(n => n[0]).join("").toUpperCase();

    const div = document.createElement("div");
    div.className = "user";

    let avatarHTML;

    if (data.photo) {
      avatarHTML = `<img src="${data.photo}" class="avatar">`;
    } else {
      avatarHTML = `
        <div class="avatar" style="background:${getColor(name)}">
          ${initials}
        </div>`;
    }

    div.innerHTML = `
      ${avatarHTML}
      <div class="user-info">
        <div class="name">${name}</div>
        <div class="sub">Tap to chat</div>
      </div>
    `;

    div.onclick = () => {
      localStorage.setItem("chatUserId", docSnap.id);
      localStorage.setItem("chatUserName", name);
      window.location.href = "chat.html";
    };

    usersList.appendChild(div);
  });
}

loadUsers();

/* IMAGE UPLOAD */
window.uploadImage = async function () {
  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Select image first");
    return;
  }

  const fileRef = ref(storage, "profiles/" + Date.now());

  await uploadBytes(fileRef, file);

  const url = await getDownloadURL(fileRef);

  /* SAVE TO FIRESTORE */
  const snap = await getDocs(collection(db, "users"));

  for (const d of snap.docs) {
    if (d.data().email === currentUserEmail) {
      await updateDoc(doc(db, "users", d.id), {
        photo: url
      });
    }
  }

  alert("Profile updated!");
  location.reload();
};

</script>

</body>
</html>
