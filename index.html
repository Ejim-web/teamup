<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #ece5dd;
    }

    header {
      background: #075e54;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .welcome {
      padding: 10px;
      font-weight: bold;
      background: #ddd;
    }

    #users {
      margin-top: 5px;
    }

    .user {
      display: flex;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid #ddd;
      background: white;
      cursor: pointer;
      transition: 0.2s;
    }

    .user:hover {
      background: #f5f5f5;
    }

    .avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      margin-right: 12px;
      object-fit: cover;
      background: #25d366;
    }

    .name {
      font-size: 16px;
      font-weight: bold;
    }

    .sub {
      font-size: 12px;
      color: gray;
    }

    .empty {
      padding: 20px;
      text-align: center;
      color: gray;
    }

    .loading {
      padding: 20px;
      text-align: center;
    }
  </style>
</head>

<body>

<header>TeamUp Global</header>

<div class="welcome" id="welcome">Loading...</div>

<div id="users">
  <div class="loading">Loading users...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ✅ YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9",
  measurementId: "G-EJ59MW0TMC"
};

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const usersDiv = document.getElementById("users");
const welcome = document.getElementById("welcome");

let currentUser = null;

// AUTH CHECK
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  currentUser = user;
  welcome.innerText = "Welcome " + (user.email || "User");

  loadUsers();
});

// LOAD USERS
async function loadUsers() {
  usersDiv.innerHTML = `<div class="loading">Loading users...</div>`;

  try {
    const snap = await getDocs(collection(db, "users"));

    usersDiv.innerHTML = "";

    if (snap.empty) {
      usersDiv.innerHTML = `<div class="empty">No users found</div>`;
      return;
    }

    snap.forEach(doc => {
      if (doc.id === currentUser.uid) return;

      const data = doc.data();

      const name = data.name || data.email || "User";

      const photo = data.photo
        ? data.photo
        : `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=25D366&color=fff`;

      const div = document.createElement("div");
      div.className = "user";

      div.innerHTML = `
        <img class="avatar" src="${photo}" 
        onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(name)}'" />

        <div>
          <div class="name">${name}</div>
          <div class="sub">Tap to chat</div>
        </div>
      `;

      div.onclick = () => {
        localStorage.setItem("chatUserId", doc.id);
        localStorage.setItem("chatUserName", name);
        window.location.href = "chat.html";
      };

      usersDiv.appendChild(div);
    });

  } catch (err) {
    usersDiv.innerHTML = `<div class="empty">Error loading users</div>`;
    console.error(err);
  }
}
</script>

</body>
</html>
