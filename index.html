<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
      text-align: center;
    }

    .logo {
      width: 70px;
      height: 70px;
      margin: 15px auto;
      border-radius: 50%;
      background: white;
      overflow: hidden;
      cursor: pointer;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    input {
      width: 85%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 20px;
      border: none;
    }

    button {
      padding: 10px 15px;
      border-radius: 20px;
      border: none;
      background: white;
      color: #ff4b2b;
      font-weight: bold;
      cursor: pointer;
    }

    #chatList {
      max-height: 200px;
      overflow-y: auto;
      margin: 10px;
    }

    .chatItem {
      background: rgba(255,255,255,0.2);
      padding: 10px;
      border-radius: 15px;
      margin: 5px;
      cursor: pointer;
      text-align: left;
    }

    #chatBox {
      height: 250px;
      overflow-y: auto;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 10px;
      margin: 10px;
    }

    .message {
      padding: 8px;
      margin: 5px;
      border-radius: 15px;
      max-width: 70%;
      display: inline-block;
      clear: both;
    }

    .me { background: white; color: #ff4b2b; float: right; }
    .other { background: rgba(255,255,255,0.6); color: black; float: left; }

    .input-area {
      display: flex;
      gap: 5px;
      margin: 10px;
    }

    .input-area input { flex: 1; }
  </style>
</head>

<body>

<input type="file" id="profileInput" style="display:none">

<div class="logo" onclick="profileInput.click()">
  <img id="profileImage">
</div>

<h2>TeamUp Global</h2>

<div id="auth">
  <input id="username" placeholder="Username">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <p id="welcome"></p>

  <!-- START CHAT -->
  <input id="chatUser" placeholder="Start chat with username">
  <button onclick="startChat()">Start</button>

  <!-- CHAT LIST -->
  <div id="chatList"></div>

  <!-- CHAT -->
  <div id="chatBox"></div>

  <div class="input-area">
    <input id="message">
    <button onclick="sendMessage()">Send</button>
  </div>

  <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth, createUserWithEmailAndPassword,
  signInWithEmailAndPassword, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore, collection, addDoc, query, orderBy,
  onSnapshot, serverTimestamp, doc, setDoc, getDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "YOUR KEY",
  authDomain: "YOUR DOMAIN",
  projectId: "YOUR ID"
});

const auth = getAuth();
const db = getFirestore();

let currentUser;
let currentChatId = null;

// SIGNUP
window.signup = async () => {
  const user = await createUserWithEmailAndPassword(auth, email.value, password.value);

  await setDoc(doc(db, "users", user.user.uid), {
    username: username.value
  });
};

// LOGIN
window.login = () => {
  signInWithEmailAndPassword(auth, email.value, password.value);
};

// AUTH STATE
onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    const snap = await getDoc(doc(db, "users", user.uid));
    currentUser.username = snap.data().username;

    auth.style.display = "none";
    app.style.display = "block";
    welcome.innerText = "Welcome " + currentUser.username;

    loadChats();
  }
});

// START CHAT
window.startChat = async () => {
  const other = chatUser.value;
  const chatId = [currentUser.username, other].sort().join("_");

  currentChatId = chatId;

  await setDoc(doc(db, "chats", chatId), {
    participants: [currentUser.username, other],
    updatedAt: serverTimestamp()
  }, { merge: true });

  loadMessages();
};

// SEND MESSAGE
window.sendMessage = async () => {
  if (!currentChatId) return;

  await addDoc(collection(db, "chats", currentChatId, "messages"), {
    text: message.value,
    user: currentUser.username,
    createdAt: serverTimestamp()
  });

  await updateDoc(doc(db, "chats", currentChatId), {
    lastMessage: message.value,
    updatedAt: serverTimestamp()
  });

  message.value = "";
};

// LOAD CHATS
function loadChats() {
  onSnapshot(collection(db, "chats"), snap => {
    chatList.innerHTML = "";

    snap.forEach(docSnap => {
      const data = docSnap.data();

      if (!data.participants.includes(currentUser.username)) return;

      const other = data.participants.find(u => u !== currentUser.username);

      const div = document.createElement("div");
      div.className = "chatItem";
      div.innerHTML = `<b>${other}</b><br>${data.lastMessage || ""}`;

      div.onclick = () => {
        currentChatId = docSnap.id;
        loadMessages();
      };

      chatList.appendChild(div);
    });
  });
}

// LOAD MESSAGES
function loadMessages() {
  onSnapshot(
    query(collection(db, "chats", currentChatId, "messages"), orderBy("createdAt")),
    snap => {
      chatBox.innerHTML = "";

      snap.forEach(d => {
        const m = d.data();
        const div = document.createElement("div");
        div.className = "message " + (m.user === currentUser.username ? "me" : "other");
        div.innerText = m.text;
        chatBox.appendChild(div);
      });
    }
  );
}

window.logout = () => signOut(auth);

// PROFILE IMAGE
profileInput.onchange = e => {
  const reader = new FileReader();
  reader.onload = () => {
    profileImage.src = reader.result;
    localStorage.setItem("pic", reader.result);
  };
  reader.readAsDataURL(e.target.files[0]);
};

window.onload = () => {
  const pic = localStorage.getItem("pic");
  if (pic) profileImage.src = pic;
};
</script>

</body>
</html>
