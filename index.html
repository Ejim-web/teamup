<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 30px auto;
      border-radius: 50%;
      background: white;
      color: #ff4b2b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
    }

    button {
      padding: 14px;
      border-radius: 25px;
      border: none;
      background: white;
      color: #ff4b2b;
      font-weight: bold;
      margin-top: 10px;
    }

    #users {
      max-height: 120px;
      overflow-y: auto;
      margin: 10px;
    }

    .user {
      background: rgba(255,255,255,0.3);
      padding: 8px;
      margin: 5px;
      border-radius: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user img {
      width: 30px;
      height: 30px;
      border-radius: 50%;
    }

    #chatBox {
      height: 250px;
      overflow-y: auto;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      margin: 10px;
      padding: 10px;
    }

    .message {
      padding: 10px;
      margin: 5px;
      border-radius: 20px;
      max-width: 70%;
      display: inline-block;
      clear: both;
    }

    .me {
      background: white;
      color: #ff4b2b;
      float: right;
    }

    .other {
      background: rgba(255,255,255,0.6);
      color: black;
      float: left;
    }

    .input-area {
      display: flex;
      margin: 10px;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
    }
  </style>
</head>

<body>

<div class="logo">TG</div>
<h1>TeamUp Global</h1>

<div id="auth">
  <button onclick="googleLogin()">Continue with Google</button>
</div>

<div id="app" style="display:none;">
  <p id="welcome"></p>
<button onclick="window.openProfile()">My Profile</button>
  <div id="users"></div>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="message" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
  </div>

  <button onclick="logout()">Logout</button>
</div>
<div id="profilePage" style="display:none;">

  <div style="background:#7c1f2a; padding:20px; color:white;">
    <button onclick="closeProfile()">← Back</button>
    <h2>My Profile</h2>
  </div>

  <div style="background:#eee; padding:20px; text-align:center;">
    
    <img id="profilePic" src="" 
    style="width:100px; height:100px; border-radius:50%;">

    <h2 id="profileName">Name</h2>
    <p>ID: <span id="profileId"></span></p>

  </div>

</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithRedirect,
  getRedirectResult,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp,
  setDoc,
  doc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:b80b61d82df788cc0339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const provider = new GoogleAuthProvider();

const message = document.getElementById("message");
const welcome = document.getElementById("welcome");
const chatBox = document.getElementById("chatBox");
const usersDiv = document.getElementById("users");

const authDiv = document.getElementById("auth");
const appDiv = document.getElementById("app");

let currentUser;
let selectedUserId = null;
let unsubscribeMessages = null;

// 🔐 Login
window.googleLogin = function () {
  signInWithRedirect(auth, provider);
};

getRedirectResult(auth).catch(e => alert(e.message));

// 👤 Auth state
onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;

    authDiv.style.display = "none";
    appDiv.style.display = "block";

    welcome.innerText = "Welcome " + (user.displayName || user.email);

    // ✅ SAVE USER WITH PHOTO (FIXED)
    await setDoc(doc(db, "users", user.uid), {
      name: user.displayName || user.email,
      uid: user.uid,
      photo: user.photoURL || ""
    }, { merge: true });

    loadUsers();

  } else {
    authDiv.style.display = "block";
    appDiv.style.display = "none";
  }
});

// 👥 Load users (with profile picture)
async function loadUsers() {
  usersDiv.innerHTML = "";

  const snap = await getDocs(collection(db, "users"));

  snap.forEach(d => {
    const data = d.data();
    if (data.uid === currentUser.uid) return;

    const div = document.createElement("div");
    div.className = "user";

    const img = document.createElement("img");
    img.src = data.photo || "https://via.placeholder.com/30";

    const name = document.createElement("span");
    name.innerText = data.name;

    div.appendChild(img);
    div.appendChild(name);

    div.onclick = () => {
      selectedUserId = data.uid;
      loadMessages();
    };

    usersDiv.appendChild(div);
  });
}

// 💬 Send message (SAFE)
window.sendMessage = async function () {
  if (!selectedUserId) return alert("Select a user first");
  if (!message.value.trim()) return;

  const chatId = [currentUser.uid, selectedUserId].sort().join("_");

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text: message.value,
    sender: currentUser.uid,
    createdAt: serverTimestamp()
  });

  message.value = "";
};

// 📩 Load messages (FIXED REALTIME + NO DUPLICATE LISTENER)
function loadMessages() {
  const chatId = [currentUser.uid, selectedUserId].sort().join("_");

  if (unsubscribeMessages) unsubscribeMessages();

  const q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("createdAt")
  );

  unsubscribeMessages = onSnapshot(q, snap => {
    chatBox.innerHTML = "";

    snap.forEach(d => {
      const data = d.data();
      const div = document.createElement("div");

      div.className = "message " + (data.sender === currentUser.uid ? "me" : "other");
      div.innerText = data.text;

      chatBox.appendChild(div);
    });

    // ✅ AUTO SCROLL
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}
// 👤 Open Profile
window.openProfile = function () {
  document.getElementById("app").style.display = "none";
  document.getElementById("profilePage").style.display = "block";

  document.getElementById("profileName").innerText =
    currentUser.displayName || currentUser.email;

  document.getElementById("profileId").innerText =
    currentUser.uid;

  document.getElementById("profilePic").src =
    currentUser.photoURL || "https://via.placeholder.com/100";
};

// 🔙 Close Profile
window.closeProfile = function () {
  document.getElementById("profilePage").style.display = "none";
  document.getElementById("app").style.display = "block";
};

// 🚪 Logout (PUT BACK CORRECTLY)
window.logout = () => signOut(auth);
</script>
</body>
</html>
