<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    header {
      background: #0b6b57;
      color: white;
      padding: 15px;
      text-align: center;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .logout {
      background: red;
      color: white;
      margin-top: 10px;
    }

    .card {
      background: white;
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
    }

    .add {
      background: #0b6b57;
      color: white;
    }

    .accept {
      background: green;
      color: white;
    }

    .reject {
      background: red;
      color: white;
    }
  </style>
</head>

<body>

<header>
  <h2>TeamUp Global</h2>
  <button class="logout" onclick="logout()">Logout</button>
</header>

<h3 style="padding:10px;">Friend Requests</h3>
<div id="friendRequests"></div>

<h3 style="padding:10px;">All Users</h3>
<div id="usersList"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.firebasestorage.app",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9",
  measurementId: "G-EJ59MW0TMC"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let currentUserId = null;

// CHECK LOGIN
auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "index.html";
  } else {
    currentUserId = user.uid;
    loadUsers();
    loadRequests();
  }
});

// LOGOUT
function logout() {
  auth.signOut().then(() => {
    window.location.href = "index.html";
  });
}

// LOAD USERS
function loadUsers() {
  db.collection("users").onSnapshot(snapshot => {
    const list = document.getElementById("usersList");
    list.innerHTML = "";

    snapshot.forEach(doc => {
      const user = doc.data();

      if (user.uid !== currentUserId) {
        list.innerHTML += `
          <div class="card">
            <p>${user.name || user.email}</p>
            <button class="add" onclick="sendRequest('${user.uid}')">
              Add Friend
            </button>
          </div>
        `;
      }
    });
  });
}

// SEND REQUEST
function sendRequest(toId) {
  db.collection("friendRequests").add({
    from: currentUserId,
    to: toId,
    status: "pending"
  });

  alert("Friend request sent!");
}

// LOAD FRIEND REQUESTS
function loadRequests() {
  db.collection("friendRequests")
    .where("to", "==", currentUserId)
    .where("status", "==", "pending")
    .onSnapshot(snapshot => {

      const container = document.getElementById("friendRequests");
      container.innerHTML = "";

      snapshot.forEach(doc => {
        const data = doc.data();

        container.innerHTML += `
          <div class="card">
            <p>Request from: ${data.from}</p>
            <button class="accept" onclick="acceptRequest('${doc.id}')">Accept</button>
            <button class="reject" onclick="rejectRequest('${doc.id}')">Reject</button>
          </div>
        `;
      });
    });
}

// ACCEPT
function acceptRequest(id) {
  db.collection("friendRequests").doc(id).update({
    status: "accepted"
  });
}

// REJECT
function rejectRequest(id) {
  db.collection("friendRequests").doc(id).update({
    status: "rejected"
  });
}
</script>

</body>
</html>
