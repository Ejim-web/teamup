<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    #auth {
      text-align: center;
      margin-top: 60px;
    }

    input {
      width: 80%;
      padding: 12px;
      margin: 8px;
      border-radius: 10px;
      border: none;
      background: #1f2937;
      color: white;
    }

    button {
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      background: #ff4b2b;
      color: white;
      margin: 5px;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: #111827;
    }

    #chatBox {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .message {
      padding: 10px;
      margin: 6px;
      border-radius: 12px;
      max-width: 70%;
    }

    .me {
      background: #ff4b2b;
      margin-left: auto;
    }

    .other {
      background: #374151;
      margin-right: auto;
    }

    .input-area {
      display: flex;
      padding: 10px;
      gap: 5px;
      background: #111827;
    }

    .input-area input {
      flex: 1;
    }
  </style>
</head>

<body>

<div id="auth">
  <h2>TeamUp Global</h2>

  <input id="name" placeholder="Full Name"><br>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <div class="topbar">
    <span id="welcome"></span>
    <button onclick="logout()">Logout</button>
  </div>

  <div id="chatBox"></div>

  <!-- ✅ PRIVATE CHAT INPUT -->
  <div class="input-area">
    <input id="receiver" placeholder="Receiver email">
    <input id="message" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp,
  setDoc,
  doc,
  getDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:b80b61d82df788cc0339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;
let currentName = "";
let selectedUserId = "";

// inputs
const nameInput = document.getElementById("name");
const email = document.getElementById("email");
const password = document.getElementById("password");
const message = document.getElementById("message");
const receiver = document.getElementById("receiver");

const chatBox = document.getElementById("chatBox");
const welcome = document.getElementById("welcome");


// ✅ SIGNUP (save full name)
window.signup = async function () {
  if (!nameInput.value) {
    alert("Enter full name");
    return;
  }

  const userCred = await createUserWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));

  if (!userCred) return;

  await setDoc(doc(db, "users", userCred.user.uid), {
    name: nameInput.value,
    email: email.value
  });
};


// ✅ LOGIN
window.login = function () {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};


// ✅ LOAD USER + NAME
onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;

    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "flex";

    const snap = await getDoc(doc(db, "users", user.uid));

    if (snap.exists()) {
      currentName = snap.data().name;
    } else {
      currentName = user.email;
    }

    welcome.innerText = "Hi, " + currentName;

    loadMessages();
  } else {
    document.getElementById("auth").style.display = "block";
    document.getElementById("app").style.display = "none";
  }
});


// ✅ FIND USER BY EMAIL
async function getReceiverId(emailValue) {
  const snap = await getDocs(collection(db, "users"));
  let id = "";

  snap.forEach(docSnap => {
    if (docSnap.data().email === emailValue) {
      id = docSnap.id;
    }
  });

  return id;
}


// ✅ SEND PRIVATE MESSAGE
window.sendMessage = async function () {
  if (!message.value || !receiver.value) {
    alert("Enter message and receiver email");
    return;
  }

  const receiverId = await getReceiverId(receiver.value);

  if (!receiverId) {
    alert("User not found");
    return;
  }

  selectedUserId = receiverId;

  await addDoc(collection(db, "messages"), {
    text: message.value,
    sender: currentUser.uid,
    receiver: receiverId,
    name: currentName,
    createdAt: serverTimestamp()
  });

  message.value = "";
};


// ✅ LOAD PRIVATE MESSAGES ONLY
function loadMessages() {
  const q = query(collection(db, "messages"), orderBy("createdAt"));

  onSnapshot(q, snapshot => {
    chatBox.innerHTML = "";

    snapshot.forEach(docSnap => {
      const data = docSnap.data();

      if (
        (data.sender === currentUser.uid && data.receiver === selectedUserId) ||
        (data.sender === selectedUserId && data.receiver === currentUser.uid)
      ) {
        const div = document.createElement("div");

        div.className =
          "message " + (data.sender === currentUser.uid ? "me" : "other");

        div.innerText = data.name + ": " + data.text;

        chatBox.appendChild(div);
      }
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}


// ✅ LOGOUT
window.logout = function () {
  signOut(auth);
};
</script>

</body>
</html>
