<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f1f1f1;
    }

    header {
      background: #075e54;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    #container {
      display: flex;
      height: 100vh;
      flex-direction: column;
    }

    #auth {
      text-align: center;
      margin-top: 100px;
    }

    input {
      width: 80%;
      padding: 12px;
      margin: 10px;
      border-radius: 20px;
      border: none;
    }

    button {
      padding: 10px 15px;
      border-radius: 20px;
      border: none;
      background: #25d366;
      color: white;
      font-weight: bold;
    }

    #app {
      display: none;
      flex: 1;
      overflow: hidden;
    }

    #chatList, #usersList {
      background: white;
      padding: 10px;
    }

    #chatList div, #usersList div {
      padding: 12px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    #chatBox {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      background: #e5ddd5;
    }

    .msg {
      max-width: 70%;
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
    }

    .me {
      background: #dcf8c6;
      margin-left: auto;
    }

    .other {
      background: white;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: white;
    }

    #inputArea input {
      flex: 1;
    }
  </style>
</head>

<body>

<header>TeamUp Global</header>

<div id="container">

  <!-- AUTH -->
  <div id="auth">
    <input id="name" placeholder="Name"><br>
    <input id="email" placeholder="Email"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
  </div>

  <!-- APP -->
  <div id="app">

    <p id="welcome"></p>

    <h3>Chats</h3>
    <div id="chatList"></div>

    <h3>Start Chat</h3>
    <div id="usersList"></div>

    <h3 id="chatTitle"></h3>

    <div id="chatBox"></div>

    <div id="inputArea">
      <input id="message" placeholder="Type message">
      <button onclick="sendMessage()">Send</button>
    </div>

    <button onclick="logout()">Logout</button>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore, collection, addDoc, query, orderBy,
  onSnapshot, serverTimestamp, doc, setDoc, getDoc, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ✅ YOUR REAL CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9",
  measurementId: "G-EJ59MWCTMC"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* VARIABLES */
let currentUser;
let selectedUser = null;
let unsubscribe;

/* ELEMENTS */
const authDiv = document.getElementById("auth");
const appDiv = document.getElementById("app");
const chatBox = document.getElementById("chatBox");
const message = document.getElementById("message");

/* SIGNUP */
window.signup = async () => {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const cred = await createUserWithEmailAndPassword(auth, email, password);

  await setDoc(doc(db, "users", cred.user.uid), {
    name,
    email
  });
};

/* LOGIN */
window.login = () => {
  signInWithEmailAndPassword(auth,
    document.getElementById("email").value,
    document.getElementById("password").value
  );
};

/* AUTH STATE */
onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    authDiv.style.display = "none";
    appDiv.style.display = "block";

    loadUsers();
    loadChatList();
  } else {
    authDiv.style.display = "block";
    appDiv.style.display = "none";
  }
});

/* LOAD USERS */
async function loadUsers() {
  const snap = await getDocs(collection(db, "users"));
  const usersList = document.getElementById("usersList");
  usersList.innerHTML = "";

  snap.forEach(docSnap => {
    if (docSnap.id === currentUser.uid) return;

    const data = docSnap.data();

    const div = document.createElement("div");
    div.innerText = data.name;

    div.onclick = () => openChat(docSnap.id, data.name);

    usersList.appendChild(div);
  });
}

/* CHAT LIST */
function loadChatList() {
  const q = query(collection(db, "chatList"), orderBy("updatedAt", "desc"));

  onSnapshot(q, async snapshot => {
    const chatList = document.getElementById("chatList");
    chatList.innerHTML = "";

    for (const docSnap of snapshot.docs) {
      const data = docSnap.data();

      if (!data.users.includes(currentUser.uid)) continue;

      const otherId = data.users.find(u => u !== currentUser.uid);

      const userSnap = await getDoc(doc(db, "users", otherId));
      const user = userSnap.data();

      const div = document.createElement("div");
      div.innerHTML = `<b>${user.name}</b><br><small>${data.lastMessage}</small>`;

      div.onclick = () => openChat(otherId, user.name);

      chatList.appendChild(div);
    }
  });
}

/* OPEN CHAT */
function openChat(uid, name) {
  selectedUser = uid;
  document.getElementById("chatTitle").innerText = "Chat with " + name;
  loadMessages();
}

/* SEND MESSAGE */
window.sendMessage = async () => {
  const text = message.value.trim();
  if (!text || !selectedUser) return;

  const chatId = [currentUser.uid, selectedUser].sort().join("_");

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text,
    sender: currentUser.uid,
    createdAt: serverTimestamp()
  });

  await setDoc(doc(db, "chatList", chatId), {
    users: [currentUser.uid, selectedUser],
    lastMessage: text,
    updatedAt: serverTimestamp()
  });

  message.value = "";
};

/* LOAD MESSAGES */
function loadMessages() {
  if (unsubscribe) unsubscribe();

  const chatId = [currentUser.uid, selectedUser].sort().join("_");

  const q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("createdAt")
  );

  unsubscribe = onSnapshot(q, snap => {
    chatBox.innerHTML = "";

    snap.forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "msg " + (data.sender === currentUser.uid ? "me" : "other");
      div.innerText = data.text;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

/* LOGOUT */
window.logout = () => signOut(auth);

</script>

</body>
  </html>
