<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 30px auto 10px;
      border-radius: 50%;
      background: white;
      color: #ff4b2b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
    }

    #auth { margin-top: 60px; }

    input {
      width: 80%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 20px;
      border: none;
    }

    button {
      padding: 12px 18px;
      border-radius: 20px;
      border: none;
      background: white;
      color: #ff4b2b;
      font-weight: bold;
      cursor: pointer;
      margin: 5px;
    }

    #chatBox {
      height: 300px;
      overflow-y: auto;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 10px;
      margin: 20px;
    }

    .message {
      padding: 10px;
      margin: 5px;
      border-radius: 20px;
    }

    .me {
      background: white;
      color: #ff4b2b;
      text-align: right;
    }

    .other {
      background: rgba(255,255,255,0.7);
      color: black;
      text-align: left;
    }
  </style>
</head>

<body>

<div class="logo">TG</div>
<h1>TeamUp Global</h1>

<div id="auth">
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <p id="welcome"></p>

  <div id="chatBox"></div>

  <input id="message" placeholder="Type message">
  <button onclick="sendMessage()">Send</button>

  <br><br>
  <button onclick="logout()">Logout</button>
</div>

<!-- ✅ FIXED SCRIPT -->
<script type="module">
alert("JS is working now");

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:b80b61d82df788cc0339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const email = document.getElementById("email");
const password = document.getElementById("password");
const message = document.getElementById("message");
const chatBox = document.getElementById("chatBox");
const welcome = document.getElementById("welcome");

const authDiv = document.getElementById("auth");
const appDiv = document.getElementById("app");

let currentUser;

// SIGN UP
window.signup = function () {
  createUserWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

// LOGIN
window.login = function () {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

// AUTH STATE
onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    authDiv.style.display = "none";
    appDiv.style.display = "block";
    welcome.innerText = "Welcome " + user.email;
    loadMessages();
  } else {
    authDiv.style.display = "block";
    appDiv.style.display = "none";
  }
});

// SEND MESSAGE
window.sendMessage = async function () {
  if (!message.value) return;

  await addDoc(collection(db, "messages"), {
    text: message.value,
    user: currentUser.email,
    createdAt: serverTimestamp()
  });

  message.value = "";
};

// LOAD MESSAGES
function loadMessages() {
  const q = query(collection(db, "messages"), orderBy("createdAt"));

  onSnapshot(q, snapshot => {
    chatBox.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "message " + (data.user === currentUser.email ? "me" : "other");
      div.innerText = data.text;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

// LOGOUT
window.logout = function () {
  signOut(auth);
};
</script>

</body>
</html>
