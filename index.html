<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f2f2;
    }

    .header {
      background: #075e54;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .welcome {
      padding: 15px;
      background: #ddd;
      font-weight: bold;
    }

    .form {
      padding: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 25px;
      border: none;
      background: #e0e0e0;
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 25px;
      border: none;
      background: #25d366;
      color: white;
      font-size: 16px;
    }

    .user {
      display: flex;
      align-items: center;
      padding: 15px;
      border-bottom: 1px solid #ccc;
      background: white;
    }

    .avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: #25d366;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 10px;
      font-weight: bold;
    }

    .user-info {
      flex: 1;
    }

    .name {
      font-weight: bold;
    }

    .sub {
      color: gray;
      font-size: 13px;
    }
  </style>
</head>

<body>

<div class="header">TeamUp Global</div>

<div class="welcome" id="welcome">Welcome Guest</div>

<div class="form">
  <input type="text" id="name" placeholder="Name">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="signUp()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="usersList"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  import {
    getFirestore,
    collection,
    addDoc,
    getDocs
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
    authDomain: "teamup-68a21.firebaseapp.com",
    projectId: "teamup-68a21",
    storageBucket: "teamup-68a21.firebasestorage.app",
    messagingSenderId: "379106762572",
    appId: "1:379106762572:web:a1537754ed17d3a60339e9",
    measurementId: "G-EJ59MW0TMC"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const welcome = document.getElementById("welcome");
  const usersList = document.getElementById("usersList");

  // ✅ LOAD CURRENT USER
  const savedEmail = localStorage.getItem("userEmail");
  if (savedEmail) {
    welcome.innerText = "Welcome " + savedEmail;
    loadUsers();
  }

  // ✅ SIGN UP
  window.signUp = async () => {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!name || !email || !password) {
      alert("Fill all fields");
      return;
    }

    try {
      const userCred = await createUserWithEmailAndPassword(auth, email, password);

      // SAVE USER TO FIRESTORE
      await addDoc(collection(db, "users"), {
        name: name,
        email: email,
        photo: ""
      });

      // SAVE LOGIN
      localStorage.setItem("userEmail", email);

      alert("Signup successful");
      location.reload();

    } catch (err) {
      alert(err.message);
    }
  };

  // ✅ LOGIN
  window.login = async () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
      await signInWithEmailAndPassword(auth, email, password);

      localStorage.setItem("userEmail", email);

      alert("Login successful");
      location.reload();

    } catch (err) {
      alert(err.message);
    }
  };

  // ✅ LOAD USERS
  async function loadUsers() {
    usersList.innerHTML = "";

    const snap = await getDocs(collection(db, "users"));

    snap.forEach(doc => {
      const data = doc.data();

      if (data.email === localStorage.getItem("userEmail")) return;

      const div = document.createElement("div");
      div.className = "user";

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.innerText = (data.name || data.email)[0].toUpperCase();

      const info = document.createElement("div");
      info.className = "user-info";

      const name = document.createElement("div");
      name.className = "name";
      name.innerText = data.name || data.email;

      const sub = document.createElement("div");
      sub.className = "sub";
      sub.innerText = "Tap to chat";

      info.appendChild(name);
      info.appendChild(sub);

      div.appendChild(avatar);
      div.appendChild(info);

      // 👉 OPEN CHAT
      div.onclick = () => {
        localStorage.setItem("chatUserEmail", data.email);
        localStorage.setItem("chatUserName", data.name);
        window.location.href = "chat.html";
      };

      usersList.appendChild(div);
    });
  }
</script>

</body>
  </html>
