<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TeamUp Global – Swipe & Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
    body{background:#1e1e2e;height:100vh;display:flex;justify-content:center;align-items:center}
    .app-container{width:100%;max-width:480px;height:95vh;background:white;border-radius:32px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 40px rgba(0,0,0,0.2)}
    .login-screen{background:linear-gradient(145deg,#fff0f0,#ffe6e6);justify-content:center;align-items:center;padding:24px;gap:18px;display:flex;flex-direction:column;height:100%}
    .login-screen h1{font-size:2rem;color:#c44545}
    .login-screen input{width:100%;padding:14px;border:1px solid #ffcdcd;border-radius:44px;background:white;font-size:1rem}
    .login-screen button{background:#c44545;color:white;border:none;padding:12px;border-radius:44px;width:100%;font-weight:bold;cursor:pointer}
    #signupBtn{background:#e07a7a}
    .error-msg{color:#c44545;font-size:0.85rem;text-align:center;margin-top:8px}
    #mainApp{display:none;flex-direction:column;flex:1}
    .app-header{padding:18px 20px 8px;background:white;border-bottom:1px solid #f0f0f0}
    .app-header h2{font-size:1.8rem;background:linear-gradient(135deg,#c44545,#e07a7a);-webkit-background-clip:text;background-clip:text;color:transparent}
    .header-actions{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
    .user-email{font-size:0.75rem;color:#888}
    .icon-btn{background:none;border:none;font-size:1.3rem;cursor:pointer;color:#c44545}
    .filter-row{display:flex;gap:12px;overflow-x:auto;padding:12px 20px;background:white;border-bottom:1px solid #f0f0f0}
    .filter-chip{background:#f5f5f5;padding:8px 18px;border-radius:40px;font-size:0.85rem;white-space:nowrap;cursor:pointer}
    .filter-chip.active{background:#c44545;color:white}
    .content-area{flex:1;overflow-y:auto;padding:16px;background:#fafafa}
    .swipe-container{position:relative;height:100%;display:flex;justify-content:center;align-items:center}
    .card{position:absolute;width:100%;max-width:340px;background:white;border-radius:28px;box-shadow:0 12px 24px rgba(0,0,0,0.1);overflow:hidden;cursor:grab}
    .card-img{height:280px;background:#e9ecef;display:flex;align-items:center;justify-content:center;font-size:4rem}
    .card-info{padding:18px}
    .card-info h3{font-size:1.4rem}
    .location{font-size:0.85rem;color:#6c757d;margin:4px 0}
    .matches-list{display:flex;flex-direction:column;gap:12px}
    .match-card{background:white;border-radius:20px;padding:12px;display:flex;align-items:center;gap:14px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
    .match-avatar{width:60px;height:60px;background:#f0d9d9;border-radius:30px;display:flex;align-items:center;justify-content:center;font-size:1.8rem}
    .online-indicator{display:inline-block;width:10px;height:10px;background:#2ecc71;border-radius:5px;margin-left:6px}
    .chat-view{display:flex;flex-direction:column;height:100%}
    .chat-header{padding:12px;background:white;border-bottom:1px solid #eee;display:flex;align-items:center;gap:12px}
    .chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
    .message{max-width:80%;padding:10px 14px;border-radius:20px}
    .message.me{align-self:flex-end;background:#c44545;color:white}
    .message.other{align-self:flex-start;background:#f1f1f1}
    .chat-input{display:flex;gap:10px;padding:12px;background:white;border-top:1px solid #eee}
    .chat-input input{flex:1;padding:10px;border-radius:30px;border:1px solid #ddd}
    .no-profiles{text-align:center;padding:40px;color:#888}
    .tab-bar{display:flex;background:white;border-top:1px solid #eee;padding:8px 20px;justify-content:space-around}
    .tab{font-size:1.4rem;color:#aaa;cursor:pointer}
    .tab.active{color:#c44545}
    .back-btn{background:none;border:none;font-size:1.4rem;cursor:pointer}
    .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:1000;display:none}
    .modal-content{background:white;width:85%;max-width:350px;border-radius:32px;padding:24px}
    .modal-content input,.modal-content textarea{width:100%;margin:10px 0;padding:10px;border-radius:30px;border:1px solid #ddd}
    .modal-content button{background:#c44545;color:white;padding:10px;border-radius:40px;width:100%;border:none;margin-top:8px}
    .cancel-btn{background:#ccc !important}
  </style>
</head>
<body>
<div class="app-container">
  <div id="loginScreen" class="login-screen">
    <h1>💙 TeamUp Global</h1>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <div id="loginError" class="error-msg"></div>
    <button id="loginBtn">Login</button>
    <button id="signupBtn">Create Account</button>
  </div>
  <div id="mainApp" style="display:none;">
    <div class="app-header">
      <h2>TeamUp Global</h2>
      <div class="header-actions">
        <span class="user-email" id="currentUserEmail"></span>
        <button id="editProfileBtn" class="icon-btn"><i class="fas fa-user-edit"></i></button>
        <button id="logoutMainBtn" class="icon-btn"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>
    <div class="filter-row" id="filterRow">
      <div class="filter-chip active" data-filter="matches">Matches</div>
      <div class="filter-chip" data-filter="online">Online</div>
      <div class="filter-chip" data-filter="popular">Popular</div>
      <div class="filter-chip" data-filter="newest">Newest</div>
      <div class="filter-chip" data-filter="latest">Latest Picks</div>
    </div>
    <div id="contentArea" class="content-area"></div>
    <div class="tab-bar">
      <div class="tab active" data-main-tab="swipe"><i class="fas fa-fire"></i></div>
      <div class="tab" data-main-tab="matches"><i class="fas fa-heart"></i></div>
    </div>
  </div>
  <div id="editModal" class="modal-overlay">
    <div class="modal-content">
      <h3>Edit Profile</h3>
      <input type="text" id="editName" placeholder="Name">
      <input type="number" id="editAge" placeholder="Age">
      <input type="text" id="editLocation" placeholder="Location">
      <textarea id="editBio" placeholder="Bio" rows="2"></textarea>
      <button id="saveProfileBtn">Save</button>
      <button id="closeModalBtn" class="cancel-btn">Cancel</button>
    </div>
  </div>
</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, getDocs, onSnapshot, addDoc, serverTimestamp, increment, arrayUnion, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
    authDomain: "teamup-68a21.firebaseapp.com",
    projectId: "teamup-68a21",
    storageBucket: "teamup-68a21.firebasestorage.app",
    messagingSenderId: "379106762572",
    appId: "1:379106762572:web:a1537754ed17d3a60339e9"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const loginScreen = document.getElementById("loginScreen");
  const mainApp = document.getElementById("mainApp");
  const loginEmail = document.getElementById("loginEmail");
  const loginPassword = document.getElementById("loginPassword");
  const loginBtn = document.getElementById("loginBtn");
  const signupBtn = document.getElementById("signupBtn");
  const logoutMainBtn = document.getElementById("logoutMainBtn");
  const editProfileBtn = document.getElementById("editProfileBtn");
  const editModal = document.getElementById("editModal");
  const saveProfileBtn = document.getElementById("saveProfileBtn");
  const closeModalBtn = document.getElementById("closeModalBtn");
  const editName = document.getElementById("editName");
  const editAge = document.getElementById("editAge");
  const editLocation = document.getElementById("editLocation");
  const editBio = document.getElementById("editBio");
  const contentArea = document.getElementById("contentArea");
  const filterChips = document.querySelectorAll(".filter-chip");
  const mainTabs = document.querySelectorAll(".tab");
  const currentUserEmailSpan = document.getElementById("currentUserEmail");
  const loginError = document.getElementById("loginError");
  let currentUser = null, currentUserId = null, currentFilter = "matches", currentMainTab = "swipe", unsubscribeChat = null, swipeCards = [], currentCardIndex = 0;
  async function setUserOnline(uid, on) { try { await updateDoc(doc(db, "users", uid), { online: on, lastSeen: serverTimestamp() }); } catch(e) {} }
  async function createUserProfile(user) {
    await setDoc(doc(db, "users", user.uid), {
      email: user.email, name: user.email.split('@')[0], age: 28, location: "Earth", bio: "Excited to meet new people!", photoIcon: "🧑", online: true, lastSeen: serverTimestamp(), joinDate: serverTimestamp(), likesReceived: 0, swipedRight: [], swipedLeft: []
    });
  }
  async function fetchUsersByFilter(filter, uid) {
    let q;
    if (filter === "online") q = query(collection(db, "users"), where("online", "==", true));
    else if (filter === "popular") q = query(collection(db, "users"), orderBy("likesReceived", "desc"), limit(30));
    else if (filter === "newest") q = query(collection(db, "users"), orderBy("joinDate", "desc"), limit(30));
    else if (filter === "latest") q = query(collection(db, "users"), orderBy("joinDate", "desc"), limit(20));
    else q = query(collection(db, "users"), limit(50));
    const snap = await getDocs(q);
    let users = [];
    snap.forEach(d => { if (d.id !== uid) users.push({ id: d.id, ...d.data() }); });
    if (filter === "latest") users = users.sort(() => 0.5 - Math.random()).slice(0, 10);
    return users;
  }
  async function renderSwipeDeck() {
    contentArea.innerHTML = `<div class="swipe-container" id="swipeContainer"></div>`;
    const users = await fetchUsersByFilter(currentFilter, currentUserId);
    if (!users.length) { document.getElementById("swipeContainer").innerHTML = '<div class="no-profiles">✨ No more profiles</div>'; return; }
    swipeCards = users; currentCardIndex = 0; displayNextCard();
  }
  function displayNextCard() {
    const container = document.getElementById("swipeContainer");
    if (!container) return;
    if (currentCardIndex >= swipeCards.length) { container.innerHTML = '<div class="no-profiles">🎉 You\'ve seen everyone</div>'; return; }
    const user = swipeCards[currentCardIndex];
    const card = document.createElement("div"); card.className = "card";
    card.innerHTML = `<div class="card-img">${user.photoIcon || "👤"}</div><div class="card-info"><h3>${user.name}, ${user.age || "?"}</h3><div class="location"><i class="fas fa-map-marker-alt"></i> ${user.location || "Worldwide"}</div><p>${user.bio || ""}</p></div>`;
    container.innerHTML = ""; container.appendChild(card);
    let startX = 0, currentX = 0, dragging = false;
    const onStart = (e) => { dragging = true; startX = e.clientX ?? e.touches[0].clientX; card.style.transition = "none"; };
    const onMove = (e) => { if (!dragging) return; currentX = (e.clientX ?? e.touches[0].clientX) - startX; card.style.transform = `translateX(${currentX}px) rotate(${currentX*0.02}deg)`; };
    const onEnd = async () => {
      if (!dragging) return; dragging = false; card.style.transition = "transform 0.3s";
      if (Math.abs(currentX) > 100) {
        const liked = currentX > 0; card.style.transform = `translateX(${liked ? 500 : -500}px) rotate(${liked ? 30 : -30}deg)`;
        setTimeout(async () => {
          if (liked) {
            await updateDoc(doc(db, "users", currentUserId), { swipedRight: arrayUnion(user.id) });
            const other = await getDoc(doc(db, "users", user.id));
            if (other.exists() && (other.data().swipedRight || []).includes(currentUserId)) {
              const matchId = [currentUserId, user.id].sort().join("_");
              await setDoc(doc(db, "matches", matchId), { users: [currentUserId, user.id], createdAt: serverTimestamp() });
              alert("💖 It's a match! 💖");
              await updateDoc(doc(db, "users", user.id), { likesReceived: increment(1) });
            }
          } else { await updateDoc(doc(db, "users", currentUserId), { swipedLeft: arrayUnion(user.id) }); }
          currentCardIndex++; displayNextCard();
        }, 200);
      } else { card.style.transform = "translateX(0) rotate(0deg)"; }
      currentX = 0;
    };
    card.addEventListener("mousedown", onStart); card.addEventListener("touchstart", onStart, { passive: false });
    window.addEventListener("mousemove", onMove); window.addEventListener("mouseup", onEnd);
    window.addEventListener("touchmove", onMove, { passive: false }); window.addEventListener("touchend", onEnd);
  }
  async function renderMatchesList() {
    contentArea.innerHTML = `<div id="matchesList" class="matches-list"></div>`;
    const matches = await getDocs(query(collection(db, "matches"), where("users", "array-contains", currentUserId)));
    const matchIds = [];
    matches.forEach(d => { const other = d.data().users.find(id => id !== currentUserId); if (other) matchIds.push(other); });
    const container = document.getElementById("matchesList");
    if (!matchIds.length) { container.innerHTML = '<div class="no-profiles">No matches yet. Start swiping!</div>'; return; }
    for (const id of matchIds) {
      const userSnap = await getDoc(doc(db, "users", id));
      if (userSnap.exists()) {
        const data = userSnap.data();
        const div = document.createElement("div"); div.className = "match-card";
        div.innerHTML = `<div class="match-avatar">${data.photoIcon || "👤"}</div><div class="match-info"><strong>${data.name}, ${data.age || "?"}</strong> ${data.online ? '<span class="online-indicator"></span>' : ''}<br><small>${data.location || "Worldwide"}</small></div>`;
        div.addEventListener("click", () => openChat(id, data.name));
        container.appendChild(div);
      }
    }
  }
  async function openChat(otherId, otherName) {
    if (unsubscribeChat) unsubscribeChat();
    contentArea.innerHTML = `<div class="chat-view"><div class="chat-header"><button id="chatBackBtn" class="back-btn"><i class="fas fa-arrow-left"></i></button><strong>${otherName}</strong></div><div id="chatMessagesArea" class="chat-messages"></div><div class="chat-input"><input id="chatInputField" placeholder="Message..."><button id="chatSendBtn"><i class="fas fa-paper-plane"></i></button></div></div>`;
    document.getElementById("chatBackBtn").addEventListener("click", () => { if (unsubscribeChat) unsubscribeChat(); renderMatchesList(); });
    const roomId = [currentUserId, otherId].sort().join("__");
    const messagesRef = collection(db, "chats", roomId, "messages");
    unsubscribeChat = onSnapshot(query(messagesRef, orderBy("timestamp", "asc")), (snap) => {
      const container = document.getElementById("chatMessagesArea"); if (!container) return; container.innerHTML = "";
      snap.forEach(d => { const msg = d.data(); const div = document.createElement("div"); div.className = `message ${msg.senderId === currentUserId ? "me" : "other"}`; div.innerText = msg.text; container.appendChild(div); });
      container.scrollTop = container.scrollHeight;
    });
    document.getElementById("chatSendBtn").addEventListener("click", async () => {
      const input = document.getElementById("chatInputField"); const text = input.value.trim(); if (!text) return;
      await addDoc(messagesRef, { text, senderId: currentUserId, timestamp: serverTimestamp() });
      input.value = "";
    });
  }
  async function refreshContent() { if (currentMainTab === "swipe") await renderSwipeDeck(); else await renderMatchesList(); }
  filterChips.forEach(c => c.addEventListener("click", () => { filterChips.forEach(f => f.classList.remove("active")); c.classList.add("active"); currentFilter = c.getAttribute("data-filter"); if (currentMainTab === "swipe") refreshContent(); }));
  mainTabs.forEach(t => t.addEventListener("click", () => { mainTabs.forEach(m => m.classList.remove("active")); t.classList.add("active"); currentMainTab = t.getAttribute("data-main-tab"); refreshContent(); }));
  editProfileBtn.onclick = async () => { const d = (await getDoc(doc(db, "users", currentUserId))).data(); editName.value = d.name || ""; editAge.value = d.age || ""; editLocation.value = d.location || ""; editBio.value = d.bio || ""; editModal.style.display = "flex"; };
  saveProfileBtn.onclick = async () => { await updateDoc(doc(db, "users", currentUserId), { name: editName.value, age: parseInt(editAge.value) || 25, location: editLocation.value, bio: editBio.value }); editModal.style.display = "none"; refreshContent(); };
  closeModalBtn.onclick = () => editModal.style.display = "none";
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user; currentUserId = user.uid; currentUserEmailSpan.innerText = user.email;
      const snap = await getDoc(doc(db, "users", user.uid));
      if (!snap.exists()) await createUserProfile(user);
      await setUserOnline(user.uid, true);
      loginScreen.style.display = "none"; mainApp.style.display = "flex";
      document.querySelector('.filter-chip[data-filter="matches"]').classList.add("active"); currentFilter = "matches";
      document.querySelector('.tab[data-main-tab="swipe"]').classList.add("active"); currentMainTab = "swipe";
      await refreshContent();
      setInterval(() => setUserOnline(user.uid, true), 30000);
    } else { if (currentUserId) setUserOnline(currentUserId, false); loginScreen.style.display = "flex"; mainApp.style.display = "none"; loginError.innerText = ""; }
  });
  loginBtn.onclick = async () => { loginError.innerText = ""; try { await signInWithEmailAndPassword(auth, loginEmail.value, loginPassword.value); } catch (err) { loginError.innerText = err.message.includes("user-not-found") ? "No account. Create one." : err.message.includes("wrong-password") ? "Wrong password." : err.message; } };
  signupBtn.onclick = async () => { loginError.innerText = ""; try { const cred = await createUserWithEmailAndPassword(auth, loginEmail.value, loginPassword.value); await createUserProfile(cred.user); } catch (err) { loginError.innerText = err.message.includes("email-already-in-use") ? "Email in use. Login instead." : err.message; } };
  logoutMainBtn.onclick = async () => { await signOut(auth); };
  window.addEventListener("beforeunload", () => { if (currentUserId) setUserOnline(currentUserId, false); });
</script>
</body>
</html>
