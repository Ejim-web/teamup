<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f6d5c;
      color: white;
      text-align: center;
      padding-top: 100px;
    }

    input {
      display: block;
      width: 80%;
      margin: 10px auto;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      width: 80%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
      background: white;
      color: #0f6d5c;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>TeamUp Global</h2>

<input type="email" id="email" placeholder="Enter Email">
<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>
<button onclick="signup()">Sign Up</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.firebasestorage.app",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9",
  measurementId: "G-EJ59MW0TMC"
};

// ✅ Initialize Firebase ONCE
if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();
const db = firebase.firestore();

// ✅ ONLY redirect if already logged in
auth.onAuthStateChanged(user => {
  if (user) {
    window.location.href = "chat.html";
  }
});

// 🔐 LOGIN
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      alert("Login successful");
      window.location.href = "chat.html";
    })
    .catch(err => {
      alert(err.message);
    });
}

// 🆕 SIGN UP
function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then((userCredential) => {

      // ✅ Save user to Firestore (VERY IMPORTANT)
      db.collection("users").doc(userCredential.user.uid).set({
        uid: userCredential.user.uid,
        email: email,
        name: email
      });

      alert("Account created! Now login.");
    })
    .catch(err => {
      alert(err.message);
    });
}
</script>

</body>
</html>
