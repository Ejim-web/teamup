<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f2f2;
    }

    header {
      background: #176b5c;
      color: white;
      text-align: center;
      padding: 30px 20px;
    }

    .logout {
      background: red;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
    }

    .section {
      padding: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .btn {
      padding: 10px 15px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
      cursor: pointer;
      background: #176b5c;
      color: white;
    }
  </style>
</head>

<body>

<header>
  <h2>TeamUp Global</h2>
  <button class="logout" onclick="logout()">Logout</button>
</header>

<div class="section">
  <h3>All Users</h3>
  <div id="users">Loading...</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUserId = null;

// AUTH
firebase.auth().onAuthStateChanged(user => {
  if(user){
    currentUserId = user.uid;
    loadUsers();
  } else {
    window.location.href = "index.html";
  }
});


// LOAD USERS
async function loadUsers(){
  const usersDiv = document.getElementById("users");
  usersDiv.innerHTML = "";

  const snapshot = await db.collection("users").get();

  snapshot.forEach(doc => {
    if(doc.id === currentUserId) return;

    const data = doc.data();

    usersDiv.innerHTML += `
      <div class="card">
        <b>${data.name || "No Name"}</b><br>
        <small>${data.email || "No Email"}</small><br>
        <button class="btn" onclick="startChat('${doc.id}')">Chat</button>
      </div>
    `;
  });
}


// START CHAT
function startChat(otherUserId){
  const chatId = [currentUserId, otherUserId].sort().join("_");
  window.location.href = "chat.html?chatId=" + chatId;
}


// LOGOUT
function logout(){
  firebase.auth().signOut().then(() => {
    window.location.href = "index.html";
  });
}
</script>

</body>
</html>
