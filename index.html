<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>InternationalCupid – Meet globally</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
    }

    body {
      background: #f7f9fc;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Main container */
    .app-container {
      width: 100%;
      max-width: 480px;
      height: 95vh;
      background: white;
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Login screen */
    .login-screen {
      background: linear-gradient(145deg, #fff0f0, #ffe6e6);
      justify-content: center;
      align-items: center;
      padding: 24px;
      gap: 18px;
    }
    .login-screen h1 {
      font-size: 2.2rem;
      color: #c44545;
      margin-bottom: 12px;
    }
    .login-screen input {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid #ffcdcd;
      border-radius: 44px;
      background: white;
      font-size: 1rem;
    }
    .login-screen button {
      background: #c44545;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 44px;
      width: 100%;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
    }
    #signupBtn {
      background: #e07a7a;
    }

    /* Main app header */
    .app-header {
      padding: 18px 20px 8px;
      background: white;
      border-bottom: 1px solid #f0f0f0;
    }
    .app-header h2 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #c44545, #e07a7a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }
    .header-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }
    .user-email {
      font-size: 0.75rem;
      color: #888;
    }
    .icon-btn {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: #c44545;
    }

    /* Filter row (Matches, Online, Popular, Newest, Latest Picks) */
    .filter-row {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 12px 20px;
      background: white;
      border-bottom: 1px solid #f0f0f0;
      scrollbar-width: thin;
    }
    .filter-chip {
      background: #f5f5f5;
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      color: #333;
      transition: all 0.2s;
    }
    .filter-chip.active {
      background: #c44545;
      color: white;
    }

    /* Swipe / list area */
    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      position: relative;
      background: #fafafa;
    }

    /* Swipe cards container (Tinder style) */
    .swipe-container {
      position: relative;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .card {
      position: absolute;
      width: 100%;
      max-width: 340px;
      background: white;
      border-radius: 28px;
      box-shadow: 0 12px 24px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.3s, opacity 0.3s;
      cursor: grab;
    }
    .card:active { cursor: grabbing; }
    .card-img {
      height: 280px;
      background: #e9ecef;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      color: #adb5bd;
    }
    .card-info {
      padding: 18px;
    }
    .card-info h3 {
      font-size: 1.4rem;
      margin-bottom: 4px;
    }
    .card-info .location {
      color: #6c757d;
      font-size: 0.85rem;
      margin-bottom: 8px;
    }
    .card-info .last-active {
      font-size: 0.7rem;
      color: #28a745;
      margin-bottom: 10px;
    }
    .stats-row {
      display: flex;
      gap: 20px;
      margin-top: 12px;
      color: #555;
      font-size: 0.85rem;
    }
    .stats-row i {
      margin-right: 5px;
    }

    /* Matches & chat list */
    .matches-list, .chat-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .match-card {
      background: white;
      border-radius: 20px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      cursor: pointer;
    }
    .match-avatar {
      width: 60px;
      height: 60px;
      background: #f0d9d9;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
    }
    .match-info {
      flex: 1;
    }
    .online-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 5px;
      background: #2ecc71;
      margin-left: 6px;
    }
    .chat-view {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .chat-header {
      padding: 12px;
      background: white;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 20px;
      font-size: 0.9rem;
    }
    .message.me {
      align-self: flex-end;
      background: #c44545;
      color: white;
    }
    .message.other {
      align-self: flex-start;
      background: #f1f1f1;
    }
    .chat-input {
      display: flex;
      gap: 10px;
      padding: 12px;
      background: white;
      border-top: 1px solid #eee;
    }
    .chat-input input {
      flex: 1;
      padding: 10px;
      border-radius: 30px;
      border: 1px solid #ddd;
    }
    .no-profiles {
      text-align: center;
      padding: 40px;
      color: #888;
    }
    .back-btn {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
    }
    .tab-bar {
      display: flex;
      background: white;
      border-top: 1px solid #eee;
      padding: 8px 20px;
      justify-content: space-around;
    }
    .tab {
      font-size: 1.4rem;
      color: #aaa;
      cursor: pointer;
    }
    .tab.active {
      color: #c44545;
    }
  </style>
</head>
<body>
<div class="app-container" id="app">
  <!-- Login Screen -->
  <div id="loginScreen" class="login-screen" style="display:flex; flex-direction:column;">
    <h1>❤️ InternationalCupid</h1>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button id="loginBtn">Login</button>
    <button id="signupBtn">Create Account</button>
  </div>

  <!-- Main App (hidden after login) -->
  <div id="mainApp" style="display:none; flex-direction:column; flex:1;">
    <div class="app-header">
      <h2>InternationalCupid</h2>
      <div class="header-actions">
        <span class="user-email" id="currentUserEmail"></span>
        <button id="editProfileBtn" class="icon-btn"><i class="fas fa-user-edit"></i></button>
        <button id="logoutMainBtn" class="icon-btn"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>

    <!-- Filter row: Matches, Online, Popular, Newest members, Latest Picks -->
    <div class="filter-row" id="filterRow">
      <div class="filter-chip" data-filter="matches">Matches</div>
      <div class="filter-chip" data-filter="online">Online</div>
      <div class="filter-chip" data-filter="popular">Popular</div>
      <div class="filter-chip" data-filter="newest">Newest members</div>
      <div class="filter-chip" data-filter="latest">Latest Picks</div>
    </div>

    <!-- Content area: dynamic based on selected filter -->
    <div id="contentArea" class="content-area"></div>

    <!-- Bottom Tab Bar (Swipe / Matches) -->
    <div class="tab-bar">
      <div class="tab" data-main-tab="swipe"><i class="fas fa-fire"></i></div>
      <div class="tab" data-main-tab="matches"><i class="fas fa-heart"></i></div>
    </div>
  </div>

  <!-- Edit Profile Modal (simple dialog) -->
  <div id="editModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:1000; display:none;">
    <div style="background:white; width:85%; max-width:350px; border-radius:32px; padding:24px;">
      <h3>Edit Profile</h3>
      <input type="text" id="editName" placeholder="Name" style="width:100%; margin:10px 0; padding:10px; border-radius:30px; border:1px solid #ddd;">
      <input type="number" id="editAge" placeholder="Age" style="width:100%; margin:10px 0; padding:10px; border-radius:30px;">
      <input type="text" id="editLocation" placeholder="Location (City, Country)" style="width:100%; margin:10px 0; padding:10px; border-radius:30px;">
      <textarea id="editBio" placeholder="Bio" rows="2" style="width:100%; margin:10px 0; padding:10px; border-radius:20px;"></textarea>
      <button id="saveProfileBtn" style="background:#c44545; color:white; border:none; padding:10px; border-radius:40px; width:100%;">Save</button>
      <button id="closeModalBtn" style="margin-top:10px; background:#ccc;">Cancel</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, getDocs, onSnapshot, addDoc, serverTimestamp, increment, arrayUnion, arrayRemove, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
    authDomain: "teamup-68a21.firebaseapp.com",
    projectId: "teamup-68a21",
    storageBucket: "teamup-68a21.firebasestorage.app",
    messagingSenderId: "379106762572",
    appId: "1:379106762572:web:a1537754ed17d3a60339e9",
    measurementId: "G-EJ59MW0TMC"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // DOM elements
  const loginScreen = document.getElementById("loginScreen");
  const mainApp = document.getElementById("mainApp");
  const loginEmail = document.getElementById("loginEmail");
  const loginPassword = document.getElementById("loginPassword");
  const loginBtn = document.getElementById("loginBtn");
  const signupBtn = document.getElementById("signupBtn");
  const logoutMainBtn = document.getElementById("logoutMainBtn");
  const editProfileBtn = document.getElementById("editProfileBtn");
  const editModal = document.getElementById("editModal");
  const saveProfileBtn = document.getElementById("saveProfileBtn");
  const closeModalBtn = document.getElementById("closeModalBtn");
  const editName = document.getElementById("editName");
  const editAge = document.getElementById("editAge");
  const editLocation = document.getElementById("editLocation");
  const editBio = document.getElementById("editBio");
  const contentArea = document.getElementById("contentArea");
  const filterChips = document.querySelectorAll(".filter-chip");
  const mainTabs = document.querySelectorAll(".tab");
  const currentUserEmailSpan = document.getElementById("currentUserEmail");

  let currentUser = null;
  let currentUserId = null;
  let currentFilter = "matches"; // default filter
  let currentMainTab = "swipe"; // swipe deck or matches list
  let activeChatWith = null; // user id for chat
  let unsubscribeChat = null;
  let swipeCards = [];
  let currentCardIndex = 0;

  // Helper to format last active
  function formatLastActive(timestamp) {
    if (!timestamp) return "Just now";
    const diff = (Date.now() - timestamp.toDate()) / 1000;
    if (diff < 60) return "Active now";
    if (diff < 3600) return `${Math.floor(diff/60)} min ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)} hours ago`;
    return `${Math.floor(diff/86400)} days ago`;
  }

  // Update user online status
  async function setUserOnline(uid, isOnline) {
    await updateDoc(doc(db, "users", uid), { online: isOnline, lastSeen: serverTimestamp() }).catch(()=>{});
  }

  // Create user profile on signup
  async function createUserProfile(user, name, age, location, bio) {
    const userRef = doc(db, "users", user.uid);
    await setDoc(userRef, {
      email: user.email,
      name: name || user.email.split('@')[0],
      age: age || 28,
      location: location || "Unknown",
      bio: bio || "Looking for meaningful connection 🌍",
      photoIcon: "🧑‍🤝‍🧑",
      online: true,
      lastSeen: serverTimestamp(),
      joinDate: serverTimestamp(),
      likesReceived: 0,
      swipedRight: [],
      swipedLeft: [],
      createdAt: serverTimestamp()
    });
  }

  // Get users based on filter (matches, online, popular, newest, latest picks)
  async function fetchUsersByFilter(filter, currentUid) {
    const usersRef = collection(db, "users");
    let q;
    if (filter === "online") {
      q = query(usersRef, where("online", "==", true));
    } else if (filter === "popular") {
      q = query(usersRef, orderBy("likesReceived", "desc"), limit(30));
    } else if (filter === "newest") {
      q = query(usersRef, orderBy("joinDate", "desc"), limit(30));
    } else if (filter === "latest") {
      // Latest picks: random 10 from recent (or just newest)
      q = query(usersRef, orderBy("joinDate", "desc"), limit(20));
    } else {
      q = query(usersRef, limit(50));
    }
    const snapshot = await getDocs(q);
    let users = [];
    snapshot.forEach(docSnap => {
      if (docSnap.id !== currentUid) users.push({ id: docSnap.id, ...docSnap.data() });
    });
    if (filter === "latest") {
      users = users.sort(() => 0.5 - Math.random()).slice(0, 10);
    }
    return users;
  }

  // Render swipe deck based on current filter
  async function renderSwipeDeck() {
    contentArea.innerHTML = `<div class="swipe-container" id="swipeContainer"></div>`;
    const users = await fetchUsersByFilter(currentFilter, currentUserId);
    if (users.length === 0) {
      document.getElementById("swipeContainer").innerHTML = '<div class="no-profiles">✨ No more profiles right now ✨</div>';
      return;
    }
    swipeCards = users;
    currentCardIndex = 0;
    displayNextCard();
  }

  function displayNextCard() {
    const container = document.getElementById("swipeContainer");
    if (!container) return;
    if (currentCardIndex >= swipeCards.length) {
      container.innerHTML = '<div class="no-profiles">🎉 You\'ve seen everyone! Check back later.</div>';
      return;
    }
    const user = swipeCards[currentCardIndex];
    const card = document.createElement("div");
    card.className = "card";
    card.style.transform = "translateX(0) rotate(0deg)";
    const lastActive = user.lastSeen ? formatLastActive(user.lastSeen) : "Recently";
    card.innerHTML = `
      <div class="card-img">${user.photoIcon || "👤"}</div>
      <div class="card-info">
        <h3>${user.name}, ${user.age || "?"}</h3>
        <div class="location"><i class="fas fa-map-marker-alt"></i> ${user.location || "Worldwide"}</div>
        <div class="last-active"><i class="fas fa-clock"></i> ${lastActive}</div>
        <p>${user.bio || ""}</p>
        <div class="stats-row">
          <span><i class="fas fa-heart"></i> ${user.likesReceived || 0} likes</span>
          <span><i class="fas fa-eye"></i> ${Math.floor(Math.random()*100)} views</span>
        </div>
      </div>
    `;
    container.innerHTML = "";
    container.appendChild(card);
    attachSwipeEvents(card, user);
  }

  function attachSwipeEvents(card, user) {
    let startX = 0, currentX = 0, isDragging = false;
    card.addEventListener("mousedown", startDrag);
    card.addEventListener("touchstart", startDrag, { passive: false });
    window.addEventListener("mousemove", onDrag);
    window.addEventListener("mouseup", endDrag);
    window.addEventListener("touchmove", onDrag, { passive: false });
    window.addEventListener("touchend", endDrag);

    function startDrag(e) {
      isDragging = true;
      const clientX = e.clientX ?? e.touches[0].clientX;
      startX = clientX;
      card.style.transition = "none";
    }
    function onDrag(e) {
      if (!isDragging) return;
      const clientX = e.clientX ?? e.touches[0].clientX;
      currentX = clientX - startX;
      card.style.transform = `translateX(${currentX}px) rotate(${currentX * 0.02}deg)`;
    }
    async function endDrag() {
      if (!isDragging) return;
      isDragging = false;
      card.style.transition = "transform 0.3s";
      if (Math.abs(currentX) > 100) {
        const liked = currentX > 0;
        card.style.transform = `translateX(${liked ? 500 : -500}px) rotate(${liked ? 30 : -30}deg)`;
        setTimeout(async () => {
          await handleSwipe(user.id, liked);
          currentCardIndex++;
          displayNextCard();
        }, 200);
      } else {
        card.style.transform = "translateX(0) rotate(0deg)";
      }
      currentX = 0;
    }
  }

  async function handleSwipe(swipedUserId, liked) {
    if (!currentUserId) return;
    const userRef = doc(db, "users", currentUserId);
    if (liked) {
      await updateDoc(userRef, { swipedRight: arrayUnion(swipedUserId) });
      // Check for match
      const otherRef = doc(db, "users", swipedUserId);
      const otherSnap = await getDoc(otherRef);
      const otherSwipedRight = otherSnap.data()?.swipedRight || [];
      if (otherSwipedRight.includes(currentUserId)) {
        const matchId = [currentUserId, swipedUserId].sort().join("_");
        await setDoc(doc(db, "matches", matchId), { users: [currentUserId, swipedUserId], createdAt: serverTimestamp() });
        alert("💖 It's a match! 💖");
        // Also increment likesReceived for swiped user
        await updateDoc(otherRef, { likesReceived: increment(1) });
      }
    } else {
      await updateDoc(userRef, { swipedLeft: arrayUnion(swipedUserId) });
    }
  }

  // Render matches list (mutual matches)
  async function renderMatchesList() {
    contentArea.innerHTML = `<div id="matchesList" class="matches-list"></div>`;
    const matchesSnapshot = await getDocs(query(collection(db, "matches"), where("users", "array-contains", currentUserId)));
    const matchIds = [];
    matchesSnapshot.forEach(docSnap => {
      const users = docSnap.data().users;
      const otherId = users.find(id => id !== currentUserId);
      matchIds.push(otherId);
    });
    const container = document.getElementById("matchesList");
    if (matchIds.length === 0) {
      container.innerHTML = '<div class="no-profiles">No matches yet. Start swiping!</div>';
      return;
    }
    for (const id of matchIds) {
      const userSnap = await getDoc(doc(db, "users", id));
      if (userSnap.exists()) {
        const data = userSnap.data();
        const onlineDot = data.online ? '<span class="online-indicator"></span>' : '';
        const div = document.createElement("div");
        div.className = "match-card";
        div.innerHTML = `
          <div class="match-avatar">${data.photoIcon || "👤"}</div>
          <div class="match-info">
            <strong>${data.name}, ${data.age}</strong> ${onlineDot}<br>
            <small>${data.location || ""}</small>
