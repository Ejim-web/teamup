<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 30px auto 10px;
      border-radius: 50%;
      background: white;
      color: #ff4b2b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
    }

    button {
      padding: 14px 20px;
      border-radius: 25px;
      border: none;
      background: white;
      color: #ff4b2b;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    #chatBox {
      height: 300px;
      overflow-y: auto;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 10px;
      margin: 20px;
    }

    .message {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 5px 0;
    }

    .bubble {
      padding: 10px;
      border-radius: 20px;
      max-width: 70%;
    }

    .me .bubble {
      background: white;
      color: #ff4b2b;
      margin-left: auto;
    }

    .other .bubble {
      background: rgba(255,255,255,0.6);
      color: black;
    }

    img.avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
    }

    .input-area {
      display: flex;
      gap: 10px;
      margin: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 12px;
      border-radius: 20px;
      border: none;
    }
  </style>
</head>

<body>

<div class="logo">TG</div>
<h1>TeamUp Global</h1>

<div id="auth">
  <button onclick="googleLogin()">Continue with Google</button>
</div>

<div id="app" style="display:none;">
  <p id="welcome"></p>

  <!-- ✅ Upload Profile -->
  <input type="file" id="uploadPic">
  <button onclick="uploadProfile()">Upload Profile Picture</button>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="message" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
  </div>

  <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithRedirect,
  getRedirectResult,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp,
  setDoc,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:b80b61d82df788cc0339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

const provider = new GoogleAuthProvider();

let currentUser;

window.googleLogin = () => signInWithRedirect(auth, provider);
getRedirectResult(auth).catch(() => {});

onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;

    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";

    document.getElementById("welcome").innerText =
      "Welcome " + (user.displayName || user.email);

    await setDoc(doc(db, "users", user.uid), {
      name: user.displayName || user.email,
      uid: user.uid,
      photo: user.photoURL || ""
    }, { merge: true });

    loadMessages();
  }
});

/* ✅ UPLOAD PROFILE */
window.uploadProfile = async function () {
  const file = document.getElementById("uploadPic").files[0];
  if (!file) return alert("Select image");

  const storageRef = ref(storage, "profiles/" + currentUser.uid);
  await uploadBytes(storageRef, file);

  const url = await getDownloadURL(storageRef);

  await setDoc(doc(db, "users", currentUser.uid), {
    photo: url
  }, { merge: true });

  alert("Profile updated!");
};

/* SEND */
window.sendMessage = async function () {
  const text = document.getElementById("message").value;
  if (!text) return;

  await addDoc(collection(db, "messages"), {
    text,
    uid: currentUser.uid,
    createdAt: serverTimestamp()
  });

  document.getElementById("message").value = "";
};

/* LOAD */
function loadMessages() {
  const q = query(collection(db, "messages"), orderBy("createdAt"));

  onSnapshot(q, async snapshot => {
    const chatBox = document.getElementById("chatBox");
    chatBox.innerHTML = "";

    for (const docSnap of snapshot.docs) {
      const data = docSnap.data();

      let photo = "";
      const userDoc = await getDoc(doc(db, "users", data.uid));
      photo = userDoc.data()?.photo || "";

      const div = document.createElement("div");
      div.className = "message " + (data.uid === currentUser.uid ? "me" : "other");

      div.innerHTML = `
        <img class="avatar" src="${photo}">
        <div class="bubble">${data.text}</div>
      `;

      chatBox.appendChild(div);
    }
  });
}

window.logout = () => signOut(auth);
</script>

</body>
</html>
