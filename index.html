<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .header {
      background: #111827;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #333;
    }

    #auth {
      text-align: center;
      margin-top: 100px;
    }

    input {
      width: 80%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      background: #1f2937;
      color: white;
    }

    button {
      padding: 12px 18px;
      border-radius: 10px;
      border: none;
      background: #ff4b2b;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin: 5px;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #chatBox {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .message {
      padding: 10px 14px;
      margin: 5px;
      border-radius: 15px;
      max-width: 70%;
      font-size: 14px;
    }

    .me {
      background: #ff4b2b;
      align-self: flex-end;
    }

    .other {
      background: #1f2937;
      align-self: flex-start;
    }

    .input-area {
      display: flex;
      padding: 10px;
      background: #111827;
    }

    .input-area input {
      flex: 1;
      margin: 0;
    }

    .input-area button {
      margin-left: 10px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: #111827;
      border-bottom: 1px solid #333;
      font-size: 14px;
    }

    #logout {
      background: transparent;
      color: #ff4b2b;
    }
  </style>
</head>

<body>

<div id="auth">
  <h2>TeamUp Global</h2>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <div class="top-bar">
    <span id="welcome"></span>
    <button id="logout" onclick="logout()">Logout</button>
  </div>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="message" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:b80b61d82df788cc0339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const email = document.getElementById("email");
const password = document.getElementById("password");
const message = document.getElementById("message");
const welcome = document.getElementById("welcome");
const chatBox = document.getElementById("chatBox");

const authDiv = document.getElementById("auth");
const appDiv = document.getElementById("app");

let currentUser;

window.signup = function () {
  if (!email.value || !password.value) {
    alert("Enter email and password");
    return;
  }

  createUserWithEmailAndPassword(auth, email.value, password.value)
    .then(() => alert("Account created successfully!"))
    .catch(e => alert(e.message));
};

window.login = function () {
  if (!email.value || !password.value) {
    alert("Enter email and password");
    return;
  }

  signInWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    authDiv.style.display = "none";
    appDiv.style.display = "flex";
    welcome.innerText = user.email;
    loadMessages();
  } else {
    authDiv.style.display = "block";
    appDiv.style.display = "none";
  }
});

window.sendMessage = async function () {
  const text = message.value.trim();
  if (!text) return;

  await addDoc(collection(db, "messages"), {
    text,
    user: currentUser.email,
    createdAt: serverTimestamp()
  });

  message.value = "";
};

function loadMessages() {
  const q = query(collection(db, "messages"), orderBy("createdAt"));

  onSnapshot(q, snapshot => {
    chatBox.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "message " + (data.user === currentUser.email ? "me" : "other");
      div.innerText = data.text;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

window.logout = function () {
  signOut(auth);
};
</script>

</body>
</html>
