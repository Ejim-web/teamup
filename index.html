<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #e5ddd5;
    }

    header {
      background: #075E54;
      color: white;
      padding: 15px;
      font-size: 20px;
      text-align: center;
      font-weight: bold;
    }

    .welcome {
      padding: 10px;
      background: #d9d9d9;
      font-weight: bold;
    }

    .user {
      display: flex;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid #ddd;
      background: #fff;
      cursor: pointer;
    }

    .user:hover {
      background: #f5f5f5;
    }

    .avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      margin-right: 12px;
      font-size: 16px;
    }

    .user-info {
      display: flex;
      flex-direction: column;
    }

    .name {
      font-weight: bold;
      font-size: 16px;
    }

    .sub {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

<header>TeamUp Global</header>

<div class="welcome" id="welcome"></div>

<div id="usersList"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* YOUR CONFIG (unchanged) */
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.firebasestorage.app",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9",
  measurementId: "G-EJ59MW0TMC"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* UI */
const usersList = document.getElementById("usersList");
const welcome = document.getElementById("welcome");

/* CURRENT USER */
const currentUserEmail = localStorage.getItem("userEmail");
welcome.innerText = "Welcome " + currentUserEmail;

/* COLOR GENERATOR */
function getColor(name) {
  const colors = [
    "#25D366", "#34B7F1", "#FF6B6B", "#FFA500",
    "#6A5ACD", "#20B2AA", "#FF69B4", "#00C853"
  ];
  return colors[name.charCodeAt(0) % colors.length];
}

/* LOAD USERS */
async function loadUsers() {
  const snap = await getDocs(collection(db, "users"));
  usersList.innerHTML = "";

  snap.forEach(doc => {
    const data = doc.data();

    if (data.email === currentUserEmail) return;

    const name = data.name || data.email;
    const initials = name.split(" ").map(n => n[0]).join("").toUpperCase();

    const div = document.createElement("div");
    div.className = "user";

    div.innerHTML = `
      <div class="avatar" style="background:${getColor(name)}">
        ${initials}
      </div>
      <div class="user-info">
        <div class="name">${name}</div>
        <div class="sub">Tap to chat</div>
      </div>
    `;

    div.onclick = () => {
      localStorage.setItem("chatUserId", doc.id);
      localStorage.setItem("chatUserName", name);
      window.location.href = "chat.html";
    };

    usersList.appendChild(div);
  });
}

loadUsers();
</script>

</body>
</html>
