<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    button {
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      margin: 10px;
    }

    input {
      padding: 10px;
      border-radius: 20px;
      border: none;
      width: 60%;
    }

    #chatBox {
      background: white;
      color: black;
      margin: 20px auto;
      padding: 10px;
      border-radius: 10px;
      max-width: 90%;
      height: 250px;
      overflow-y: auto;
    }

    .msg {
      padding: 8px;
      margin: 5px;
      background: #eee;
      border-radius: 10px;
      text-align: left;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>TeamUp Global</h2>

  <!-- LOGIN -->
  <div id="auth">
    <button onclick="login()">Continue with Google</button>
  </div>

  <!-- APP -->
  <div id="app" style="display:none;">
    <p id="welcome"></p>

    <div id="chatBox"></div>

    <input id="message" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>

    <br><br>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:b80b61d82df788cc0339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const email = document.getElementById("email");
const password = document.getElementById("password");
const message = document.getElementById("message");
const welcome = document.getElementById("welcome");
const chatBox = document.getElementById("chatBox");

const authDiv = document.getElementById("auth");
const appDiv = document.getElementById("app");

let currentUser = null;
let unsubscribe = null;

window.signup = function () {
  createUserWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

window.login = function () {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    authDiv.style.display = "none";
    appDiv.style.display = "block";
    welcome.innerText = "Welcome " + user.email;

    startChat();
  } else {
    currentUser = null;
    authDiv.style.display = "block";
    appDiv.style.display = "none";

    if (unsubscribe) unsubscribe();
  }
});

window.sendMessage = async function () {
  if (!currentUser) return;

  const text = message.value.trim();
  if (!text) return;

  try {
    await addDoc(collection(db, "messages"), {
      text: text,
      user: currentUser.email,
      createdAt: serverTimestamp()
    });

    message.value = "";
  } catch (e) {
    alert("Error sending message: " + e.message);
  }
};

function startChat() {
  if (unsubscribe) unsubscribe();

  const q = query(collection(db, "messages"), orderBy("createdAt"));

  unsubscribe = onSnapshot(q, snapshot => {
    chatBox.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      if (!data.text || !data.user) return;

      const div = document.createElement("div");
      div.className = "message " + (data.user === currentUser.email ? "me" : "other");
      div.innerText = data.text;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  }, error => {
    console.log("Firestore error:", error);
  });
}

window.logout = function () {
  signOut(auth);
};
</script>
