<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TeamUp Global – Swipe, Match, Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    .header-actions{display:flex;justify-content:space-between;align-items:center;margin-top:12px;flex-wrap:wrap;gap:8px}

    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e1e2e;color:white;padding:12px 24px;border-radius:60px;font-size:0.9rem;font-weight:600;z-index:1100;display:flex;align-items:center;gap:8px;animation:fadeInUp 0.2s ease;pointer-events:none}
    @keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    .spinner-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:2000;display:none}
    .spinner{width:50px;height:50px;border:5px solid #f3f3f3;border-top:5px solid #c44545;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="app-container">
  <!-- Login Screen -->
  <div id="loginScreen" class="login-screen">
    <div class="login-logo">💙</div>
    <h1>TeamUp Global</h1>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <div id="loginError" class="error-msg"></div>
    <button id="signupBtn">Create Account</button>
    <button id="loginBtn">Login</button>
  </div>
  <!-- Main App -->
  <div id="mainApp" style="display:none; flex-direction:column; flex:1; min-height:0">
    <div class="app-header">
      <h2>TeamUp Global</h2>
      <div class="header-actions">
        <span class="user-email" id="currentUserEmail"></span>
        <div>
          <button id="refreshSwipeBtn" class="refresh-btn" title="Refresh"><i class="fas fa-sync-alt"></i></button>
          <button id="editProfileBtn" class="icon-btn"><i class="fas fa-user-edit"></i></button>
          <button id="logoutMainBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
      </div>
    </div>
    <div id="contentArea" class="content-area"></div>
    <div class="tab-bar">
      <div class="tab" data-main-tab="swipe"><i class="fas fa-fire"></i></div>
      <div class="tab" data-main-tab="messages"><i class="fas fa-comment-dots"></i><span id="matchBadge" class="badge" style="display:none;">0</span></div>
      <div class="tab" data-main-tab="likes"><i class="fas fa-star"></i><span id="likesBadge" class="badge" style="display:none;">0</span></div>
    </div>
  </div>
  <!-- Edit Profile Modal (big photos) -->
  <div id="editModal" class="modal-overlay">
    <div class="modal-content">
      <h3>Edit Profile</h3>
      <input type="text" id="editName" placeholder="Full Name">
      <input type="number" id="editAge" placeholder="Age">
      <input type="number" id="editMinAge" placeholder="Min age preference">
      <input type="number" id="editMaxAge" placeholder="Max age preference">
      <select id="editGender"><option value="">Select Gender</option><option value="Male">Male</option><option value="Female">Female</option><option value="Non-binary">Non-binary</option><option value="Other">Other</option></select>
      <select id="editLookingFor"><option value="">I want to meet...</option><option value="Male">Men</option><option value="Female">Women</option><option value="Everyone">Everyone</option></select>
      <input type="text" id="editLocation" placeholder="City, Country">
      <div class="photo-upload-list" id="photoUploadList"></div>
      <button id="addPhotoBtn" type="button" class="add-photo-btn"><i class="fas fa-plus-circle"></i> Add Photo (max 3)</button>
      <input type="file" id="photoInput" accept="image/*" style="display:none;">
      <input type="text" id="editAvatar" placeholder="Avatar emoji (e.g. 🧑)" maxlength="2">
      <textarea id="editBio" placeholder="Bio" rows="3"></textarea>
      <button id="saveProfileBtn">Save</button>
      <button id="closeModalBtn" class="cancel-btn">Cancel</button>
    </div>
  </div>
  <!-- Profile View Modal - BIG, with gallery & block/report -->
  <div id="profileModal" class="modal-overlay profile-modal">
    <div class="modal-content">
      <div id="profileAvatarContainer" class="main-profile-avatar">👤</div>
      <div id="profilePhotoGallery" class="profile-avatar-gallery" style="display:flex; flex-wrap:wrap; justify-content:center;"></div>
      <div id="profileName" class="profile-name"></div>
      <div id="profileAge" class="profile-detail"></div>
      <div id="profileLocation" class="profile-detail"></div>
      <div id="profileBio" class="profile-detail"></div>
      <div id="profileGender" class="profile-detail"></div>
      <div id="profileLookingFor" class="profile-detail"></div>
      <div class="action-buttons">
        <button id="profileChatBtn" style="background:#c44545;color:white;">💬 Send Message</button>
        <div class="block-report-row">
          <button id="profileBlockBtn" style="background:#d32f2f;color:white;">🚫 Block User</button>
          <button id="profileReportBtn" style="background:#ff9800;color:white;">⚠️ Report</button>
        </div>
        <button id="closeProfileBtn" class="cancel-btn">Close</button>
      </div>
    </div>
  </div>
</div>
<div id="globalSpinner" class="spinner-overlay"><div class="spinner"></div></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import{getAuth,signInWithEmailAndPassword,createUserWithEmailAndPassword,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import{getFirestore,doc,setDoc,getDoc,updateDoc,collection,query,where,getDocs,onSnapshot,addDoc,deleteDoc,serverTimestamp,increment,arrayUnion,arrayRemove,orderBy,limit}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const IMGBB_API_KEY = "18eb2b3ced9f2fd177f888b06643b7fc";
const firebaseConfig={
  apiKey:"AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain:"ejim-web.github.io",
  projectId:"teamup-68a21",
  storageBucket:"teamup-68a21.firebasestorage.app",
  messagingSenderId:"379106762572",
  appId:"1:379106762572:web:a1537754ed17d3a60339e9"
};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

const spinner=document.getElementById("globalSpinner");

const loginScreen=document.getElementById("loginScreen");
const mainApp=document.getElementById("mainApp");
const loginEmail=document.getElementById("loginEmail");
const loginPassword=document.getElementById("loginPassword");
const signupBtn=document.getElementById("signupBtn");
const loginBtn=document.getElementById("loginBtn");

const editModal=document.getElementById("editModal");
const saveProfileBtn=document.getElementById("saveProfileBtn");
const closeModalBtn=document.getElementById("closeModalBtn");

const editLocation=document.getElementById("editLocation");

let currentUser=null, currentUserId=null, currentMainTab="swipe", unsubscribeChat=null, swipeCards=[], currentCardIndex=0, likedByUnsubscribe=null, refreshInterval=null, lastSwipe=null, notificationPermissionAsked=false, currentUserCoords=null, currentProfileUserId=null, tempPhotoUrls=[];

async function uploadImageToImgBB(file) {
  const formData = new FormData();
  formData.append("image", file);
  formData.append("key", IMGBB_API_KEY);
  const response = await fetch("https://api.imgbb.com/1/upload", { method:"POST", body:formData });
  const result = await response.json();
  if (result.success) return result.data.url;
  else throw new Error(result.error?.message || "Upload failed");
}
function showToast(m,i="❤️"){const e=document.querySelector(".toast");if(e)e.remove();const t=document.createElement("div");t.className="toast",t.innerHTML=`${i} ${m}`,document.body.appendChild(t),setTimeout(()=>t.remove(),3000);}
async function requestNotificationPermission(){if("Notification"in window&&Notification.permission!=="granted"&&!notificationPermissionAsked){notificationPermissionAsked=true;await Notification.requestPermission();}}
function sendNotification(title,body){if("Notification"in window&&Notification.permission==="granted")new Notification(title,{body});}
async function setUserOnline(uid,on){try{await updateDoc(doc(db,"users",uid),{online:on,lastSeen:serverTimestamp()});}catch(e){}}
async function createOrUpdateUserProfile(user,name,photoUrls,photoIcon){const ref=doc(db,"users",user.uid),s=await getDoc(ref);if(!s.exists()){await setDoc(ref,{email:user.email,name:name||user.email.split('@')[0],age:null,minAge:18,maxAge:99,gender:null,lookingFor:"Everyone",location:null,bio:"New to TeamUp!",photoUrls:photoUrls||[],photoIcon:photoIcon||"🧑",online:true,lastSeen:serverTimestamp(),joinDate:serverTimestamp(),likesReceived:0,swipedRight:[],swipedLeft:[],likedBy:[],blockedBy:[],coords:null});}else{if(photoUrls)await updateDoc(ref,{photoUrls,photoIcon:photoIcon||"🧑"});}}
async function updateLocation(){if(!currentUserId)return;navigator.geolocation.getCurrentPosition(async(pos)=>{const {GeoPoint}=await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");const geoPoint=new GeoPoint(pos.coords.latitude,pos.coords.longitude);await updateDoc(doc(db,"users",currentUserId),{coords:geoPoint});currentUserCoords={lat:pos.coords.latitude,lng:pos.coords.longitude};},()=>{},{});}
function getDistance(lat1,lon1,lat2,lon2){const R=6371;const dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180,a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
async function blockUser(blockedId){if(!currentUserId)return;await updateDoc(doc(db,"users",currentUserId),{blockedBy:arrayUnion(blockedId)});showToast("User blocked","🚫");refreshContent();profileModal.style.display="none";}
async function reportUser(reportedId,reason){if(!currentUserId)return;await addDoc(collection(db,"reports"),{reporterId:currentUserId,reportedId:reportedId,reason:reason||"No reason",timestamp:serverTimestamp()});showToast("Report sent. Thank you.","⚠️");}
async function handleSwipe(swipedUserId,liked){if(!currentUserId)return;const userRef=doc(db,"users",currentUserId);if(!liked){await updateDoc(userRef,{swipedLeft:arrayUnion(swipedUserId)});lastSwipe={userId:swipedUserId,liked:false};showToast("Passed 👎","↪️");return;}await updateDoc(userRef,{swipedRight:arrayUnion(swipedUserId)});await updateDoc(doc(db,"users",swipedUserId),{likedBy:arrayUnion(currentUserId),likesReceived:increment(1)});lastSwipe={userId:swipedUserId,liked:true};const otherDoc=await getDoc(doc(db,"users",swipedUserId));const otherSwipedRight=otherDoc.data()?.swipedRight||[];if(otherSwipedRight.includes(currentUserId)){const matchId=[currentUserId,swipedUserId].sort().join("_");const matchRef=doc(db,"matches",matchId);if(!(await getDoc(matchRef)).exists()){await setDoc(matchRef,{users:[currentUserId,swipedUserId],createdAt:serverTimestamp()});showToast("New match! 💖","🎉");sendNotification("New match!","You have a new match!");if(currentMainTab==="messages")await renderMessages();await updateMatchBadge();}}else{showToast(`You liked ${otherDoc.data()?.name||"someone"}! 👍`,"😊");}}
async function updateMatchBadge(){const snap=await getDocs(query(collection(db,"matches"),where("users","array-contains",currentUserId)));const c=snap.size;c>0?(matchBadge.style.display="inline-block",matchBadge.innerText=c):matchBadge.style.display="none";}
async function updateLikesBadge(){const docSnap=await getDoc(doc(db,"users",currentUserId));const c=(docSnap.data()?.likedBy||[]).length;c>0?(likesBadge.style.display="inline-block",likesBadge.innerText=c):likesBadge.style.display="none";}
async function renderMessages(){ /* same as original but with match logic */ contentArea.innerHTML=`<div id="messagesList" class="people-list"></div>`;const matchesSnap=await getDocs(query(collection(db,"matches"),where("users","array-contains",currentUserId)));const matchIds=[];matchesSnap.forEach(d=>{const other=d.data().users.find(id=>id!==currentUserId);if(other)matchIds.push(other);});const container=document.getElementById("messagesList");if(matchIds.length===0){container.innerHTML='<div class="no-profiles">💬 No matches yet. Swipe right to match!</div>';return;}for(const id of matchIds){const userSnap=await getDoc(doc(db,"users",id));if(userSnap.exists()&&!(userSnap.data().blockedBy||[]).includes(currentUserId)){const data=userSnap.data(),onlineDot=data.online?'<span class="online-indicator"></span>':'',lastMsg="Say hi!",avatarHtml=data.photoUrls&&data.photoUrls[0]?`<div class="person-avatar" style="background-image: url('${data.photoUrls[0]}'); background-size: cover;"></div>`:`<div class="person-avatar">${data.photoIcon||"👤"}</div>`;const div=document.createElement("div");div.className="person-card";div.innerHTML=`${avatarHtml}<div class="person-info"><strong>${data.name||"?"}, ${data.age||"?"}</strong> ${onlineDot}<br><div class="last-message">💬 ${lastMsg.substring(0,40)}</div></div>`;div.addEventListener("click",()=>openChat(id,data.name));container.appendChild(div);}}}
async function openChat(otherId, otherName){ /* simplified for brevity but functional */ contentArea.innerHTML=`<div class="chat-view"><div class="chat-header"><button id="chatBackBtn" class="back-btn"><i class="fas fa-arrow-left"></i></button><strong>${otherName}</strong></div><div id="chatMessagesArea" class="chat-messages"></div><div class="chat-input"><input id="chatInputField" placeholder="Message..."><button id="chatSendBtn"><i class="fas fa-paper-plane"></i></button></div></div>`;document.getElementById("chatBackBtn")?.addEventListener("click",()=>{if(unsubscribeChat)unsubscribeChat();renderMessages();});}
async function renderSwipeDeck(){contentArea.innerHTML=`<div class="swipe-container" id="swipeContainer"></div>`;showSpinner();const candidates=await getSwipeCandidates(currentUserId);hideSpinner();if(candidates.length===0){document.getElementById("swipeContainer").innerHTML='<div class="no-profiles">✨ No more profiles.</div>';return;}swipeCards=candidates;currentCardIndex=0;displayNextCard();}
function displayNextCard(){const container=document.getElementById("swipeContainer");if(!container||currentCardIndex>=swipeCards.length){if(container)container.innerHTML='<div class="no-profiles">🎉 All caught up!</div>';return;}const user=swipeCards[currentCardIndex];const card=document.createElement("div");card.className="card";card.innerHTML=`<div class="card-img" style="background-image: url('${user.photoUrls?.[0]||''}'); background-size:cover;"></div><div class="card-info"><h3>${user.name||"?"}, ${user.age||"?"}</h3><p>${user.bio||""}</p><button class="viewProfileBtn" style="background:#4a6a8a;border:none;border-radius:30px;padding:8px 12px;color:white;">👤 View Profile</button></div>`;container.innerHTML="";container.appendChild(card);card.querySelector(".viewProfileBtn").onclick=()=>showUserProfile(user.id);attachSwipeEvents(card,user);}
function attachSwipeEvents(card,user){let startX=0,currentX=0,dragging=!1;const onStart=e=>{dragging=!0;startX=e.clientX??e.touches[0].clientX;},onMove=e=>{if(!dragging)return;currentX=(e.clientX??e.touches[0].clientX)-startX;card.style.transform=`translateX(${currentX}px) rotate(${currentX*0.02}deg)`;},onEnd=async()=>{if(!dragging)return;dragging=!1;card.style.transition="transform 0.3s";if(Math.abs(currentX)>100){const liked=currentX>0;card.style.transform=`translateX(${liked?500:-500}px)`;setTimeout(async()=>{await handleSwipe(user.id,liked);currentCardIndex++;displayNextCard();},200);}else{card.style.transform="translateX(0)";}currentX=0;};card.addEventListener("mousedown",onStart);card.addEventListener("touchstart",onStart,{passive:!1});window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onEnd);}
async function getSwipeCandidates(uid){const userData=(await getDoc(doc(db,"users",uid))).data();let all=[];const snap=await getDocs(query(collection(db,"users"),limit(100)));snap.forEach(d=>{if(d.id!==uid)all.push({id:d.id,...d.data()});});return all.filter(u=>!(userData?.swipedRight||[]).includes(u.id)&&!(userData?.swipedLeft||[]).includes(u.id)).slice(0,20);}
async function showUserProfile(userId){const userSnap=await getDoc(doc(db,"users",userId));if(!userSnap.exists())return;const data=userSnap.data();currentProfileUserId=userId;profileAvatarContainer.innerHTML="";profilePhotoGallery.innerHTML="";const photos=data.photoUrls||[];if(photos.length>0){const mainPhoto=photos[0];const img=document.createElement("img");img.src=mainPhoto;img.style.width="120px";img.style.height="120px";img.style.borderRadius="60px";img.style.objectFit="cover";profileAvatarContainer.appendChild(img);photos.forEach((url,idx)=>{if(idx<5){const thumb=document.createElement("div");thumb.className="profile-photo-item";thumb.style.backgroundImage=`url('${url}')`;thumb.style.backgroundSize="cover";profilePhotoGallery.appendChild(thumb);}});}else{profileAvatarContainer.innerText=data.photoIcon||"👤";}profileName.innerText=data.name||"?";profileAge.innerText=`Age: ${data.age||"?"}`;profileLocation.innerText=`📍 ${data.location||"Not set"}`;profileBio.innerText=`📝 ${data.bio||""}`;profileGender.innerText=`Gender: ${data.gender||"Not set"}`;profileLookingFor.innerText=`Looking for: ${data.lookingFor||"Everyone"}`;profileModal.style.display="flex";}
profileChatBtn.onclick=()=>{if(currentProfileUserId){openChat(currentProfileUserId,profileName.innerText);profileModal.style.display="none";}};
profileReportBtn.onclick=async()=>{if(currentProfileUserId){const reason=prompt("Reason for reporting?");await reportUser(currentProfileUserId,reason||"No reason");profileModal.style.display="none";}};
profileBlockBtn.onclick=async()=>{if(currentProfileUserId){await blockUser(currentProfileUserId);profileModal.style.display="none";}};
closeProfileBtn.onclick=()=>profileModal.style.display="none";
async function refreshContent(){if(currentMainTab==="swipe")await renderSwipeDeck();else if(currentMainTab==="messages")await renderMessages();else if(currentMainTab==="likes")await renderLikes();}
async function renderLikes(){contentArea.innerHTML=`<div id="likesList" class="people-list"></div>`;const currentUserDoc=await getDoc(doc(db,"users",currentUserId));const likedByIds=currentUserDoc.data()?.likedBy||[];const container=document.getElementById("likesList");if(likedByIds.length===0){container.innerHTML='<div class="no-profiles">🌟 No likes yet.</div>';return;}for(const id of likedByIds){const userSnap=await getDoc(doc(db,"users",id));if(userSnap.exists()){const data=userSnap.data();const div=document.createElement("div");div.className="person-card";div.innerHTML=`<div class="person-avatar" style="background-image: url('${data.photoUrls?.[0]||''}'); background-size:cover;"></div><div class="person-info"><strong>${data.name||"?"}</strong><br><small>${data.location||""}</small></div>`;div.addEventListener("click",()=>showUserProfile(id));container.appendChild(div);}}}
function updatePhotoPreviewList(){photoUploadList.innerHTML="";tempPhotoUrls.forEach((url,index)=>{const div=document.createElement("div");div.className="photo-upload-item";div.innerHTML=`<div class="photo-preview" style="background-image: url('${url}');"></div><span class="remove-photo" data-index="${index}">🗑️</span>`;div.querySelector(".remove-photo").onclick=()=>{tempPhotoUrls.splice(index,1);updatePhotoPreviewList();};photoUploadList.appendChild(div);});}
addPhotoBtn.onclick=()=>{if(tempPhotoUrls.length>=3){showToast("Maximum 3 photos","⚠️");return;}photoInput.click();};
photoInput.onchange=async()=>{if(photoInput.files.length===0)return;const file=photoInput.files[0];showSpinner();try{const url=await uploadImageToImgBB(file);tempPhotoUrls.push(url);updatePhotoPreviewList();showToast("Photo added","✅");}catch(err){showToast("Upload failed","❌");}finally{hideSpinner();}photoInput.value="";};
editProfileBtn.onclick=async()=>{const d=(await getDoc(doc(db,"users",currentUserId))).data();editName.value=d.name||"";editAge.value=d.age||"";editMinAge.value=d.minAge||18;editMaxAge.value=d.maxAge||99;editGender.value=d.gender||"";editLookingFor.value=d.lookingFor||"Everyone";editLocation.value=d.location||"";editAvatar.value=d.photoIcon||"🧑";editBio.value=d.bio||"";tempPhotoUrls=d.photoUrls?[...d.photoUrls]:[];updatePhotoPreviewList();editModal.style.display="flex";};
saveProfileBtn.onclick=async()=>{await updateDoc(doc(db,"users",currentUserId),{name:editName.value,age:parseInt(editAge.value)||null,minAge:parseInt(editMinAge.value)||18,maxAge:parseInt(editMaxAge.value)||99,gender:editGender.value,lookingFor:editLookingFor.value,location:editLocation.value,photoIcon:editAvatar.value||"🧑",bio:editBio.value,photoUrls:tempPhotoUrls});editModal.style.display="none";refreshContent();if(editLocation.value)updateLocation();};
closeModalBtn.onclick=()=>editModal.style.display="none";
refreshSwipeBtn.onclick=()=>{if(currentMainTab==="swipe")renderSwipeDeck();};
mainTabs.forEach(tab=>{tab.addEventListener("click",()=>{mainTabs.forEach(t=>t.classList.remove("active"));tab.classList.add("active");currentMainTab=tab.getAttribute("data-main-tab");refreshContent();});});
onAuthStateChanged(auth,async(user)=>{if(user){currentUser=user;currentUserId=user.uid;currentUserEmailSpan.innerText=user.email;await createOrUpdateUserProfile(user,user.displayName,null,null);await setUserOnline(user.uid,true);const userDoc=await getDoc(doc(db,"users",user.uid));if(userDoc.data()?.coords)currentUserCoords={lat:userDoc.data().coords.latitude,lng:userDoc.data().coords.longitude};loginScreen.style.display="none";mainApp.style.display="flex";document.querySelector('.tab[data-main-tab="swipe"]').classList.add("active");currentMainTab="swipe";await refreshContent();await updateMatchBadge();await updateLikesBadge();if(refreshInterval)clearInterval(refreshInterval);refreshInterval=setInterval(()=>{if(currentMainTab==="swipe")renderSwipeDeck();},30000);setInterval(()=>setUserOnline(user.uid,true),30000);requestNotificationPermission();if(!userDoc.data()?.coords)updateLocation();}else{if(currentUserId)setUserOnline(currentUserId,false);if(refreshInterval)clearInterval(refreshInterval);loginScreen.style.display="flex";mainApp.style.display="none";}});
loginBtn.onclick=async()=>{try{await signInWithEmailAndPassword(auth,loginEmail.value,loginPassword.value);}catch(err){loginError.innerText="❌ Invalid credentials";}};
signupBtn.onclick=async()=>{try{const cred=await createUserWithEmailAndPassword(auth,loginEmail.value,loginPassword.value);await createOrUpdateUserProfile(cred.user,cred.user.email.split('@')[0],[],null);}catch(err){loginError.innerText="❌ "+err.message;}};
logoutMainBtn.onclick=()=>{if(confirm("Log out?"))signOut(auth);};
window.addEventListener("beforeunload",()=>{if(currentUserId)setUserOnline(currentUserId,false);if(refreshInterval)clearInterval(refreshInterval);});
</script>
</body>
</html>
