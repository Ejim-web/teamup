<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .header {
      text-align: center;
      padding: 20px;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
    }

    .logo {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: white;
      color: #ff4b2b;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: auto;
      font-weight: bold;
      font-size: 24px;
    }

    #auth {
      text-align: center;
      margin-top: 40px;
    }

    input {
      width: 80%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 20px;
      border: none;
    }

    button {
      padding: 12px 20px;
      border-radius: 20px;
      border: none;
      background: #ff4b2b;
      color: white;
      font-weight: bold;
    }

    #chatBox {
      height: 60vh;
      overflow-y: auto;
      padding: 10px;
    }

    .message {
      padding: 10px;
      margin: 6px;
      border-radius: 20px;
      max-width: 70%;
    }

    .me {
      background: #ff4b2b;
      margin-left: auto;
    }

    .other {
      background: #1e293b;
    }

    .input-area {
      display: flex;
      padding: 10px;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
    }

    #logout {
      float: right;
      margin: 10px;
      background: red;
    }
  </style>
</head>

<body>

<div class="header">
  <div class="logo">TG</div>
  <h2>TeamUp Global</h2>
</div>

<div id="auth">
  <input id="name" placeholder="Full Name"><br>
  <input id="email" placeholder="Email"><br>
  <input id="password" placeholder="Password" type="password"><br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <button id="logout" onclick="logout()">Logout</button>
  <p id="welcome"></p>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="message" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut,
  updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:b80b61d82df788cc0339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const nameInput = document.getElementById("name");
const email = document.getElementById("email");
const password = document.getElementById("password");
const message = document.getElementById("message");

const chatBox = document.getElementById("chatBox");
const welcome = document.getElementById("welcome");

const authDiv = document.getElementById("auth");
const appDiv = document.getElementById("app");

let currentUser;

window.signup = async function () {
  const userCred = await createUserWithEmailAndPassword(auth, email.value, password.value);

  // ✅ SAVE FULL NAME
  await updateProfile(userCred.user, {
    displayName: nameInput.value
  });
};

window.login = function () {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;

    authDiv.style.display = "none";
    appDiv.style.display = "block";

    // ✅ SHOW NAME NOT EMAIL
    welcome.innerText = "Hi, " + (user.displayName || "User");

    loadMessages();
  } else {
    authDiv.style.display = "block";
    appDiv.style.display = "none";
  }
});

window.sendMessage = async function () {
  if (!message.value) return;

  await addDoc(collection(db, "messages"), {
    text: message.value,
    name: currentUser.displayName || "User",
    user: currentUser.email,
    createdAt: serverTimestamp()
  });

  message.value = "";
};

function loadMessages() {
  const q = query(collection(db, "messages"), orderBy("createdAt"));

  onSnapshot(q, snapshot => {
    chatBox.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");

      div.className = "message " +
        (data.user === currentUser.email ? "me" : "other");

      // ✅ FIXED NAME ISSUE
      div.innerText = (data.name || "User") + ": " + data.text;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

window.logout = function () {
  signOut(auth);
};
</script>

</body>
</html>
