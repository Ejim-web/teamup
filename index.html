<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
      text-align: center;
    }

    .profile {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: white;
      margin: 20px auto;
      overflow: hidden;
      cursor: pointer;
    }

    .profile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    input {
      width: 80%;
      padding: 12px;
      margin: 8px;
      border-radius: 20px;
      border: none;
    }

    button {
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: white;
      color: #ff4b2b;
      font-weight: bold;
    }

    #chatBox {
      height: 250px;
      overflow-y: auto;
      background: rgba(255,255,255,0.2);
      margin: 10px;
      border-radius: 15px;
      padding: 10px;
    }

    .msg {
      padding: 8px;
      margin: 5px;
      border-radius: 15px;
      max-width: 70%;
      clear: both;
    }

    .me {
      background: white;
      color: #ff4b2b;
      float: right;
    }

    .other {
      background: rgba(255,255,255,0.7);
      color: black;
      float: left;
    }

    #usersList div {
      background: white;
      color: black;
      margin: 5px;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<input type="file" id="file" hidden>

<div class="profile" onclick="file.click()">
  <img id="dp">
</div>

<h2>TeamUp Global</h2>

<div id="auth">
  <input id="name" placeholder="Full Name"><br>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <h3 id="welcome"></h3>

  <div id="usersList"></div>

  <div id="chatBox"></div>

  <input id="msg" placeholder="Type message">
  <button onclick="send()">Send</button>

  <br><br>
  <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword,
  signInWithEmailAndPassword, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore, doc, setDoc, getDoc,
  collection, getDocs, addDoc,
  query, orderBy, onSnapshot, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let me, selected = null;

const dp = document.getElementById("dp");
const file = document.getElementById("file");

/* SIGNUP */
window.signup = async () => {
  try {
    const cred = await createUserWithEmailAndPassword(
      auth,
      email.value,
      password.value
    );

    await setDoc(doc(db, "users", cred.user.uid), {
      name: name.value,
      email: cred.user.email,
      photo: ""
    });

  } catch (e) {
    alert(e.message);
  }
};

/* LOGIN */
window.login = () => {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

/* AUTH STATE */
onAuthStateChanged(auth, async user => {
  if (user) {
    me = user;
    authDiv.style.display = "none";
    app.style.display = "block";

    const snap = await getDoc(doc(db, "users", user.uid));
    const data = snap.data();

    welcome.innerText = "Welcome " + data.name;

    if (data.photo) dp.src = data.photo;

    loadUsers();
  }
});

/* USERS */
async function loadUsers() {
  const snap = await getDocs(collection(db, "users"));
  usersList.innerHTML = "<h3>Select User</h3>";

  snap.forEach(d => {
    if (d.id === me.uid) return;

    const u = d.data();

    const div = document.createElement("div");
    div.innerText = u.name || u.email;

    div.onclick = () => openChat(d.id, u.name);

    usersList.appendChild(div);
  });
}

/* CHAT */
function openChat(uid, name) {
  selected = uid;
  welcome.innerText = "Chat with " + name;

  const id = [me.uid, uid].sort().join("_");

  const q = query(
    collection(db, "chats", id, "messages"),
    orderBy("createdAt")
  );

  onSnapshot(q, snap => {
    chatBox.innerHTML = "";

    snap.forEach(d => {
      const m = d.data();
      const div = document.createElement("div");

      div.className = "msg " + (m.sender === me.uid ? "me" : "other");
      div.innerText = m.text;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

/* SEND */
window.send = async () => {
  if (!selected) return alert("Select user");

  const id = [me.uid, selected].sort().join("_");

  await addDoc(collection(db, "chats", id, "messages"), {
    text: msg.value,
    sender: me.uid,
    createdAt: serverTimestamp()
  });

  msg.value = "";
};

/* LOGOUT */
window.logout = async () => {
  await signOut(auth);
  location.reload();
};

/* PROFILE */
file.onchange = () => {
  const reader = new FileReader();
  reader.onload = async e => {
    dp.src = e.target.result;

    await setDoc(doc(db, "users", me.uid), {
      photo: e.target.result
    }, { merge: true });
  };
  reader.readAsDataURL(file.files[0]);
};
</script>

</body>
</html>
