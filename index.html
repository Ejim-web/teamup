<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 30px auto 10px;
      border-radius: 50%;
      background: white;
      color: #ff4b2b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
    }

    input {
      padding: 12px;
      border-radius: 20px;
      border: none;
      width: 80%;
      margin: 5px;
    }

    button {
      padding: 12px 20px;
      border-radius: 25px;
      border: none;
      background: white;
      color: #ff4b2b;
      font-weight: bold;
      margin-top: 10px;
    }

    #chatBox {
      height: 300px;
      overflow-y: auto;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 10px;
      margin: 20px;
    }

    .message {
      padding: 10px;
      margin: 5px;
      border-radius: 20px;
      max-width: 70%;
    }

    .me {
      background: white;
      color: #ff4b2b;
      margin-left: auto;
    }

    .other {
      background: rgba(255,255,255,0.6);
      color: black;
      margin-right: auto;
    }
  </style>
</head>

<body>

<div class="logo">TG</div>
<h1>TeamUp Global</h1>

<!-- LOGIN -->
<div id="auth">
  <button onclick="login()">Continue with Google</button>
</div>

<!-- PROFILE SETUP -->
<div id="setup" style="display:none;">
  <h3>Complete Profile</h3>
  <input id="name" placeholder="Full Name"><br>
  <input id="dob" type="date"><br>
  <input id="location" placeholder="Location"><br>
  <button onclick="saveProfile()">Continue</button>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;">
  <p id="welcome"></p>

  <div id="chatBox"></div>

  <input id="message" placeholder="Type message">
  <button onclick="sendMessage()">Send</button>

  <br><br>
  <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithRedirect,
  getRedirectResult,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:b80b61d82df788cc0339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

const provider = new GoogleAuthProvider();

let currentUser;

window.login = async () => {
  await signInWithRedirect(auth, provider);
};

getRedirectResult(auth).catch(()=>{});

onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;

    const userRef = doc(db, "users", user.uid);
    const snap = await getDoc(userRef);

    if (!snap.exists()) {
      document.getElementById("auth").style.display = "none";
      document.getElementById("setup").style.display = "block";
      return;
    }

    startApp(snap.data());

  } else {
    document.getElementById("auth").style.display = "block";
    document.getElementById("setup").style.display = "none";
    document.getElementById("app").style.display = "none";
  }
});

window.saveProfile = async () => {
  const name = document.getElementById("name").value;
  const dob = document.getElementById("dob").value;
  const location = document.getElementById("location").value;

  if (!name || !dob || !location) {
    alert("Fill everything");
    return;
  }

  await setDoc(doc(db, "users", currentUser.uid), {
    name,
    dob,
    location,
    email: currentUser.email
  });

  startApp({ name });
};

function startApp(userData) {
  document.getElementById("auth").style.display = "none";
  document.getElementById("setup").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("welcome").innerText = "Welcome " + userData.name;

  loadMessages();
}

window.sendMessage = async () => {
  const text = document.getElementById("message").value;
  if (!text) return;

  await addDoc(collection(db, "messages"), {
    text,
    user: currentUser.uid,
    createdAt: serverTimestamp()
  });

  document.getElementById("message").value = "";
};

function loadMessages() {
  const q = query(collection(db, "messages"), orderBy("createdAt"));

  onSnapshot(q, snap => {
    const chatBox = document.getElementById("chatBox");
    chatBox.innerHTML = "";

    snap.forEach(doc => {
      const data = doc.data();
      const div = document.createElement("div");

      div.className = "message " + (data.user === currentUser.uid ? "me" : "other");
      div.innerText = data.text;

      chatBox.appendChild(div);
    });
  });
}

window.logout = () => signOut(auth);
</script>

</body>
</html>
