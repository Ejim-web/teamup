<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 30px auto 10px;
      border-radius: 50%;
      background: white;
      color: #ff4b2b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
    }

    button {
      padding: 14px 20px;
      border-radius: 25px;
      border: none;
      background: white;
      color: #ff4b2b;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    #chatBox {
      height: 250px;
      overflow-y: auto;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 10px;
      margin: 20px;
    }

    .message {
      padding: 10px;
      margin: 5px 0;
      border-radius: 20px;
      max-width: 70%;
      display: inline-block;
      clear: both;
    }

    .me {
      background: white;
      color: #ff4b2b;
      float: right;
    }

    .other {
      background: rgba(255,255,255,0.6);
      color: black;
      float: left;
    }

    .input-area {
      display: flex;
      gap: 10px;
      margin: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 12px;
      border-radius: 20px;
      border: none;
    }

    #users {
      margin: 10px;
      max-height: 120px;
      overflow-y: auto;
    }

    .user {
      background: rgba(255,255,255,0.3);
      margin: 5px;
      padding: 8px;
      border-radius: 15px;
      cursor: pointer;
    }

    #logout {
      width: 90%;
      margin: 10px;
      background: rgba(255,255,255,0.3);
      color: white;
    }
  </style>
</head>

<body>

<div class="logo">TG</div>
<h1>TeamUp Global</h1>

<div id="auth">
  <button onclick="googleLogin()">Continue with Google</button>
</div>

<div id="app" style="display:none;">
  <p id="welcome"></p>

  <h3>Select User</h3>
  <div id="users"></div>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="message" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
  </div>

  <button id="logout" onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp,
  setDoc,
  doc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:b80b61d82df788cc0339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const provider = new GoogleAuthProvider();

const message = document.getElementById("message");
const welcome = document.getElementById("welcome");
const chatBox = document.getElementById("chatBox");
const usersDiv = document.getElementById("users");

const authDiv = document.getElementById("auth");
const appDiv = document.getElementById("app");

let currentUser;
let selectedUserId = null;

// 🔐 LOGIN
window.googleLogin = async function () {
  await signInWithPopup(auth, provider);
};

// 🔄 AUTH STATE
onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;

    authDiv.style.display = "none";
    appDiv.style.display = "block";

    welcome.innerText = "Welcome " + (user.displayName || user.email);

    // Save user in Firestore
    await setDoc(doc(db, "users", user.uid), {
      name: user.displayName || user.email,
      uid: user.uid
    });

    loadUsers();

  } else {
    authDiv.style.display = "block";
    appDiv.style.display = "none";
  }
});

// 👥 LOAD USERS
async function loadUsers() {
  usersDiv.innerHTML = "";

  const snapshot = await getDocs(collection(db, "users"));

  snapshot.forEach(docSnap => {
    const data = docSnap.data();

    if (data.uid === currentUser.uid) return;

    const div = document.createElement("div");
    div.className = "user";
    div.innerText = data.name;

    div.onclick = () => {
      selectedUserId = data.uid;
      loadMessages();
    };

    usersDiv.appendChild(div);
  });
}

// 💬 SEND MESSAGE
window.sendMessage = async function () {
  if (!selectedUserId) {
    alert("Select a user first");
    return;
  }

  const text = message.value;
  if (!text) return;

  const chatId = [currentUser.uid, selectedUserId].sort().join("_");

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text,
    sender: currentUser.uid,
    createdAt: serverTimestamp()
  });

  message.value = "";
};

// 📩 LOAD PRIVATE MESSAGES
function loadMessages() {
  if (!selectedUserId) return;

  const chatId = [currentUser.uid, selectedUserId].sort().join("_");

  const q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("createdAt")
  );

  onSnapshot(q, snapshot => {
    chatBox.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "message " + (data.sender === currentUser.uid ? "me" : "other");
      div.innerText = data.text;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

// 🚪 LOGOUT
window.logout = function () {
  signOut(auth);
};
</script>

</body>
</html>
