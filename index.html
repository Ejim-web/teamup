<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 30px auto 10px;
      border-radius: 50%;
      background: white;
      color: #ff4b2b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
      overflow: hidden;
      cursor: pointer;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    input {
      width: 80%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 20px;
      border: none;
    }

    button {
      padding: 12px 18px;
      border-radius: 20px;
      border: none;
      background: white;
      color: #ff4b2b;
      font-weight: bold;
      cursor: pointer;
    }

    #chatBox {
      height: 300px;
      overflow-y: auto;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 10px;
      margin: 20px;
    }

    .message {
      padding: 10px;
      margin: 5px 0;
      border-radius: 20px;
      max-width: 70%;
      display: inline-block;
      clear: both;
    }

    .me {
      background: white;
      color: #ff4b2b;
      float: right;
    }

    .other {
      background: rgba(255,255,255,0.6);
      color: black;
      float: left;
    }

    .input-area {
      display: flex;
      gap: 10px;
      margin: 10px;
    }

    .input-area input {
      flex: 1;
    }

    #logout {
      width: 90%;
      margin: 10px;
      background: rgba(255,255,255,0.3);
      color: white;
    }
  </style>
</head>

<body>

<!-- PROFILE -->
<input type="file" id="profileInput" accept="image/*" style="display:none">

<div class="logo" onclick="profileInput.click()">
  <img id="profileImage" style="display:none;">
  <span id="initials">TG</span>
</div>

<h1>TeamUp Global</h1>

<!-- AUTH -->
<div id="auth">
  <input type="text" id="username" placeholder="Username"><br>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <p id="welcome"></p>

  <!-- START CHAT -->
  <input id="chatUser" placeholder="Enter username to chat">
  <button onclick="startChat()">Start Chat</button>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="message" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
  </div>

  <button id="logout" onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:b80b61d82df788cc0339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// DOM
const usernameInput = document.getElementById("username");
const email = document.getElementById("email");
const password = document.getElementById("password");
const message = document.getElementById("message");
const welcome = document.getElementById("welcome");
const chatBox = document.getElementById("chatBox");
const authDiv = document.getElementById("auth");
const appDiv = document.getElementById("app");

let currentUser;
let currentChatId = null;

// AUTH
window.signup = async function () {
  try {
    const userCred = await createUserWithEmailAndPassword(auth, email.value, password.value);

    await setDoc(doc(db, "users", userCred.user.uid), {
      username: usernameInput.value,
      email: email.value
    });

  } catch (e) {
    alert(e.message);
  }
};

window.login = function () {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;

    const userDoc = await getDoc(doc(db, "users", user.uid));
    const data = userDoc.data();

    currentUser.username = data.username;

    authDiv.style.display = "none";
    appDiv.style.display = "block";
    welcome.innerText = "Welcome " + data.username;

  } else {
    authDiv.style.display = "block";
    appDiv.style.display = "none";
  }
});

// START PRIVATE CHAT
window.startChat = function () {
  const otherUser = document.getElementById("chatUser").value;
  if (!otherUser) return;

  currentChatId = [currentUser.username, otherUser].sort().join("_");
  loadMessages();
};

// SEND MESSAGE
window.sendMessage = async function () {
  if (!currentChatId) return alert("Start a chat first");

  await addDoc(collection(db, "chats", currentChatId, "messages"), {
    text: message.value,
    user: currentUser.username,
    createdAt: serverTimestamp()
  });

  message.value = "";
};

// LOAD MESSAGES
function loadMessages() {
  const q = query(
    collection(db, "chats", currentChatId, "messages"),
    orderBy("createdAt")
  );

  onSnapshot(q, snapshot => {
    chatBox.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "message " + (data.user === currentUser.username ? "me" : "other");
      div.innerText = data.text;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

window.logout = function () {
  signOut(auth);
};

// PROFILE IMAGE
const profileInput = document.getElementById("profileInput");
const profileImage = document.getElementById("profileImage");
const initials = document.getElementById("initials");

profileInput.addEventListener("change", function () {
  const file = this.files[0];

  if (file) {
    const reader = new FileReader();

    reader.onload = function (e) {
      profileImage.src = e.target.result;
      profileImage.style.display = "block";
      initials.style.display = "none";
      localStorage.setItem("profilePic", e.target.result);
    };

    reader.readAsDataURL(file);
  }
});

// LOAD SAVED PROFILE
window.addEventListener("load", () => {
  const saved = localStorage.getItem("profilePic");
  if (saved) {
    profileImage.src = saved;
    profileImage.style.display = "block";
    initials.style.display = "none";
  }
});
</script>

</body>
</html>
