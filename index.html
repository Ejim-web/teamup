<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeamUp Global – Real Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
    body { background: #eef2f9; height: 100vh; display: flex; justify-content: center; align-items: center; padding: 12px; }
    .screen { width: 100%; max-width: 550px; height: 90vh; background: white; border-radius: 32px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2); overflow: hidden; display: flex; flex-direction: column; }
    #loginScreen { justify-content: center; align-items: center; gap: 20px; padding: 24px; }
    #loginScreen h2 { font-size: 2rem; background: linear-gradient(135deg, #1e3c72, #2a4f8c); -webkit-background-clip: text; background-clip: text; color: transparent; }
    #loginScreen input { width: 100%; padding: 14px 18px; border: 1px solid #cfdfed; border-radius: 44px; font-size: 1rem; }
    #loginScreen button { background: #1e3c72; color: white; border: none; padding: 12px; border-radius: 44px; width: 100%; font-weight: 600; cursor: pointer; }
    #signupBtn { background: #2c5a8c; margin-top: 4px; }
    .app-header { background: #1e3c72; color: white; padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; }
    .main-layout { display: flex; flex: 1; overflow: hidden; }
    .contacts-panel { width: 40%; background: white; border-right: 1px solid #eef2ff; overflow-y: auto; }
    .chat-area { flex: 1; display: flex; flex-direction: column; background: #fbfdff; display: none; }
    .chat-header { padding: 14px 18px; background: white; border-bottom: 1px solid #ecf3fa; display: flex; align-items: center; gap: 12px; }
    .avatar-small { width: 44px; height: 44px; background: #eef2ff; border-radius: 32px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .messages-container { flex: 1; overflow-y: auto; padding: 18px 14px; display: flex; flex-direction: column; gap: 12px; }
    .message-bubble { max-width: 80%; padding: 10px 14px; border-radius: 22px; word-break: break-word; }
    .message-user { align-self: flex-end; background: #2563eb; color: white; border-bottom-right-radius: 6px; }
    .message-contact { align-self: flex-start; background: #eef2ff; color: #0f172a; border-bottom-left-radius: 6px; }
    .input-row { display: flex; gap: 10px; padding: 14px 16px 20px; background: white; border-top: 1px solid #eef2ff; }
    .input-row input { flex: 1; padding: 12px 16px; border: 1px solid #cfdfed; border-radius: 40px; }
    .input-row button { background: #1e3c72; border: none; color: white; width: 48px; border-radius: 48px; cursor: pointer; }
    .contact-item { display: flex; align-items: center; gap: 12px; padding: 14px 12px; border-bottom: 1px solid #eff3f8; cursor: pointer; }
    .contact-avatar { width: 46px; height: 46px; background: #eef2ff; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .contact-info { flex: 1; }
    .contact-name { font-weight: 600; font-size: 0.9rem; }
    .contact-sub { font-size: 0.7rem; color: #6c86a3; }
    .chat-action { font-size: 0.7rem; background: #eef2ff; padding: 5px 10px; border-radius: 30px; color: #2563eb; }
    .loading-text { text-align: center; padding: 20px; color: gray; }
  </style>
</head>
<body>

<div id="loginScreen" class="screen">
  <h2><i class="fas fa-globe-americas"></i> TeamUp Global</h2>
  <input type="email" id="loginEmail" placeholder="Email address">
  <input type="password" id="loginPassword" placeholder="Password">
  <button id="loginBtn">Log in</button>
  <button id="signupBtn">Create account</button>
</div>

<div id="chatScreen" class="screen" style="display:none">
  <div class="app-header">
    <h3>TeamUp Global</h3>
    <div><span id="currentUserEmail"></span> <button id="logoutBtn" style="background:none;border:none;color:white;margin-left:10px;"><i class="fas fa-sign-out-alt"></i></button></div>
  </div>
  <div class="main-layout">
    <div class="contacts-panel" id="contactList"><div class="loading-text">Loading contacts...</div></div>
    <div id="chatArea" class="chat-area">
      <div class="chat-header" id="chatHeader"></div>
      <div class="messages-container" id="messagesContainer"><div class="loading-text">Select a contact</div></div>
      <div class="input-row"><input type="text" id="messageInput" placeholder="Type a message..."><button id="sendMsgBtn"><i class="fas fa-paper-plane"></i></button></div>
    </div>
  </div>
</div>

<script type="module">
  const firebaseConfig = {
    apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
    authDomain: "teamup-68a21.firebaseapp.com",
    projectId: "teamup-68a21",
    storageBucket: "teamup-68a21.firebasestorage.app",
    messagingSenderId: "379106762572",
    appId: "1:379106762572:web:a1537754ed17d3a60339e9",
    measurementId: "G-EJ59MW0TMC"
  };

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // DOM elements
  const loginScreen = document.getElementById("loginScreen");
  const chatScreen = document.getElementById("chatScreen");
  const loginEmail = document.getElementById("loginEmail");
  const loginPassword = document.getElementById("loginPassword");
  const loginBtn = document.getElementById("loginBtn");
  const signupBtn = document.getElementById("signupBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const currentUserSpan = document.getElementById("currentUserEmail");
  const contactListDiv = document.getElementById("contactList");
  const chatArea = document.getElementById("chatArea");
  const chatHeader = document.getElementById("chatHeader");
  const messagesContainer = document.getElementById("messagesContainer");
  const messageInput = document.getElementById("messageInput");
  const sendMsgBtn = document.getElementById("sendMsgBtn");

  let currentUser = null;
  let activeContact = null;
  let unsubscribeMessages = null;

  // STATIC CONTACTS (always shown, no Firestore read needed)
  const CONTACTS = [
    { email: "ejim.edu@teamup.com", name: "EJim Edu", initials: "EE" },
    { email: "ejim.chinedu@teamup.com", name: "EJim Chinedu", initials: "EC" },
    { email: "carterbruno611@gmail.com", name: "carterbruno611@gmail.com", initials: "CA" },
    { email: "evans.u@teamup.com", name: "Evans Uchechukwu", initials: "E" },
    { email: "ejim.boniface@teamup.com", name: "EJim Boniface", initials: "EB" }
  ];

  function renderContacts() {
    contactListDiv.innerHTML = "";
    for (const c of CONTACTS) {
      const div = document.createElement("div");
      div.className = "contact-item";
      div.innerHTML = `
        <div class="contact-avatar">${escapeHtml(c.initials)}</div>
        <div class="contact-info">
          <div class="contact-name">${escapeHtml(c.name)}</div>
          <div class="contact-sub">${escapeHtml(c.email)}</div>
        </div>
        <div class="chat-action"><i class="fas fa-comment"></i> Chat</div>
      `;
      div.addEventListener("click", () => openChat(c.email, c.name, c.initials));
      contactListDiv.appendChild(div);
    }
  }

  function getRoomId(userEmail, contactEmail) {
    return [userEmail, contactEmail].sort().join("__");
  }

  async function openChat(contactEmail, contactName, contactInitials) {
    if (!currentUser) return;
    if (unsubscribeMessages) unsubscribeMessages();

    activeContact = { email: contactEmail, name: contactName, initials: contactInitials };
    chatArea.style.display = "flex";
    chatHeader.innerHTML = `<div class="avatar-small">${escapeHtml(contactInitials)}</div><div><strong>${escapeHtml(contactName)}</strong><br><small>${escapeHtml(contactEmail)}</small></div>`;

    const roomId = getRoomId(currentUser.email, contactEmail);
    const messagesRef = collection(db, "chats", roomId, "messages");
    const q = query(messagesRef, orderBy("timestamp", "asc"));

    unsubscribeMessages = onSnapshot(q, (snapshot) => {
      messagesContainer.innerHTML = "";
      if (snapshot.empty) {
        messagesContainer.innerHTML = '<div class="loading-text">No messages yet. Say hi!</div>';
      } else {
        snapshot.forEach(docSnap => {
          const msg = docSnap.data();
          const isUser = msg.senderId === currentUser.email;
          const bubble = document.createElement("div");
          bubble.className = `message-bubble ${isUser ? "message-user" : "message-contact"}`;
          bubble.innerText = msg.text;
          messagesContainer.appendChild(bubble);
        });
      }
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }, (error) => {
      console.warn("Error loading messages:", error);
      messagesContainer.innerHTML = '<div class="loading-text">⚠️ Unable to load messages. Check Firestore rules.</div>';
    });
  }

  async function sendMessage() {
    const text = messageInput.value.trim();
    if (!text || !activeContact || !currentUser) return;
    const roomId = getRoomId(currentUser.email, activeContact.email);
    const messagesRef = collection(db, "chats", roomId, "messages");
    try {
      await addDoc(messagesRef, {
        text: text,
        senderId: currentUser.email,
        senderName: currentUser.email,
        timestamp: serverTimestamp()
      });
      messageInput.value = "";
    } catch (err) {
      alert("Send failed: " + err.message);
    }
  }

  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Auth
  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
      currentUserSpan.innerText = user.email;
      loginScreen.style.display = "none";
      chatScreen.style.display = "flex";
      renderContacts();  // This instantly removes "Loading contacts..."
      chatArea.style.display = "none";
    } else {
      currentUser = null;
      if (unsubscribeMessages) unsubscribeMessages();
      loginScreen.style.display = "flex";
      chatScreen.style.display = "none";
    }
  });

  loginBtn.onclick = async () => {
    try {
      await signInWithEmailAndPassword(auth, loginEmail.value, loginPassword.value);
    } catch (err) { alert("Login error: " + err.message); }
  };
  signupBtn.onclick = async () => {
    try {
      await createUserWithEmailAndPassword(auth, loginEmail.value, loginPassword.value);
    } catch (err) { alert("Signup error: " + err.message); }
  };
  logoutBtn.onclick = () => signOut(auth);
  sendMsgBtn.onclick = sendMessage;
  messageInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
</script>
</body>
</html>
