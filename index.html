<!DOCTYPE html><html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 30px auto 10px;
      border-radius: 50%;
      background: white;
      color: #ff4b2b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
    }

    button {
      padding: 14px 20px;
      border-radius: 25px;
      border: none;
      background: white;
      color: #ff4b2b;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
    }

    #chatBox {
      height: 300px;
      overflow-y: auto;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 10px;
      margin: 20px;
    }

    .message {
      padding: 10px;
      margin: 5px 0;
      border-radius: 20px;
      max-width: 70%;
      display: inline-block;
      clear: both;
    }

    .me {
      background: white;
      color: #ff4b2b;
      float: right;
    }

    .other {
      background: rgba(255,255,255,0.6);
      color: black;
      float: left;
    }

    .input-area {
      display: flex;
      gap: 10px;
      margin: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 12px;
      border-radius: 20px;
      border: none;
    }

    #logout {
      width: 90%;
      margin: 10px;
      background: rgba(255,255,255,0.3);
      color: white;
    }
  </style></head><body><div class="logo">TG</div>
<h1>TeamUp Global</h1><div id="auth">
  <button onclick="googleLogin()">Continue with Google</button>
</div><div id="app" style="display:none;">
  <p id="welcome"></p>  <div id="chatBox"></div>  <div class="input-area">
    <input id="message" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
  </div><button id="logout" onclick="logout()">Logout</button>

</div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged,
  signOut,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:b80b61d82df788cc0339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const provider = new GoogleAuthProvider();

const message = document.getElementById("message");
const welcome = document.getElementById("welcome");
const chatBox = document.getElementById("chatBox");

const authDiv = document.getElementById("auth");
const appDiv = document.getElementById("app");

let currentUser;
let unsubscribe = null;

// ✅ KEEP SESSION
setPersistence(auth, browserLocalPersistence);

// ✅ GOOGLE LOGIN
window.googleLogin = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch (e) {
    alert(e.message);
  }
};

// ✅ FIX LOOP (delay UI change)
onAuthStateChanged(auth, user => {
  setTimeout(() => {
    if (user) {
      currentUser = user;

      authDiv.style.display = "none";
      appDiv.style.display = "block";

      welcome.innerText = "Welcome " + (user.displayName || user.email);

      loadMessages();
    } else {
      authDiv.style.display = "block";
      appDiv.style.display = "none";

      if (unsubscribe) unsubscribe();
    }
  }, 300); // 🔥 small delay fixes mobile issue
});

// SEND MESSAGE
window.sendMessage = async () => {
  const text = message.value;
  if (!text) return;

  await addDoc(collection(db, "messages"), {
    text,
    user: currentUser.uid,
    createdAt: serverTimestamp()
  });

  message.value = "";
};

// LOAD MESSAGES
function loadMessages() {
  if (unsubscribe) unsubscribe();

  const q = query(collection(db, "messages"), orderBy("createdAt"));

  unsubscribe = onSnapshot(q, snapshot => {
    chatBox.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "message " + (data.user === currentUser.uid ? "me" : "other");
      div.innerText = data.text;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

// LOGOUT
window.logout = () => signOut(auth);
</script></body>
</html>
