<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
      margin: 0;
      padding: 20px;
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 20px;
      border: none;
      width: 80%;
    }

    button {
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      background: white;
      color: #ff416c;
      margin: 5px;
      font-weight: bold;
    }

    .box {
      background: rgba(255,255,255,0.2);
      padding: 20px;
      border-radius: 20px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <h1>TeamUp Global</h1>

  <div class="box">
    <h3>Sign Up</h3>
    <input id="signupEmail" type="email" placeholder="Email"><br>
    <input id="signupPassword" type="password" placeholder="Password"><br>
    <button onclick="signup()">Sign Up</button>
  </div>

  <div class="box">
    <h3>Login</h3>
    <input id="loginEmail" type="email" placeholder="Email"><br>
    <input id="loginPassword" type="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
  </div>

  <script>
    function signup() {
      let email = document.getElementById("signupEmail").value;
      let password = document.getElementById("signupPassword").value;

      localStorage.setItem(email, password);
      alert("Account created successfully!");
    }

    function login() {
      let email = document.getElementById("loginEmail").value;
      let password = document.getElementById("loginPassword").value;

      let savedPassword = localStorage.getItem(email);

      if (savedPassword === password) {
        localStorage.setItem("loggedInUser", email);
        window.location.href = "chat.html";
      } else {
        alert("Wrong email or password!");
      }
    }
  </script>

</body>
</html>
