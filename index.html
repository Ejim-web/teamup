<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    header {
      background: #075E54;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    #auth, #app {
      padding: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 5px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #25D366;
      color: white;
      font-weight: bold;
      margin-top: 5px;
      width: 100%;
    }

    .list {
      background: white;
      border-radius: 10px;
      margin-top: 10px;
    }

    .item {
      padding: 12px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    #chatBox {
      height: 300px;
      overflow-y: auto;
      background: #e5ddd5;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
    }

    .msg {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      max-width: 70%;
    }

    .me {
      background: #dcf8c6;
      margin-left: auto;
    }

    .other {
      background: white;
    }

    .input-area {
      display: flex;
      gap: 5px;
      margin-top: 10px;
    }

    .input-area input {
      flex: 1;
    }
  </style>
</head>

<body>

<header>TeamUp Global</header>

<div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" placeholder="Password" type="password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <p id="welcome"></p>

  <h3>Chats</h3>
  <div id="chatList" class="list"></div>

  <h3>Start Chat</h3>
  <div id="userList" class="list"></div>

  <h3 id="chatTitle"></h3>
  <div id="chatBox"></div>

  <div class="input-area">
    <input id="message" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
  </div>

  <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword,
  signInWithEmailAndPassword, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore, collection, addDoc, onSnapshot,
  query, orderBy, serverTimestamp, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9",
  measurementId: "G-EJ59MWCTMC"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let currentUser;
let currentChatId = null;
let unsubscribe;

const chatBox = document.getElementById("chatBox");

window.signup = () => {
  createUserWithEmailAndPassword(auth, email.value, password.value);
};

window.login = () => {
  signInWithEmailAndPassword(auth, email.value, password.value);
};

onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("welcome").innerText = user.email;

    loadUsers();
    loadChats();
  }
});

async function loadUsers() {
  const usersDiv = document.getElementById("userList");
  usersDiv.innerHTML = "";

  const users = await getDocs(collection(db, "users"));

  users.forEach(doc => {
    const u = doc.data();

    if (!u.email || u.email === currentUser.email) return;

    const div = document.createElement("div");
    div.className = "item";
    div.innerText = u.email;

    div.onclick = () => startChat(u.email);

    usersDiv.appendChild(div);
  });
}

async function loadChats() {
  const chatList = document.getElementById("chatList");
  chatList.innerHTML = "";

  const chats = await getDocs(collection(db, "chats"));

  chats.forEach(doc => {
    const data = doc.data();

    if (!data.users.includes(currentUser.email)) return;

    const other = data.users.find(u => u !== currentUser.email);

    const div = document.createElement("div");
    div.className = "item";
    div.innerText = other;

    div.onclick = () => openChat(doc.id, other);

    chatList.appendChild(div);
  });
}

async function startChat(otherUser) {
  const chatId = [currentUser.email, otherUser].sort().join("_");

  await addDoc(collection(db, "chats"), {
    id: chatId,
    users: [currentUser.email, otherUser]
  });

  openChat(chatId, otherUser);
}

function openChat(chatId, otherUser) {
  currentChatId = chatId;
  document.getElementById("chatTitle").innerText = "Chat with " + otherUser;

  if (unsubscribe) unsubscribe();

  const q = query(
    collection(db, "messages"),
    orderBy("createdAt")
  );

  unsubscribe = onSnapshot(q, snapshot => {
    chatBox.innerHTML = "";

    snapshot.forEach(doc => {
      const msg = doc.data();

      if (msg.chatId !== currentChatId) return;

      const div = document.createElement("div");
      div.className = "msg " + (msg.user === currentUser.email ? "me" : "other");
      div.innerText = msg.text;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

window.sendMessage = async () => {
  const text = document.getElementById("message").value.trim();
  if (!text || !currentChatId) return;

  await addDoc(collection(db, "messages"), {
    text,
    user: currentUser.email,
    chatId: currentChatId,
    createdAt: serverTimestamp()
  });

  document.getElementById("message").value = "";
};

window.logout = () => signOut(auth);
</script>

</body>
  </html>
