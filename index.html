<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#ece5dd; }
    .header { background:#075e54; color:white; padding:15px; text-align:center; font-weight:bold; }
    input, button {
      width:90%; padding:12px; margin:8px;
      border-radius:20px; border:none;
    }
    button { background:#25d366; color:white; }
    #usersList div {
      padding:12px;
      background:white;
      border-bottom:1px solid #ddd;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="header">TeamUp Global</div>

<div id="auth">
  <input id="name" placeholder="Name">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <p id="welcome"></p>
  <h3>Users</h3>
  <div id="usersList"></div>
  <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword,
  signInWithEmailAndPassword, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore, collection, getDocs,
  doc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const usersList = document.getElementById("usersList");
const email = document.getElementById("email");
const password = document.getElementById("password");
const nameInput = document.getElementById("name");

let currentUser;

/* AUTH */
window.signup = async () => {
  const cred = await createUserWithEmailAndPassword(auth, email.value, password.value);
  await setDoc(doc(db, "users", cred.user.uid), {
    name: nameInput.value || cred.user.email,
    email: cred.user.email
  });
  alert("Account created");
};

window.login = () => {
  signInWithEmailAndPassword(auth, email.value, password.value);
};

onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    auth.style.display = "none";
    app.style.display = "block";
    document.getElementById("welcome").innerText = "Welcome " + user.email;
    loadUsers();
  }
});

/* LOAD USERS */
async function loadUsers() {
  const snap = await getDocs(collection(db, "users"));
  usersList.innerHTML = "";

  snap.forEach(d => {
    if (d.id === currentUser.uid) return;

    const div = document.createElement("div");
    div.innerText = d.data().name || d.data().email;

    div.onclick = () => {
      localStorage.setItem("chatUserId", d.id);
      localStorage.setItem("chatUserName", div.innerText);
      window.location.href = "chat.html";
    };

    usersList.appendChild(div);
  });
}

window.logout = () => signOut(auth);
</script>

</body>
</html>
