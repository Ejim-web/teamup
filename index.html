<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global Dating</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg,#ff416c,#ff4b2b);
      color: white;
      text-align: center;
    }

    .card {
      background: white;
      color: black;
      border-radius: 20px;
      padding: 20px;
      margin: 20px;
    }

    img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
    }

    button {
      padding: 12px;
      border-radius: 20px;
      border: none;
      margin: 5px;
      font-weight: bold;
    }

    #chatBox {
      height: 200px;
      overflow-y: auto;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      margin: 10px;
      padding: 10px;
    }
  </style>
</head>

<body>

<h1>🔥 TeamUp Global</h1>

<div id="auth">
  <button onclick="login()">Login with Google</button>
</div>

<div id="setup" style="display:none;">
  <h3>Complete Profile</h3>
  <input id="name" placeholder="Full name"><br><br>
  <input id="age" placeholder="Age"><br><br>
  <input id="location" placeholder="Location"><br><br>
  <button onclick="saveProfile()">Continue</button>
</div>

<div id="app" style="display:none;">

  <h3 id="welcome"></h3>

  <!-- MATCH AREA -->
  <div id="matchCard" class="card"></div>

  <button onclick="like()">❤️ Like</button>
  <button onclick="skip()">❌ Skip</button>

  <!-- CHAT -->
  <div id="chatBox"></div>

  <input id="msg" placeholder="Message">
  <button onclick="send()">Send</button>

  <br><br>
  <button onclick="logout()">Logout</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth, GoogleAuthProvider,
  signInWithRedirect, getRedirectResult,
  onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore, doc, setDoc, getDoc,
  collection, getDocs, addDoc,
  query, orderBy, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const provider = new GoogleAuthProvider();

let currentUser;
let users = [];
let currentIndex = 0;
let currentMatch = null;

/* LOGIN */
window.login = () => signInWithRedirect(auth, provider);
getRedirectResult(auth);

/* AUTH */
onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;

    const docRef = doc(db, "users", user.uid);
    const snap = await getDoc(docRef);

    if (!snap.exists()) {
      document.getElementById("setup").style.display = "block";
      document.getElementById("auth").style.display = "none";
    } else {
      startApp(snap.data());
    }

  } else {
    document.getElementById("auth").style.display = "block";
  }
});

/* SAVE PROFILE */
window.saveProfile = async () => {
  const data = {
    name: name.value,
    age: age.value,
    location: location.value,
    photo: currentUser.photoURL
  };

  await setDoc(doc(db,"users",currentUser.uid), data);
  startApp(data);
};

/* START APP */
async function startApp(data) {
  document.getElementById("setup").style.display = "none";
  document.getElementById("app").style.display = "block";

  welcome.innerText = "Welcome " + data.name;

  const snapshot = await getDocs(collection(db,"users"));
  users = snapshot.docs.map(d => ({id:d.id,...d.data()}))
    .filter(u => u.id !== currentUser.uid);

  showUser();
}

/* SHOW USER */
function showUser() {
  if (!users[currentIndex]) return;

  const u = users[currentIndex];

  matchCard.innerHTML = `
    <img src="${u.photo}">
    <h3>${u.name}</h3>
    <p>${u.age} - ${u.location}</p>
  `;
}

/* LIKE */
window.like = () => {
  currentMatch = users[currentIndex];
  startChat();
};

/* SKIP */
window.skip = () => {
  currentIndex++;
  showUser();
};

/* CHAT */
function startChat() {
  const chatId = [currentUser.uid, currentMatch.id].sort().join("_");

  const q = query(collection(db,"chats",chatId,"messages"), orderBy("time"));

  onSnapshot(q, snap => {
    chatBox.innerHTML = "";

    snap.forEach(d => {
      const m = d.data();
      chatBox.innerHTML += `<div>${m.text}</div>`;
    });
  });

  window.send = async () => {
    await addDoc(collection(db,"chats",chatId,"messages"), {
      text: msg.value,
      time: Date.now()
    });
    msg.value="";
  };
}

/* LOGOUT */
window.logout = () => signOut(auth);

</script>

</body>
</html>
