<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    .header {
      background: #0f6d5b;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .section {
      padding: 10px;
    }

    .user {
      background: white;
      padding: 12px;
      margin-bottom: 8px;
      border-radius: 8px;
    }

    button {
      margin-top: 5px;
      padding: 6px 10px;
      border: none;
      border-radius: 5px;
      background: #0f6d5b;
      color: white;
      cursor: pointer;
    }

    .requests {
      background: #fff3cd;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="header">TeamUp Global</div>

<div class="section">
  <h3>Friend Requests</h3>
  <div id="requests"></div>
</div>

<div class="section">
  <h3>All Users</h3>
  <div id="users"></div>
</div>

<!-- ✅ Firebase v10 (MODULAR - CORRECT) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, collection, onSnapshot, addDoc, query, where, doc, updateDoc, deleteDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 🔥 YOUR CONFIG (INSERTED)
  const firebaseConfig = {
    apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
    authDomain: "teamup-68a21.firebaseapp.com",
    projectId: "teamup-68a21",
    storageBucket: "teamup-68a21.firebasestorage.app",
    messagingSenderId: "379106762572",
    appId: "1:379106762572:web:a1537754ed17d3a60339e9",
    measurementId: "G-EJ59MW0TMC"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser;

  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
      loadUsers();
      loadRequests();
    } else {
      window.location.href = "login.html";
    }
  });

  // 🔹 LOAD USERS
  function loadUsers() {
    const usersRef = collection(db, "users");

    onSnapshot(usersRef, (snapshot) => {
      let html = "";

      snapshot.forEach(docSnap => {
        const data = docSnap.data();

        if (docSnap.id !== currentUser.uid) {
          html += `
            <div class="user">
              ${data.name || data.email}
              <br>
              <button onclick="sendRequest('${docSnap.id}')">Add Friend</button>
            </div>
          `;
        }
      });

      document.getElementById("users").innerHTML = html;
    });
  }

  // 🔹 SEND REQUEST
  window.sendRequest = async function(toUserId) {
    await addDoc(collection(db, "friendRequests"), {
      from: currentUser.uid,
      to: toUserId,
      status: "pending",
      time: Date.now()
    });

    alert("Friend request sent!");
  }

  // 🔹 LOAD REQUESTS
  function loadRequests() {
    const q = query(
      collection(db, "friendRequests"),
      where("to", "==", currentUser.uid),
      where("status", "==", "pending")
    );

    onSnapshot(q, (snapshot) => {
      let html = "";

      snapshot.forEach(docSnap => {
        const data = docSnap.data();

        html += `
          <div class="requests">
            Request from: ${data.from}
            <br><br>
            <button onclick="acceptRequest('${docSnap.id}', '${data.from}')">Accept</button>
            <button onclick="rejectRequest('${docSnap.id}')">Reject</button>
          </div>
        `;
      });

      document.getElementById("requests").innerHTML = html;
    });
  }

  // 🔹 ACCEPT REQUEST
  window.acceptRequest = async function(id, senderId) {
    await updateDoc(doc(db, "friendRequests", id), {
      status: "accepted"
    });

    await updateDoc(doc(db, "users", currentUser.uid), {
      friends: arrayUnion(senderId)
    });

    await updateDoc(doc(db, "users", senderId), {
      friends: arrayUnion(currentUser.uid)
    });

    alert("Friend added!");
  }

  // 🔹 REJECT REQUEST
  window.rejectRequest = async function(id) {
    await deleteDoc(doc(db, "friendRequests", id));
  }

</script>

</body>
</html>
