<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    #chatBox {
      height: 85vh;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      margin: 8px 0;
      padding: 10px;
      border-radius: 12px;
      max-width: 70%;
      display: block;
    }

    .me {
      background: #22c55e;
      margin-left: auto;
      text-align: right;
    }

    .other {
      background: #334155;
      margin-right: auto;
    }

    .name {
      font-size: 12px;
      opacity: 0.7;
    }

    .time {
      font-size: 10px;
      opacity: 0.6;
      margin-top: 4px;
    }

    #inputArea {
      display: flex;
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #1e293b;
    }

    input {
      flex: 1;
      padding: 15px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button {
      padding: 15px;
      background: #ff416c;
      border: none;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="chatBox"></div>

<div id="inputArea">
  <input id="messageInput" placeholder="Type message..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9",
  measurementId: "G-EJ59MW0TMC"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ✅ YOUR REAL DATA (ALREADY FILLED)
const chatId = "1s0Xrq7TsGezT9Jjy9bfNBOzGoa2_JJkhG9ImM9Xucxx9sKPgSh5Tk972";
const currentUserId = "JJkhG9ImM9Xucxx9sKPgSh5Tk972";
const currentUserName = "You"; // change to your name if you want

const chatBox = document.getElementById("chatBox");

// ================= SEND =================
window.sendMessage = async function () {
  const input = document.getElementById("messageInput");
  const text = input.value.trim();

  if (!text) return;

  await addDoc(
    collection(db, "chats", chatId, "messages"),
    {
      text: text,
      senderId: currentUserId,
      senderName: currentUserName,
      timestamp: serverTimestamp()
    }
  );

  input.value = "";
};

// ================= LISTEN =================
const q = query(
  collection(db, "chats", chatId, "messages"),
  orderBy("timestamp", "asc")
);

onSnapshot(q, (snapshot) => {
  chatBox.innerHTML = "";

  snapshot.forEach((doc) => {
    const msg = doc.data();

    const div = document.createElement("div");
    div.classList.add("msg");

    if (msg.senderId === currentUserId) {
      div.classList.add("me");
    } else {
      div.classList.add("other");
    }

    const name = document.createElement("div");
    name.className = "name";
    name.innerText = msg.senderName || "User";

    const text = document.createElement("div");
    text.innerText = msg.text;

    const time = document.createElement("div");
    time.className = "time";

    if (msg.timestamp) {
      const date = msg.timestamp.toDate();
      time.innerText = date.toLocaleTimeString();
    }

    div.appendChild(name);
    div.appendChild(text);
    div.appendChild(time);

    chatBox.appendChild(div);
  });

  chatBox.scrollTop = chatBox.scrollHeight;
});
</script>

</body>
</html>
