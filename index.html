<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"><title>TeamUp Debug</title><style>body{font-family:monospace;padding:20px;background:#1a1a2e;color:white;}input,button{display:block;width:100%;margin:10px 0;padding:10px;border-radius:30px;border:none;}.error{color:#ff8888;margin-top:10px;white-space:pre-wrap;}</style></head><body><h2>TeamUp Global – Debug Mode</h2><input type="email" id="email" placeholder="Email"><input type="password" id="password" placeholder="Password"><button id="loginBtn">Login</button><button id="signupBtn">Create Account</button><div class="divider">or</div><button id="googleBtn">Sign in with Google</button><div id="error" class="error"></div><script type="module">import{initializeApp}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";import{getAuth,signInWithEmailAndPassword,createUserWithEmailAndPassword,signInWithPopup,GoogleAuthProvider,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";import{getFirestore,doc,setDoc}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";const config={apiKey:"AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",authDomain:"ejim-web.github.io",projectId:"teamup-68a21",storageBucket:"teamup-68a21.firebasestorage.app",messagingSenderId:"379106762572",appId:"1:379106762572:web:a1537754ed17d3a60339e9"};const app=initializeApp(config);const auth=getAuth(app);const db=getFirestore(app);const provider=new GoogleAuthProvider();const errorDiv=document.getElementById("error");function showError(msg){errorDiv.innerText="❌ "+msg;}document.getElementById("loginBtn").onclick=async()=>{try{await signInWithEmailAndPassword(auth,email.value,password.value);alert("Logged in!");}catch(err){showError(err.message);}};document.getElementById("signupBtn").onclick=async()=>{try{const cred=await createUserWithEmailAndPassword(auth,email.value,password.value);await setDoc(doc(db,"users",cred.user.uid),{email:cred.user.email,name:email.value.split('@')[0],age:null,gender:null,lookingFor:"Everyone",location:null,bio:"New user",photoIcon:"👤",online:true,lastSeen:new Date(),joinDate:new Date(),likesReceived:0,swipedRight:[],swipedLeft:[],likedBy:[]});alert("Account created and profile saved!");}catch(err){showError(err.message);}};document.getElementById("googleBtn").onclick=async()=>{try{const result=await signInWithPopup(auth,provider);await setDoc(doc(db,"users",result.user.uid),{email:result.user.email,name:result.user.displayName||result.user.email.split('@')[0],age:null,gender:null,lookingFor:"Everyone",location:null,bio:"New user",photoIcon:result.user.photoURL?null:"👤",photoUrl:result.user.photoURL||null,online:true,lastSeen:new Date(),joinDate:new Date(),likesReceived:0,swipedRight:[],swipedLeft:[],likedBy:[]});alert("Google sign-in successful!");}catch(err){showError(err.message);}};onAuthStateChanged(auth,user=>{if(user)console.log("User logged in:",user.email);});</script></body></html>
