<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    h1 {
      margin-bottom: 40px;
    }

    button {
      width: 100%;
      padding: 15px;
      border-radius: 30px;
      border: none;
      font-size: 16px;
      margin-bottom: 15px;
      cursor: pointer;
    }

    .google {
      background: white;
      color: black;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>TeamUp</h1>

  <button class="google" onclick="googleLogin()">
    Continue with Google
  </button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithRedirect,
  getRedirectResult
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:b80b61d82df788cc0339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔥 GOOGLE LOGIN (MOBILE FIX)
window.googleLogin = function () {
  const provider = new GoogleAuthProvider();
  signInWithRedirect(auth, provider);
};

// 🔥 HANDLE REDIRECT RESULT
getRedirectResult(auth)
  .then((result) => {
    if (result && result.user) {
      alert("Welcome " + result.user.email);
    }
  })
  .catch((error) => {
    alert(error.message);
  });

</script>

</body>
</html>
