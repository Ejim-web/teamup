<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #cfc7bd;
      text-align: center;
    }

    header {
      background: #0f6d5c;
      color: white;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    input {
      width: 90%;
      padding: 15px;
      margin: 10px;
      border-radius: 20px;
      border: none;
      font-size: 16px;
    }

    button {
      width: 90%;
      padding: 15px;
      margin: 10px;
      border-radius: 25px;
      border: none;
      background: #2ecc71;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    #home {
      display: none;
    }

    .user {
      padding: 15px;
      border-bottom: 1px solid #ddd;
      background: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>TeamUp Global</header>

<div id="auth">
  <input type="text" id="name" placeholder="Name">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="signUp()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="home">
  <h3 id="welcome"></h3>
  <h2>Users</h2>
  <div id="usersList"></div>
</div>

<!-- FIREBASE CDN -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
  // YOUR CONFIG (FIXED)
  const firebaseConfig = {
    apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
    authDomain: "teamup-68a21.firebaseapp.com",
    projectId: "teamup-68a21",
    storageBucket: "teamup-68a21.appspot.com",
    messagingSenderId: "379106762572",
    appId: "1:379106762572:web:a1537754ed17d3a60339e9"
  };

  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();

  // SIGN UP
  function signUp() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, password)
    .then((userCredential) => {
      const user = userCredential.user;

      return db.collection("users").doc(user.uid).set({
        name: name,
        email: email
      });
    })
    .then(() => {
      alert("Account created!");
    })
    .catch(err => alert(err.message));
  }

  // LOGIN
  function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
    .catch(err => alert(err.message));
  }

  // AUTH STATE
  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById("auth").style.display = "none";
      document.getElementById("home").style.display = "block";

      document.getElementById("welcome").innerText =
        "Welcome " + user.email;

      loadUsers(user.uid);
    }
  });

  // LOAD USERS
  function loadUsers(currentUid) {
    const list = document.getElementById("usersList");
    list.innerHTML = "";

    db.collection("users").get().then(snapshot => {
      snapshot.forEach(doc => {
        if (doc.id === currentUid) return;

        const div = document.createElement("div");
        div.className = "user";
        div.innerText = doc.data().name || doc.data().email;

        div.onclick = () => openChat(doc.id, div.innerText);

        list.appendChild(div);
      });
    });
  }

  // OPEN CHAT PAGE
  function openChat(uid, name) {
    localStorage.setItem("chatUserId", uid);
    localStorage.setItem("chatUserName", name);

    window.location.href = "chat.html";
  }
</script>

</body>
</html>
