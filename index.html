<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 30px auto 10px;
      border-radius: 50%;
      background: white;
      color: #ff4b2b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
    }

    #chatBox {
      height: 300px;
      overflow-y: auto;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 10px;
      margin: 20px;
    }

    .message {
      padding: 10px;
      margin: 5px;
      border-radius: 20px;
      max-width: 70%;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .me {
      background: white;
      color: #ff4b2b;
      margin-left: auto;
    }

    .other {
      background: rgba(255,255,255,0.6);
      color: black;
      margin-right: auto;
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
    }

    input, button {
      padding: 12px;
      border-radius: 20px;
      border: none;
      margin: 5px;
    }

    button {
      background: white;
      color: #ff4b2b;
      font-weight: bold;
    }

    .input-area {
      display: flex;
      margin: 10px;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
    }
  </style>
</head>

<body>

<div class="logo">TG</div>
<h1>TeamUp Global</h1>

<!-- LOGIN -->
<div id="auth">
  <button onclick="googleLogin()">Continue with Google</button>
</div>

<!-- PROFILE SETUP -->
<div id="setup" style="display:none;">
  <h3>Complete Profile</h3>
  <input id="name" placeholder="Full Name"><br>
  <input id="dob" type="date"><br>
  <input id="location" placeholder="Location"><br>
  <button onclick="saveProfile()">Continue</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <p id="welcome"></p>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="message" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
  </div>

  <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithRedirect,
  getRedirectResult,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp,
  setDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:b80b61d82df788cc0339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const provider = new GoogleAuthProvider();

let currentUser;

const message = document.getElementById("message");
const chatBox = document.getElementById("chatBox");

/* LOGIN */
window.googleLogin = () => {
  signInWithRedirect(auth, provider);
};

getRedirectResult(auth).catch(() => {});

/* AUTH STATE */
onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;

    const saved = localStorage.getItem("profile_" + user.uid);

    if (!saved) {
      document.getElementById("auth").style.display = "none";
      document.getElementById("setup").style.display = "block";
      return;
    }

    startApp(JSON.parse(saved));

  } else {
    document.getElementById("auth").style.display = "block";
    document.getElementById("setup").style.display = "none";
    document.getElementById("app").style.display = "none";
  }
});

/* SAVE PROFILE */
window.saveProfile = async () => {
  const name = document.getElementById("name").value;
  const dob = document.getElementById("dob").value;
  const location = document.getElementById("location").value;

  if (!name || !dob || !location) {
    alert("Fill everything");
    return;
  }

  const data = {
    name,
    dob,
    location,
    email: currentUser.email,
    photo: currentUser.photoURL
  };

  await setDoc(doc(db, "users", currentUser.uid), data);

  localStorage.setItem("profile_" + currentUser.uid, JSON.stringify(data));

  startApp(data);
};

/* START APP */
function startApp(data) {
  document.getElementById("auth").style.display = "none";
  document.getElementById("setup").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("welcome").innerText = "Welcome " + data.name;

  loadMessages();
}

/* SEND MESSAGE */
window.sendMessage = async () => {
  if (!message.value) return;

  await addDoc(collection(db, "messages"), {
    text: message.value,
    user: currentUser.email,
    photo: currentUser.photoURL,
    createdAt: serverTimestamp()
  });

  message.value = "";
};

/* LOAD MESSAGES */
function loadMessages() {
  const q = query(collection(db, "messages"), orderBy("createdAt"));

  onSnapshot(q, snap => {
    chatBox.innerHTML = "";

    snap.forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "message " + (data.user === currentUser.email ? "me" : "other");

      const img = document.createElement("img");
      img.src = data.photo || "https://via.placeholder.com/30";
      img.className = "avatar";

      const text = document.createElement("span");
      text.innerText = data.text;

      div.appendChild(img);
      div.appendChild(text);

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

/* LOGOUT */
window.logout = () => signOut(auth);

</script>

</body>
</html>
