<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
      text-align: center;
    }

    .logo {
      width: 90px;
      height: 90px;
      margin: 30px auto;
      border-radius: 50%;
      background: white;
      color: #ff4b2b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: bold;
    }

    button {
      padding: 12px;
      border-radius: 20px;
      border: none;
      margin: 5px;
      background: white;
      color: #ff4b2b;
      font-weight: bold;
    }

    #users {
      margin: 10px;
      max-height: 150px;
      overflow-y: auto;
    }

    .user {
      background: rgba(255,255,255,0.2);
      padding: 10px;
      margin: 5px;
      border-radius: 15px;
      cursor: pointer;
    }

    #chatBox {
      height: 250px;
      overflow-y: auto;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 10px;
      margin: 10px;
    }

    .message {
      padding: 10px;
      margin: 5px;
      border-radius: 20px;
      max-width: 70%;
      display: inline-block;
      clear: both;
    }

    .me {
      background: white;
      color: #ff4b2b;
      float: right;
    }

    .other {
      background: rgba(255,255,255,0.6);
      color: black;
      float: left;
    }

    .input-area {
      display: flex;
      margin: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
    }
  </style>
</head>

<body>

<div class="logo">TG</div>
<h1>TeamUp Global</h1>

<div id="auth">
  <button onclick="googleLogin()">Continue with Google</button>
</div>

<div id="app" style="display:none;">
  <p id="welcome"></p>

  <h3>Users</h3>
  <div id="users"></div>

  <h3 id="chatTitle"></h3>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="message" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
  </div>

  <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  setDoc,
  doc,
  getDocs,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:b80b61d82df788cc0339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const provider = new GoogleAuthProvider();

const authDiv = document.getElementById("auth");
const appDiv = document.getElementById("app");
const welcome = document.getElementById("welcome");
const usersDiv = document.getElementById("users");
const chatBox = document.getElementById("chatBox");
const message = document.getElementById("message");
const chatTitle = document.getElementById("chatTitle");

let currentUser;
let currentChatId;

// LOGIN
window.googleLogin = async () => {
  await signInWithPopup(auth, provider);
};

// AUTH STATE
onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;

    authDiv.style.display = "none";
    appDiv.style.display = "block";

    welcome.innerHTML = `
      <img src="${user.photoURL}" style="width:40px;border-radius:50%;">
      <br>${user.displayName}
    `;

    // Save user
    await setDoc(doc(db, "users", user.uid), {
      name: user.displayName,
      email: user.email
    });

    loadUsers();

  } else {
    authDiv.style.display = "block";
    appDiv.style.display = "none";
  }
});

// LOAD USERS
async function loadUsers() {
  const snap = await getDocs(collection(db, "users"));
  usersDiv.innerHTML = "";

  snap.forEach(docSnap => {
    const data = docSnap.data();

    if (docSnap.id !== currentUser.uid) {
      const div = document.createElement("div");
      div.className = "user";
      div.innerText = data.name;

      div.onclick = () => startChat(docSnap.id, data.name);

      usersDiv.appendChild(div);
    }
  });
}

// START CHAT
function startChat(uid, name) {
  chatTitle.innerText = "Chat with " + name;

  currentChatId = [currentUser.uid, uid].sort().join("_");

  const q = query(
    collection(db, "chats", currentChatId, "messages"),
    orderBy("createdAt")
  );

  onSnapshot(q, snapshot => {
    chatBox.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "message " + (data.user === currentUser.uid ? "me" : "other");
      div.innerText = data.text;

      chatBox.appendChild(div);
    });
  });
}

// SEND MESSAGE
window.sendMessage = async () => {
  if (!message.value || !currentChatId) return;

  await addDoc(collection(db, "chats", currentChatId, "messages"), {
    text: message.value,
    user: currentUser.uid,
    createdAt: serverTimestamp()
  });

  message.value = "";
};

// LOGOUT
window.logout = () => signOut(auth);
</script>

</body>
</html>
