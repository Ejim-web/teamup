<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    #auth, #chat {
      padding: 20px;
      text-align: center;
    }

    input {
      padding: 12px;
      margin: 5px;
      border-radius: 20px;
      border: none;
      width: 90%;
    }

    button {
      padding: 12px 20px;
      border-radius: 20px;
      border: none;
      background: #ff3b3b;
      color: white;
      cursor: pointer;
    }

    #messages {
      height: 300px;
      overflow-y: auto;
      margin: 10px 0;
      text-align: left;
    }

    .msg {
      padding: 10px;
      margin: 5px;
      border-radius: 20px;
      max-width: 70%;
    }

    .me {
      background: #ff3b3b;
      margin-left: auto;
    }

    .other {
      background: #333;
    }
  </style>
</head>

<body>

<div id="auth">
  <h2>TeamUp Global</h2>
  <input id="name" placeholder="Full Name"><br>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="chat" style="display:none;">
  <h2>TeamUp Global</h2>
  <p id="welcome">Hi, User</p>
  <button onclick="logout()">Logout</button>

  <div id="messages"></div>

  <input id="messageInput" placeholder="Type message">
  <button onclick="sendMessage()">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword,
  signInWithEmailAndPassword, signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore, doc, setDoc, getDoc,
  collection, addDoc, onSnapshot, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:b80b61d82df788cc0339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let currentUserName = "";

// SIGNUP
window.signup = async function () {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!name || !email || !password) {
    alert("Fill all fields");
    return;
  }

  const userCred = await createUserWithEmailAndPassword(auth, email, password);

  await setDoc(doc(db, "users", userCred.user.uid), {
    name: name,
    email: email,
    uid: userCred.user.uid
  });
};

// LOGIN
window.login = async function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  await signInWithEmailAndPassword(auth, email, password);
};

// LOGOUT
window.logout = function () {
  signOut(auth);
};

// 🔥 FIXED USER LOAD (WAITS PROPERLY)
onAuthStateChanged(auth, async (user) => {
  if (user) {
    document.getElementById("auth").style.display = "none";
    document.getElementById("chat").style.display = "block";

    const userRef = doc(db, "users", user.uid);
    const userSnap = await getDoc(userRef);

    if (userSnap.exists()) {
      currentUserName = userSnap.data().name;
    } else {
      currentUserName = "User";
    }

    document.getElementById("welcome").innerText =
      "Hi, " + currentUserName;

    // 🔥 load messages ONLY AFTER name is ready
    loadMessages();
  } else {
    document.getElementById("auth").style.display = "block";
    document.getElementById("chat").style.display = "none";
  }
});

// SEND MESSAGE
window.sendMessage = async function () {
  const text = document.getElementById("messageInput").value.trim();
  if (!text) return;

  await addDoc(collection(db, "messages"), {
    text: text,
    name: currentUserName,
    createdAt: Date.now()
  });

  document.getElementById("messageInput").value = "";
};

// LOAD MESSAGES
function loadMessages() {
  const q = query(collection(db, "messages"), orderBy("createdAt"));

  onSnapshot(q, (snapshot) => {
    const messagesDiv = document.getElementById("messages");
    messagesDiv.innerHTML = "";

    snapshot.forEach((doc) => {
      const msg = doc.data();

      const div = document.createElement("div");
      div.classList.add("msg");

      if (msg.name === currentUserName) {
        div.classList.add("me");
      } else {
        div.classList.add("other");
      }

      div.innerText = msg.name + ": " + msg.text;

      messagesDiv.appendChild(div);
    });
  });
}
</script>

</body>
</html>
