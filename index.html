<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
    }

    .screen {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      padding: 20px;
    }

    .active {
      display: flex;
    }

    h1 {
      font-size: 35px;
    }

    .btn {
      background: white;
      color: black;
      padding: 15px;
      margin: 10px 0;
      border-radius: 30px;
      width: 90%;
      max-width: 300px;
      text-align: center;
      font-weight: bold;
      cursor: pointer;
    }

    input {
      width: 90%;
      max-width: 300px;
      padding: 12px;
      margin: 5px 0;
      border-radius: 20px;
      border: none;
    }

    button {
      width: 90%;
      max-width: 300px;
      padding: 12px;
      border-radius: 20px;
      border: none;
      background: black;
      color: white;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="login" class="screen active">
  <h1>TeamUp Global</h1>

  <div class="btn" onclick="googleLogin()">Continue with Google</div>
  <div class="btn" onclick="showEmail()">Continue with Email</div>

  <div id="emailBox" style="display:none;">
    <input id="name" placeholder="Full Name">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="emailAuth()">Continue</button>
  </div>
</div>

<!-- HOME / CHAT SCREEN -->
<div id="home" class="screen">
  <h1 id="welcome">Welcome</h1>
  <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithRedirect,
  onAuthStateChanged,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

// SWITCH SCREENS
function showHome(name) {
  document.getElementById("login").classList.remove("active");
  document.getElementById("home").classList.add("active");
  document.getElementById("welcome").innerText = "Hi, " + name;
}

// GOOGLE LOGIN
const provider = new GoogleAuthProvider();

window.googleLogin = function () {
  signInWithRedirect(auth, provider);
};

// AUTH STATE (MAIN FIX)
onAuthStateChanged(auth, async (user) => {
  if (user) {
    await setDoc(doc(db, "users", user.uid), {
      name: user.displayName || "User",
      email: user.email,
      uid: user.uid
    }, { merge: true });

    showHome(user.displayName || "User");
  }
});

// EMAIL BOX
window.showEmail = function () {
  document.getElementById("emailBox").style.display = "block";
};

// EMAIL LOGIN
window.emailAuth = async function () {
  const name = document.getElementById("name").value || "User";
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const userCred = await createUserWithEmailAndPassword(auth, email, password);

    await setDoc(doc(db, "users", userCred.user.uid), {
      name: name,
      email: email,
      uid: userCred.user.uid
    });

  } catch {
    const userCred = await signInWithEmailAndPassword(auth, email, password);
    showHome(name);
  }
};

// LOGOUT
window.logout = function () {
  signOut(auth);
  location.reload();
};
</script>

</body>
</html>
