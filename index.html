<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 30px auto 10px;
      border-radius: 50%;
      background: white;
      color: #ff4b2b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
    }

    button {
      padding: 14px 20px;
      border-radius: 25px;
      border: none;
      background: white;
      color: #ff4b2b;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    #chatBox {
      height: 250px;
      overflow-y: auto;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 10px;
      margin: 10px;
    }

    .message {
      padding: 10px;
      margin: 5px 0;
      border-radius: 20px;
      max-width: 70%;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .me {
      background: white;
      color: #ff4b2b;
      margin-left: auto;
    }

    .other {
      background: rgba(255,255,255,0.6);
      color: black;
      margin-right: auto;
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
    }

    .input-area {
      display: flex;
      gap: 10px;
      margin: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 12px;
      border-radius: 20px;
      border: none;
    }

    #usersList div {
      background: rgba(255,255,255,0.3);
      margin: 5px;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    #setup input {
      width: 80%;
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      border: none;
    }
  </style>
</head>

<body>

<div class="logo">TG</div>
<h1>TeamUp Global</h1>

<!-- LOGIN -->
<div id="auth">
  <button onclick="googleLogin()">Continue with Google</button>
</div>

<!-- PROFILE SETUP -->
<div id="setup" style="display:none;">
  <h3>Complete Profile</h3>
  <input id="name" placeholder="Full Name"><br>
  <input id="dob" type="date"><br>
  <input id="location" placeholder="Location"><br>
  <button onclick="saveProfile()">Continue</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <p id="welcome"></p>

  <div id="usersList"></div>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="message" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
  </div>

  <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithRedirect,
  getRedirectResult,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp,
  setDoc,
  doc,
  getDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:b80b61d82df788cc0339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const provider = new GoogleAuthProvider();

let currentUser;
let selectedUserId = null;

window.googleLogin = async () => {
  await signInWithRedirect(auth, provider);
};

getRedirectResult(auth).catch(() => {});

onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;

    const userRef = doc(db, "users", user.uid);
    const snap = await getDoc(userRef);

    if (!snap.exists() || !snap.data().name) {
      auth.style.display = "none";
      setup.style.display = "block";
    } else {
      startApp(snap.data());
    }
  } else {
    auth.style.display = "block";
    setup.style.display = "none";
    app.style.display = "none";
  }
});

window.saveProfile = async () => {
  const data = {
    name: name.value,
    dob: dob.value,
    location: location.value,
    photo: currentUser.photoURL
  };

  await setDoc(doc(db, "users", currentUser.uid), data, { merge: true });

  startApp(data);
};

function startApp(data) {
  setup.style.display = "none";
  app.style.display = "block";

  welcome.innerText = "Welcome " + data.name;

  loadUsers();
}

async function loadUsers() {
  const snapshot = await getDocs(collection(db, "users"));

  usersList.innerHTML = "";

  snapshot.forEach(docSnap => {
    const user = docSnap.data();

    if (docSnap.id !== currentUser.uid) {
      const div = document.createElement("div");
      div.innerText = user.name;
      div.onclick = () => selectUser(docSnap.id, user.name);
      usersList.appendChild(div);
    }
  });
}

function selectUser(uid, name) {
  selectedUserId = uid;
  loadMessages();
}

window.sendMessage = async () => {
  if (!selectedUserId) {
    alert("Select a user first");
    return;
  }

  const chatId = [currentUser.uid, selectedUserId].sort().join("_");

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text: message.value,
    sender: currentUser.uid,
    photo: currentUser.photoURL,
    createdAt: serverTimestamp()
  });

  message.value = "";
};

function loadMessages() {
  const chatId = [currentUser.uid, selectedUserId].sort().join("_");

  const q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("createdAt")
  );

  onSnapshot(q, snap => {
    chatBox.innerHTML = "";

    snap.forEach(d => {
      const data = d.data();

      const div = document.createElement("div");
      div.className = "message " + (data.sender === currentUser.uid ? "me" : "other");

      const img = document.createElement("img");
      img.src = data.photo || "";
      img.className = "avatar";

      const text = document.createElement("span");
      text.innerText = data.text;

      div.appendChild(img);
      div.appendChild(text);

      chatBox.appendChild(div);
    });
  });
}

window.logout = () => signOut(auth);
</script>

</body>
</html>
