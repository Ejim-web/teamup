<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TeamUp Global – Match & Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
  <!-- Login Screen -->
  <div id="loginScreen" class="login-screen">
    <h1>💙 TeamUp Global</h1>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <div id="loginError" class="error-msg"></div>
    <button id="loginBtn">Login</button>
    <button id="signupBtn">Create Account</button>
  </div>

  <!-- Main App (hidden after login) -->
  <div id="mainApp" style="display:none;">
    <div class="app-header">
      <h2>TeamUp Global</h2>
      <div class="header-actions">
        <span class="user-email" id="currentUserEmail"></span>
        <button id="editProfileBtn" class="icon-btn"><i class="fas fa-user-edit"></i></button>
        <button id="logoutMainBtn" class="icon-btn"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>
    <div class="filter-row" id="filterRow">
      <div class="filter-chip active" data-filter="matches">Matches</div>
      <div class="filter-chip" data-filter="online">Online</div>
      <div class="filter-chip" data-filter="popular">Popular</div>
      <div class="filter-chip" data-filter="newest">Newest</div>
      <div class="filter-chip" data-filter="latest">Latest Picks</div>
    </div>
    <div id="contentArea" class="content-area"></div>
    <div class="tab-bar">
      <div class="tab active" data-main-tab="swipe"><i class="fas fa-fire"></i></div>
      <div class="tab" data-main-tab="matches"><i class="fas fa-heart"></i></div>
    </div>
  </div>

  <!-- Edit Profile Modal -->
  <div id="editModal" class="modal-overlay">
    <div class="modal-content">
      <h3>Edit Profile</h3>
      <input type="text" id="editName" placeholder="Name">
      <input type="number" id="editAge" placeholder="Age">
      <input type="text" id="editLocation" placeholder="Location">
      <textarea id="editBio" placeholder="Bio" rows="2"></textarea>
      <button id="saveProfileBtn">Save</button>
      <button id="closeModalBtn" class="cancel-btn">Cancel</button>
    </div>
  </div>
</div>
<script type="module" src="script.js"></script>
</body>
</html>
