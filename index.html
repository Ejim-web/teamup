<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    #auth {
      margin-top: 100px;
    }

    button {
      padding: 14px;
      border-radius: 30px;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    .google-btn {
      width: 80%;
      background: white;
      color: black;
      font-weight: bold;
    }

    #app {
      display: none;
      padding: 10px;
    }

    #chatBox {
      height: 350px;
      overflow-y: auto;
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 10px;
      margin: 15px;
      display: flex;
      flex-direction: column;
    }

    .message {
      padding: 10px 14px;
      margin: 5px 0;
      border-radius: 20px;
      max-width: 70%;
      word-wrap: break-word;
    }

    .me {
      background: white;
      color: #ff4b2b;
      align-self: flex-end;
    }

    .other {
      background: rgba(255,255,255,0.7);
      color: black;
      align-self: flex-start;
    }

    .input-area {
      display: flex;
      gap: 10px;
      padding: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 12px;
      border-radius: 20px;
      border: none;
      outline: none;
    }

    .send-btn {
      background: white;
      color: #ff4b2b;
      font-weight: bold;
    }

    #logout {
      width: 90%;
      margin-top: 10px;
      background: rgba(255,255,255,0.3);
      color: white;
    }

    .user-name {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 2px;
    }
  </style>
</head>

<body>

<h1>TeamUp</h1>

<div id="auth">
  <button class="google-btn" onclick="googleLogin()">
    Continue with Google
  </button>
</div>

<div id="app">
  <p id="welcome"></p>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="message" placeholder="Type message...">
    <button class="send-btn" onclick="sendMessage()">Send</button>
  </div>

  <button id="logout" onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithRedirect,
  getRedirectResult,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:b80b61d82df788cc0339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;

// 🔥 GOOGLE LOGIN (MOBILE SAFE)
window.googleLogin = function () {
  const provider = new GoogleAuthProvider();
  signInWithRedirect(auth, provider);
};

// 🔥 HANDLE REDIRECT
getRedirectResult(auth).catch(err => alert(err.message));

// 🔥 AUTH STATE
onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("welcome").innerText = "Welcome " + user.email;
    loadMessages();
  }
});

// 🔥 SEND MESSAGE
window.sendMessage = async function () {
  const input = document.getElementById("message");
  const text = input.value.trim();

  if (!text) return;

  await addDoc(collection(db, "messages"), {
    text,
    user: currentUser.email,
    createdAt: serverTimestamp()
  });

  input.value = "";
};

// 🔥 LOAD MESSAGES (IMPROVED UI)
function loadMessages() {
  const q = query(collection(db, "messages"), orderBy("createdAt"));

  onSnapshot(q, snapshot => {
    const chatBox = document.getElementById("chatBox");
    chatBox.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "message " + (data.user === currentUser.email ? "me" : "other");

      const name = document.createElement("div");
      name.className = "user-name";
      name.innerText = data.user;

      const text = document.createElement("div");
      text.innerText = data.text;

      if (data.user !== currentUser.email) {
        div.appendChild(name);
      }

      div.appendChild(text);
      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

// 🔥 LOGOUT
window.logout = function () {
  signOut(auth);
};
</script>

</body>
</html>
