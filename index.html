<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg,#ff416c,#ff4b2b);
      color: white;
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 30px auto 10px;
      border-radius: 50%;
      background: white;
      color: #ff4b2b;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      font-weight:bold;
    }

    button, input {
      padding:12px;
      border-radius:20px;
      border:none;
      margin:5px;
    }

    button {
      background:white;
      color:#ff4b2b;
      font-weight:bold;
    }

    #chatBox {
      height:300px;
      overflow-y:auto;
      background:rgba(255,255,255,0.2);
      border-radius:20px;
      margin:20px;
      padding:10px;
    }

    .message {
      padding:10px;
      margin:5px;
      border-radius:20px;
      max-width:70%;
    }

    .me {
      background:white;
      color:#ff4b2b;
      margin-left:auto;
    }

    .other {
      background:rgba(255,255,255,0.6);
      color:black;
      margin-right:auto;
    }
  </style>
</head>

<body>
<h2>NEW VERSION</h2>
<div class="logo">TG</div>
<h2>TeamUp Global</h2>

<!-- LOGIN -->
<div id="auth">
  <button onclick="login()">Continue with Google</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <p id="welcome"></p>

  <div id="chatBox"></div>

  <input id="message" placeholder="Type message">
  <button onclick="sendMessage()">Send</button>

  <br><br>
  <button onclick="logout()">Logout</button>
</div>
<script type="module">
alert("JS is running");

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithRedirect,
  getRedirectResult,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestor


const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const provider = new GoogleAuthProvider();

let currentUser;

const authDiv = document.getElementById("auth");
const appDiv = document.getElementById("app");
const welcome = document.getElementById("welcome");
const chatBox = document.getElementById("chatBox");
const message = document.getElementById("message");

/* LOGIN */
window.login = async () => {
  await signInWithRedirect(auth, provider);
};
getRedirectResult(auth).catch(() => {});
/* 🔥 FIXED AUTH (NO MORE COMING BACK) */
onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;

    // wait to stop Firebase refresh bug
    setTimeout(() => {
      authDiv.style.display = "none";
      appDiv.style.display = "block";

      welcome.innerText = "Welcome " + (user.displayName || user.email);

      loadMessages();
    }, 800);

  } else {
    authDiv.style.display = "block";
    appDiv.style.display = "none";
  }
});

/* SEND MESSAGE */
window.sendMessage = async () => {
  if (!message.value) return;

  await addDoc(collection(db, "messages"), {
    text: message.value,
    user: currentUser.displayName,
    createdAt: serverTimestamp()
  });

  message.value = "";
};

/* LOAD CHAT */
function loadMessages() {
  const q = query(collection(db, "messages"), orderBy("createdAt"));

  onSnapshot(q, snap => {
    chatBox.innerHTML = "";

    snap.forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "message " + (data.user == currentUser.displayName? "me" : "other");
      div.innerText = data.user + ": " + data.text;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

/* LOGOUT */
window.logout = () => signOut(auth);
</script>

</body>
</html>
