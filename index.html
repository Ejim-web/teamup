<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TeamUp Global – Swipe, Match, Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>

    #loginBtn{background:transparent;color:#c44545;border:1px solid #c44545;margin-top:8px}

    #mainApp{display:none;flex-direction:column;flex:1}
    .app-header{padding:24px 20px 12px;background:white;border-bottom:2px solid #f0f0f0}
    .app-header h2{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#c44545,#e07a7a);-webkit-background-clip:text;background-clip:text;color:transparent}
    .header-actions{display:flex;justify-content:space-between;align-items:center;margin-top:12px;flex-wrap:wrap;gap:8px}
    .user-email{font-size:0.85rem;color:#888;font-weight:500;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .rewind-btn{background:none;border:none;font-size:1.2rem;cursor:pointer;color:#c44545;margin-right:8px}
    .refresh-btn{background:none;border:none;font-size:1.2rem;cursor:pointer;color:#c44545;margin-right:8px}
    .icon-btn{background:none;border:none;font-size:1.5rem;cursor:pointer;color:#c44545}

    .card-info{padding:24px}
    .card-info h3{font-size:1.8rem;font-weight:800;margin-bottom:6px}
    .location{font-size:1rem;color:#5a6e85;margin:6px 0;display:flex;align-items:center;gap:6px;font-weight:500}
    .last-active{font-size:0.8rem;color:#22c55e;margin-bottom:12px;font-weight:500}
    .stats-row{display:flex;gap:24px;margin-top:12px;color:#555;font-size:0.9rem;font-weight:600}
    .people-list{display:flex;flex-direction:column;gap:12px}
    .person-card{background:white;border-radius:28px;padding:12px;display:flex;align-items:center;gap:14px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
    .person-card:active{background:#f5f5f5}
    .person-avatar{width:56px;height:56px;background:#f0d9d9;border-radius:28px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;background-size:cover;background-position:center}
    .person-info{flex:1}
    .person-info strong{font-size:1rem;font-weight:800}
    .online-indicator{display:inline-block;width:10px;height:10px;background:#2ecc71;border-radius:50%;margin-left:6px}
    .last-message{font-size:0.75rem;color:#888;margin-top:4px}
    .chat-view{display:flex;flex-direction:column;height:100%}
    .chat-header{padding:14px 16px;background:white;border-bottom:1px solid #eee;display:flex;align-items:center;gap:12px}
    .chat-header strong{font-size:1.1rem;font-weight:800}
    .chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;background:#fefefe}
    .message{max-width:80%;padding:10px 14px;border-radius:24px;font-size:0.9rem;font-weight:500;word-break:break-word}
    .message.me{align-self:flex-end;background:#c44545;color:white;border-bottom-right-radius:4px}
    .message.other{align-self:flex-start;background:#eef2ff;color:#1f2a48;border-bottom-left-radius:4px}
    .chat-input{display:flex;gap:10px;padding:12px;background:white;border-top:1px solid #eee}
    .chat-input input{flex:1;padding:12px;border-radius:50px;border:1px solid #ddd;font-size:0.9rem}
    .chat-input button{background:#c44545;border:none;color:white;width:48px;border-radius:48px;font-size:1.2rem;cursor:pointer}

    .tab-bar{display:flex;background:white;border-top:1px solid #eee;padding:8px 20px;justify-content:space-around}
    .tab{font-size:1.8rem;color:#aaa;cursor:pointer;text-align:center;flex:1;position:relative}
    .tab.active{color:#c44545}
    .badge{position:absolute;top:-5px;right:-8px;background:#c44545;color:white;font-size:0.7rem;border-radius:20px;min-width:18px;text-align:center;font-weight:700}
    .back-btn{background:none;border:none;font-size:1.4rem;cursor:pointer;color:#c44545}
    .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:1000;display:none}
    .modal-content{background:white;width:85%;max-width:360px;border-radius:36px;padding:24px}
    .modal-content h3{font-size:1.5rem;font-weight:800;margin-bottom:16px}
    .modal-content input,.modal-content select,.modal-content textarea{width:100%;margin:10px 0;padding:12px;border-radius:40px;border:1px solid #ddd;font-size:0.9rem}
    .modal-content button{background:#c44545;color:white;padding:12px;border-radius:40px;width:100%;border:none;margin-top:12px;font-weight:700;cursor:pointer}
    .cancel-btn{background:#ccc !important}
    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e1e2e;color:white;padding:12px 24px;border-radius:60px;font-size:0.9rem;font-weight:600;z-index:1100;display:flex;align-items:center;gap:8px;animation:fadeInUp 0.2s ease;pointer-events:none}
    @keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    .debug-panel{background:#f0f0f0;border-top:1px solid #ddd;padding:8px 16px;font-size:12px;max-height:200px;overflow-y:auto;font-family:monospace;color:#333}
    .debug-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-weight:bold}
    .debug-content{display:none;margin-top:8px;border-top:1px solid #ccc;padding-top:8px}
  </style>
</head>
<body>
<div class="app-container">
  <div id="loginScreen" class="login-screen">
    <div class="login-logo">💙</div>
    <h1>TeamUp Global</h1>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <div id="loginError" class="error-msg"></div>
    <button id="createAccountBtn">Create Account</button>
    <button id="loginBtn">Login</button>
  </div>
  <div id="mainApp" style="display:none;">
    <div class="app-header">
      <h2>TeamUp Global</h2>
      <div class="header-actions">
        <span class="user-email" id="currentUserEmail"></span>
        <div>
          <button id="rewindBtn" class="rewind-btn" title="Undo last swipe"><i class="fas fa-undo-alt"></i></button>
          <button id="refreshSwipeBtn" class="refresh-btn" title="Refresh"><i class="fas fa-sync-alt"></i></button>
          <button id="editProfileBtn" class="icon-btn"><i class="fas fa-user-edit"></i></button>
          <button id="logoutMainBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
      </div>
    </div>
    <div id="contentArea" class="content-area"></div>
    <div class="tab-bar">
      <div class="tab" data-main-tab="swipe"><i class="fas fa-fire"></i></div>
      <div class="tab" data-main-tab="messages"><i class="fas fa-comment-dots"></i><span id="matchBadge" class="badge" style="display:none;">0</span></div>
      <div class="tab" data-main-tab="likes"><i class="fas fa-star"></i><span id="likesBadge" class="badge" style="display:none;">0</span></div>
    </div>
    <div class="debug-panel" id="debugPanel">
      <div class="debug-header" id="debugHeader"><span>🔍 Debug Info (click to expand)</span><span>▼</span></div>
      <div class="debug-content" id="debugContent"><pre id="debugText">Loading...</pre></div>
    </div>
  </div>
  <div id="editModal" class="modal-overlay">
    <div class="modal-content">
      <h3>Edit Profile</h3>
      <input type="text" id="editName" placeholder="Full Name">
      <input type="number" id="editAge" placeholder="Age">
      <input type="number" id="editMinAge" placeholder="Min age preference">
      <input type="number" id="editMaxAge" placeholder="Max age preference">
      <select id="editGender"><option value="">Select Gender</option><option value="Male">Male</option><option value="Female">Female</option><option value="Non-binary">Non-binary</option><option value="Other">Other</option></select>
      <select id="editLookingFor"><option value="">I want to meet...</option><option value="Male">Men</option><option value="Female">Women</option><option value="Everyone">Everyone</option></select>
      <input type="text" id="editLocation" placeholder="City, Country">
      <input type="text" id="editAvatar" placeholder="Avatar emoji (e.g. 🧑)" maxlength="2">
      <textarea id="editBio" placeholder="Bio" rows="2"></textarea>
      <button id="saveProfileBtn">Save</button>
      <button id="closeModalBtn" class="cancel-btn">Cancel</button>
    </div>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import{getAuth,signInWithEmailAndPassword,createUserWithEmailAndPassword,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import{getFirestore,doc,setDoc,getDoc,updateDoc,collection,query,where,getDocs,onSnapshot,addDoc,serverTimestamp,increment,arrayUnion,arrayRemove,orderBy,limit}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",authDomain:"ejim-web.github.io",projectId:"teamup-68a21",storageBucket:"teamup-68a21.firebasestorage.app",messagingSenderId:"379106762572",appId:"1:379106762572:web:a1537754ed17d3a60339e9"};
const app=initializeApp(firebaseConfig);const auth=getAuth(app);const db=getFirestore(app);
const loginScreen=document.getElementById("loginScreen"),mainApp=document.getElementById("mainApp"),loginEmail=document.getElementById("loginEmail"),loginPassword=document.getElementById("loginPassword"),loginBtn=document.getElementById("loginBtn"),createAccountBtn=document.getElementById("createAccountBtn"),logoutMainBtn=document.getElementById("logoutMainBtn"),editProfileBtn=document.getElementById("editProfileBtn"),refreshSwipeBtn=document.getElementById("refreshSwipeBtn"),rewindBtn=document.getElementById("rewindBtn"),editModal=document.getElementById("editModal"),saveProfileBtn=document.getElementById("saveProfileBtn"),closeModalBtn=document.getElementById("closeModalBtn"),editName=document.getElementById("editName"),editAge=document.getElementById("editAge"),editMinAge=document.getElementById("editMinAge"),editMaxAge=document.getElementById("editMaxAge"),editGender=document.getElementById("editGender"),editLookingFor=document.getElementById("editLookingFor"),editLocation=document.getElementById("editLocation"),editAvatar=document.getElementById("editAvatar"),editBio=document.getElementById("editBio"),contentArea=document.getElementById("contentArea"),mainTabs=document.querySelectorAll(".tab"),currentUserEmailSpan=document.getElementById("currentUserEmail"),loginError=document.getElementById("loginError"),matchBadge=document.getElementById("matchBadge"),likesBadge=document.getElementById("likesBadge"),debugText=document.getElementById("debugText");
let currentUser=null,currentUserId=null,currentMainTab="swipe",unsubscribeChat=null,swipeCards=[],currentCardIndex=0,likedByUnsubscribe=null,refreshInterval=null;
// undo swipe stack
let lastSwipe=null; // {userId, liked}
// super like tracking
let lastSuperLikeDate=null;
// notifications permission
let notificationPermissionAsked=false;
function showToast(m,i="❤️"){const e=document.querySelector(".toast");if(e)e.remove();const t=document.createElement("div");t.className="toast",t.innerHTML=`${i} ${m}`,document.body.appendChild(t),setTimeout(()=>t.remove(),3000);}
async function requestNotificationPermission(){if("Notification"in window&&Notification.permission!=="granted"&&!notificationPermissionAsked){notificationPermissionAsked=true;const perm=await Notification.requestPermission();if(perm==="granted")showToast("Notifications enabled!","🔔");}}
function sendNotification(title,body){if("Notification"in window&&Notification.permission==="granted"){new Notification(title,{body,icon:"https://ejim-web.github.io/teamup/logo.png"});}}
async function setUserOnline(uid,on){try{await updateDoc(doc(db,"users",uid),{online:on,lastSeen:serverTimestamp()});}catch(e){}}
async function createOrUpdateUserProfile(user,name,photoUrl){const ref=doc(db,"users",user.uid),s=await getDoc(ref);if(!s.exists()){await setDoc(ref,{email:user.email,name:name||user.email.split('@')[0],age:null,minAge:18,maxAge:99,gender:null,lookingFor:"Everyone",location:null,bio:"New to TeamUp!",photoIcon:photoUrl?"📸":"🧑",photoUrl:photoUrl||null,online:true,lastSeen:serverTimestamp(),joinDate:serverTimestamp(),likesReceived:0,swipedRight:[],swipedLeft:[],likedBy:[],blockedBy:[],superLiked:[],coords:null,coordsUpdated:null});}else if(photoUrl&&!s.data().photoUrl){await updateDoc(ref,{photoUrl,photoIcon:"📸"});}}
// geolocation
async function updateLocation(){if(!currentUserId)return;navigator.geolocation.getCurrentPosition(async(pos)=>{await updateDoc(doc(db,"users",currentUserId),{coords:new firebase.firestore.GeoPoint(pos.coords.latitude,pos.coords.longitude),coordsUpdated:serverTimestamp()});},err=>console.warn(err),{enableHighAccuracy:false,timeout:10000});}
function getDistance(lat1,lon1,lat2,lon2){const R=6371;const dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180,a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
// block/unblock
async function blockUser(blockedId){if(!currentUserId)return;await updateDoc(doc(db,"users",currentUserId),{blockedBy:arrayUnion(blockedId)});showToast("User blocked","🚫");refreshContent();}
// super like
async function handleSuperLike(swipedUserId){if(!checkSuperLikeAvailable()){showToast("You've used your super like today!","⚠️");return false;}
await updateDoc(doc(db,"users",currentUserId),{swipedRight:arrayUnion(swipedUserId),superLiked:arrayUnion(swipedUserId),lastSuperLike:serverTimestamp()});
await updateDoc(doc(db,"users",swipedUserId),{likedBy:arrayUnion(currentUserId),likesReceived:increment(1)});
sendNotification("✨ Super Like!","Someone super liked you!");
showToast("Super liked! ✨","⭐");
return true;}
function checkSuperLikeAvailable(){if(!lastSuperLikeDate)return true;const today=new Date().toDateString();return lastSuperLikeDate!==today;}
// undo last swipe
async function undoLastSwipe(){if(!lastSwipe)return showToast("Nothing to undo","↩️");const{userId,liked}=lastSwipe;const userRef=doc(db,"users",currentUserId);if(liked){await updateDoc(userRef,{swipedRight:arrayRemove(userId)});await updateDoc(doc(db,"users",userId),{likedBy:arrayRemove(currentUserId),likesReceived:increment(-1)});showToast("Undid like","↩️");}else{await updateDoc(userRef,{swipedLeft:arrayRemove(userId)});showToast("Undid pass","↩️");}
lastSwipe=null;refreshContent();}
async function getAllUsers(uid){const q=query(collection(db,"users"),limit(100)),snap=await getDocs(q),users=[];snap.forEach(d=>{if(d.id!==uid)users.push({id:d.id,...d.data()});});return users;}
async function getSwipeCandidates(uid){const userDoc=await getDoc(doc(db,"users",uid)),userData=userDoc.data();if(!userData)return[];
const swipedRight=userData.swipedRight||[],swipedLeft=userData.swipedLeft||[],lookingFor=userData.lookingFor||"Everyone",minAge=userData.minAge||18,maxAge=userData.maxAge||99,blockedBy=userData.blockedBy||[];
let all=await getAllUsers(uid);
if(lookingFor!=="Everyone")all=all.filter(u=>u.gender===lookingFor);
all=all.filter(u=>u.age>=minAge&&u.age<=maxAge);
all=all.filter(u=>!blockedBy.includes(u.id));
const unseen=all.filter(u=>!swipedRight.includes(u.id)&&!swipedLeft.includes(u.id));
const passed=all.filter(u=>swipedLeft.includes(u.id)&&!swipedRight.includes(u.id));
const shuffle=arr=>{for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;};
return[...shuffle(unseen),...shuffle(passed)];}
async function updateDebugInfo(){if(!currentUserId)return;const userDoc=await getDoc(doc(db,"users",currentUserId)),myData=userDoc.data(),allUsers=await getAllUsers(currentUserId),lookingFor=myData?.lookingFor||"Everyone",swipedRight=myData?.swipedRight||[],swipedLeft=myData?.swipedLeft||[],likedBy=myData?.likedBy||[];debugText.innerText=`📊 YOUR PROFILE: ... (debug truncated for length)`;}
async function handleSwipe(swipedUserId,liked,isSuper=false){if(!currentUserId)return;const userRef=doc(db,"users",currentUserId);if(!liked){await updateDoc(userRef,{swipedLeft:arrayUnion(swipedUserId)});lastSwipe={userId:swipedUserId,liked:false};showToast("Passed 👎","↪️");return;}
if(isSuper&&!await handleSuperLike(swipedUserId))return;
await updateDoc(userRef,{swipedRight:arrayUnion(swipedUserId)});
await updateDoc(doc(db,"users",swipedUserId),{likedBy:arrayUnion(currentUserId),likesReceived:increment(1)});
lastSwipe={userId:swipedUserId,liked:true};
const otherDoc=await getDoc(doc(db,"users",swipedUserId));
const otherSwipedRight=otherDoc.data()?.swipedRight||[];
if(otherSwipedRight.includes(currentUserId)){
const matchId=[currentUserId,swipedUserId].sort().join("_");
const matchRef=doc(db,"matches",matchId);
const matchSnap=await getDoc(matchRef);
if(!matchSnap.exists()){
await setDoc(matchRef,{users:[currentUserId,swipedUserId],createdAt:serverTimestamp()});

sendNotification("New match!","You have a new match!");
if(currentMainTab==="messages")await renderMessages();
await updateMatchBadge();
}}else{showToast(`You liked ${otherDoc.data()?.name||"someone"}! 👍`,"😊");}
await updateDebugInfo();}
async function renderSwipeDeck(){contentArea.innerHTML=`<div class="swipe-container" id="swipeContainer"></div>`;const candidates=await getSwipeCandidates(currentUserId);if(candidates.length===0){document.getElementById("swipeContainer").innerHTML='<div class="no-profiles">✨ No more profiles right now. New users will appear soon!</div>';return;}swipeCards=candidates;currentCardIndex=0;displayNextCard();}
function displayNextCard(){const container=document.getElementById("swipeContainer");if(!container)return;if(currentCardIndex>=swipeCards.length){container.innerHTML='<div class="no-profiles">🎉 You\'ve seen everyone! Check later.</div>';return;}
const user=swipeCards[currentCardIndex];const lastActive=user.lastSeen?formatLastActive(user.lastSeen):"Recently";const avatarHtml=user.photoUrl?`<div class="card-img" style="background-image: url('${user.photoUrl}'); background-size: cover; background-position: center;"></div>`:`<div class="card-img">${user.photoIcon||"👤"}</div>`;const distanceHtml=user.coords&&currentUserCoords?`<div class="location"><i class="fas fa-location-dot"></i> ${Math.round(getDistance(currentUserCoords.lat,currentUserCoords.lng,user.coords.latitude,user.coords.longitude))} km away</div>`:`<div class="location"><i class="fas fa-map-marker-alt"></i> ${user.location||"Not set"}</div>`;const card=document.createElement("div");card.className="card";card.innerHTML=`${avatarHtml}<div class="card-info"><h3>${user.name||"?"}, ${user.age||"?"}</h3>${distanceHtml}<div class="last-active"><i class="fas fa-clock"></i> ${lastActive}</div><p>${user.bio||""}</p><div class="stats-row"><span><i class="fas fa-heart"></i> ${user.likesReceived||0}</span><span><i class="fas fa-comment"></i> 8</span><span><i class="fas fa-eye"></i> 43</span></div><div style="display:flex; gap:10px; margin-top:12px;"><button class="superLikeBtn" style="background:#ffaa44;border:none;border-radius:30px;padding:6px 12px;color:white;">⭐ Super Like</button><button class="blockBtn" style="background:#888;border:none;border-radius:30px;padding:6px 12px;color:white;">🚫 Block</button></div></div>`;container.innerHTML="";container.appendChild(card);attachSwipeEvents(card,user);card.querySelector(".superLikeBtn").onclick=async(e)=>{e.stopPropagation();await handleSwipe(user.id,true,true);currentCardIndex++;displayNextCard();};card.querySelector(".blockBtn").onclick=async(e)=>{e.stopPropagation();await blockUser(user.id);currentCardIndex++;displayNextCard();};}
function attachSwipeEvents(card,user){let startX=0,currentX=0,dragging=!1;const onStart=e=>{dragging=!0;startX=e.clientX??e.touches[0].clientX;card.style.transition="none";},onMove=e=>{if(!dragging)return;currentX=(e.clientX??e.touches[0].clientX)-startX;card.style.transform=`translateX(${currentX}px) rotate(${currentX*0.02}deg)`;},onEnd=async()=>{if(!dragging)return;dragging=!1;card.style.transition="transform 0.3s";if(Math.abs(currentX)>100){const liked=currentX>0;card.style.transform=`translateX(${liked?500:-500}px) rotate(${liked?30:-30}deg)`;setTimeout(async()=>{await handleSwipe(user.id,liked,false);currentCardIndex++;displayNextCard();},200);}else{card.style.transform="translateX(0) rotate(0deg)";}currentX=0;};card.addEventListener("mousedown",onStart);card.addEventListener("touchstart",onStart,{passive:!1});window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onEnd);window.addEventListener("touchmove",onMove,{passive:!1});window.addEventListener("touchend",onEnd);}
function formatLastActive(ts){if(!ts)return"Recently";const diff=(Date.now()-ts.toDate())/1000;if(diff<60)return"Active now";if(diff<3600)return`${Math.floor(diff/60)} min ago`;if(diff<86400)return`${Math.floor(diff/3600)} hours ago`;return`${Math.floor(diff/86400)} days ago`;}
function getAvatarHtml(user){return user.photoUrl?`<div class="person-avatar" style="background-image: url('${user.photoUrl}'); background-size: cover; background-position: center;"></div>`:`<div class="person-avatar">${user.photoIcon||"👤"}</div>`;}
async function getLastMessage(otherId){const roomId=[currentUserId,otherId].sort().join("__"),q=query(collection(db,"chats",roomId,"messages"),orderBy("timestamp","desc"),limit(1)),snap=await getDocs(q);return snap.empty?"Say hi!":snap.docs[0].data().text;}
async function updateMatchBadge(){const snap=await getDocs(query(collection(db,"matches"),where("users","array-contains",currentUserId))),c=snap.size;c>0?(matchBadge.style.display="inline-block",matchBadge.innerText=c):matchBadge.style.display="none";}
async function updateLikesBadge(){const docSnap=await getDoc(doc(db,"users",currentUserId)),c=(docSnap.data()?.likedBy||[]).length;c>0?(likesBadge.style.display="inline-block",likesBadge.innerText=c):likesBadge.style.display="none";}
async function renderMessages(){contentArea.innerHTML=`<div id="messagesList" class="people-list"></div>`;const matchesSnap=await getDocs(query(collection(db,"matches"),where("users","array-contains",currentUserId))),matchIds=[];matchesSnap.forEach(d=>{const other=d.data().users.find(id=>id!==currentUserId);if(other)matchIds.push(other);});const container=document.getElementById("messagesList");if(matchIds.length===0){container.innerHTML='<div class="no-profiles">💬 No matches yet. Swipe right to match!</div>';return;}for(const id of matchIds){const userSnap=await getDoc(doc(db,"users",id));if(userSnap.exists()&&!(userSnap.data().blockedBy||[]).includes(currentUserId)){const data=userSnap.data(),onlineDot=data.online?'<span class="online-indicator"></span>':'',lastMsg=await getLastMessage(id),avatarHtml=getAvatarHtml(data),div=document.createElement("div");div.className="person-card";div.innerHTML=`${avatarHtml}<div class="person-info"><strong>${data.name||"?"}, ${data.age||"?"}</strong> ${onlineDot}<br><div class="last-message">💬 ${lastMsg.substring(0,40)}</div></div>`;div.addEventListener("click",()=>openChat(id,data.name));container.appendChild(div);}}await updateMatchBadge();}
function listenForLikes(){if(likedByUnsubscribe)likedByUnsubscribe();const userRef=doc(db,"users",currentUserId);likedByUnsubscribe=onSnapshot(userRef,async()=>{await updateLikesBadge();if(currentMainTab==="likes")await renderLikes();});}
async function renderLikes(){contentArea.innerHTML=`<div id="likesList" class="people-list"></div><button id="refreshLikesBtn" style="background:#c44545;color:white;border:none;padding:8px;border-radius:40px;margin-top:12px;width:100%;">⟳ Refresh Likes</button>`;const currentUserDoc=await getDoc(doc(db,"users",currentUserId)),likedByIds=currentUserDoc.data()?.likedBy||[],matchesSnap=await getDocs(query(collection(db,"matches"),where("users","array-contains",currentUserId))),matchedIds=[];matchesSnap.forEach(d=>{const other=d.data().users.find(id=>id!==currentUserId);if(other)matchedIds.push(other);});const notYetMatched=likedByIds.filter(id=>!matchedIds.includes(id)),container=document.getElementById("likesList");if(notYetMatched.length===0){container.innerHTML='<div class="no-profiles">🌟 No likes yet. Keep swiping!</div><button id="refreshLikesBtn" style="background:#c44545;color:white;border:none;padding:8px;border-radius:40px;margin-top:12px;width:100%;">⟳ Refresh Likes</button>';}else{for(const id of notYetMatched){const userSnap=await getDoc(doc(db,"users",id));if(userSnap.exists()){const data=userSnap.data(),avatarHtml=getAvatarHtml(data),div=document.createElement("div");div.className="person-card";div.innerHTML=`${avatarHtml}<div class="person-info"><strong>${data.name||"?"}, ${data.age||"?"}</strong><br><small>${data.location||"Not set"}</small></div>`;div.addEventListener("click",async()=>{const matchId=[currentUserId,id].sort().join("_");const matchRef=doc(db,"matches",matchId);const matchSnap=await getDoc(matchRef);if(!matchSnap.exists()){await setDoc(matchRef,{users:[currentUserId,id],createdAt:serverTimestamp()});showToast(`You can now chat with ${data.name}! 💬`,"🎉");await updateMatchBadge();}await openChat(id,data.name);});container.appendChild(div);}}}document.getElementById("refreshLikesBtn")?.addEventListener("click",()=>renderLikes());}
async function openChat(otherId,otherName){if(unsubscribeChat)unsubscribeChat();contentArea.innerHTML=`<div class="chat-view"><div class="chat-header"><button id="chatBackBtn" class="back-btn"><i class="fas fa-arrow-left"></i></button><strong>${otherName}</strong><button id="blockInChatBtn" class="back-btn" style="margin-left:auto;">🚫 Block</button></div><div id="chatMessagesArea" class="chat-messages"></div><div class="chat-input"><input id="chatInputField" placeholder="Message..."><button id="chatSendBtn"><i class="fas fa-paper-plane"></i></button></div></div>`;document.getElementById("chatBackBtn").addEventListener("click",()=>{if(unsubscribeChat)unsubscribeChat();renderMessages();});document.getElementById("blockInChatBtn").addEventListener("click",async()=>{if(confirm("Block this user? You will no longer see each other.")){await blockUser(otherId);if(unsubscribeChat)unsubscribeChat();renderMessages();}});const roomId=[currentUserId,otherId].sort().join("__"),messagesRef=collection(db,"chats",roomId,"messages"),q=query(messagesRef,orderBy("timestamp","asc"));let lastMsgCount=0;unsubscribeChat=onSnapshot(q,snap=>{const c=document.getElementById("chatMessagesArea");if(!c)return;const n=snap.size;if(n>lastMsgCount&&lastMsgCount>0&&currentMainTab==="messages"){showToast("New message! 💬","📨");sendNotification("New message",`From ${otherName}`);}lastMsgCount=n;c.innerHTML="";snap.forEach(d=>{const msg=d.data(),div=document.createElement("div");div.className=`message ${msg.senderId===currentUserId?"me":"other"}`;div.innerText=msg.text;c.appendChild(div);});c.scrollTop=c.scrollHeight;});document.getElementById("chatSendBtn").addEventListenerhField"),text=input.value.trim();if(!text)return;await addDoc(messagesRef,{text,senderId:currentUserId,timestamp:serverTimestamp()});input.value="";});}
async function refreshContent(){if(currentMainTab==="swipe")await renderSwipeDeck();else if(currentMainTab==="messages")await renderMessages();else if(currentMainTab==="likes")await renderLikes();}
mainTabs.forEach(tab=>{tab.addEventListener("click",()=>{mainTabs.forEach(t=>t.classList.remove("active"));tab.classList.add("active");currentMainTab=tab.getAttribute("data-main-tab");refreshContent();});});
editProfileBtn.onclick=async()=>{const d=(await getDoc(doc(db,"users",currentUserId))).data();editName.value=d.name||"";editAge.value=d.age||"";editMinAge.value=d.minAge||18;editMaxAge.value=d.maxAge||99;editGender.value=d.gender||"";editLookingFor.value=d.lookingFor||"Everyone";editLocation.value=d.location||"";editAvatar.value=d.photoIcon||"🧑";editBio.value=d.bio||"";editModal.style.display="flex";};
saveProfileBtn.onclick=async()=>{await updateDoc(doc(db,"users",currentUserId),{name:editName.value,age:parseInt(editAge.value)||null,minAge:parseInt(editMinAge.value)||18,maxAge:parseInt(editMaxAge.value)||99,gender:editGender.value,lookingFor:editLookingFor.value,location:editLocation.value,photoIcon:editAvatar.value||"🧑",bio:editBio.value});editModal.style.display="none";refreshContent();updateDebugInfo();if(editLocation.value){updateLocation();}};
closeModalBtn.onclick=()=>editModal.style.display="none";
refreshSwipeBtn.onclick=()=>{if(currentMainTab==="swipe")renderSwipeDeck();};
rewindBtn.onclick=()=>undoLastSwipe();
const debugHeader=document.getElementById("debugHeader"),debugContentDiv=document.getElementById("debugContent");debugHeader.addEventListener("click",()=>{const isVisible=debugContentDiv.style.display!=="none";debugContentDiv.style.display=isVisible?"none":"block";debugHeader.querySelector("span:last-child").innerText=isVisible?"▼":"▲";});debugContentDiv.style.display="none";
let currentUserCoords=null;
onAuthStateChanged(auth,async(user)=>{if(user){currentUser=user;currentUserId=user.uid;currentUserEmailSpan.innerText=user.email;await createOrUpdateUserProfile(user,user.displayName,user.photoURL);await setUserOnline(user.uid,true);const userDoc=await getDoc(doc(db,"users",user.uid));if(userDoc.data()?.coords){currentUserCoords={lat:userDoc.data().coords.latitude,lng:userDoc.data().coords.longitude};}loginScreen.style.display="none";mainApp.style.display="flex";document.querySelector('.tab[data-main-tab="swipe"]').classList.add("active");currentMainTab="swipe";await refreshContent();await updateMatchBadge();await updateLikesBadge();await updateDebugInfo();listenForLikes();if(refreshInterval)clearInterval(refreshInterval);refreshInterval=setInterval(()=>{if(currentMainTab==="swipe")renderSwipeDeck();updateDebugInfo();},30000);setInterval(()=>setUserOnline(user.uid,true),30000);requestNotificationPermission();if(userDoc.data()?.coords===undefined)updateLocation();}else{if(currentUserId)setUserOnline(currentUserId,false);if(likedByUnsubscribe)likedByUnsubscribe();if(refreshInterval)clearInterval(refreshInterval);loginScreen.style.display="flex";mainApp.style.display="none";loginError.innerText="";}});
loginBtn.onclick=async()=>{loginError.innerText="";try{await signInWithEmailAndPassword(auth,loginEmail.value,loginPassword.value);}catch(err){let msg=err.message;if(msg.includes("auth/invalid-email"))msg="❌ Invalid email format.";else if(msg.includes("auth/user-not-found"))msg="❌ No account. Create one.";else if(msg.includes("auth/wrong-password"))msg="❌ Wrong password.";else if(msg.includes("auth/too-many-requests"))msg="❌ Too many attempts. Try later.";else msg="❌ "+msg;loginError.innerText=msg;}};
createAccountBtn.onclick=async()=>{loginError.innerText="";try{const cred=await createUserWithEmailAndPassword(auth,loginEmail.value,loginPassword.value);await createOrUpdateUserProfile(cred.user,cred.user.email.split('@')[0],null);}catch(err){let msg=err.message;if(msg.includes("auth/invalid-email"))msg="❌ Invalid email format.";else if(msg.includes("auth/email-already-in-use"))msg="❌ Email already in use.";else if(msg.includes("auth/weak-password"))msg="❌ Password must be at least 6 characters.";else msg="❌ "+msg;loginError.innerText=msg;}};
logoutMainBtn.onclick=()=>{if(confirm("Log out?"))signOut(auth);};
window.addEventListener("beforeunload",()=>{if(currentUserId)setUserOnline(currentUserId,false);if(refreshInterval)clearInterval(refreshInterval);});
</script>
</body>
