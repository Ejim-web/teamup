<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
      text-align: center;
    }

    img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }

    #chatBox {
      height: 250px;
      overflow-y: auto;
      background: rgba(255,255,255,0.2);
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
    }

    .msg {
      display: flex;
      gap: 10px;
      margin: 5px;
      align-items: center;
    }

    .me { justify-content: flex-end; }
  </style>
</head>

<body>

<h2>🔥 TeamUp Global</h2>

<div id="auth">
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <input id="photo" placeholder="Paste profile image URL"><br>

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <h3 id="welcome"></h3>

  <h4>Users</h4>
  <div id="users"></div>

  <div id="chatSection" style="display:none;">
    <h4 id="chatWith"></h4>
    <div id="chatBox"></div>

    <input id="message" placeholder="Message">
    <button onclick="sendMessage()">Send</button>
  </div>

  <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;
let selectedUser;
let currentChatId;

// SIGNUP
window.signup = async () => {
  await createUserWithEmailAndPassword(auth, email.value, password.value);

  await addDoc(collection(db, "users"), {
    email: email.value,
    photo: photo.value || "https://i.pravatar.cc/150?img=3"
  });
};

// LOGIN
window.login = () => {
  signInWithEmailAndPassword(auth, email.value, password.value);
};

// LOAD USERS
async function loadUsers() {
  const snap = await getDocs(collection(db, "users"));
  users.innerHTML = "";

  snap.forEach(doc => {
    const u = doc.data();

    if (u.email === currentUser.email) return;

    const div = document.createElement("div");
    div.innerHTML = `
      <img src="${u.photo}">
      <button onclick="startChat('${u.email}')">${u.email}</button>
    `;

    users.appendChild(div);
  });
}

// START CHAT
window.startChat = (email) => {
  selectedUser = email;
  chatSection.style.display = "block";
  chatWith.innerText = "Chat with " + email;

  currentChatId = [currentUser.email, selectedUser].sort().join("_");

  loadMessages();
};

// SEND
window.sendMessage = async () => {
  if (!message.value) return;

  await addDoc(collection(db, "chats", currentChatId, "messages"), {
    text: message.value,
    sender: currentUser.email,
    createdAt: serverTimestamp()
  });

  message.value = "";
};

// LOAD MESSAGES
function loadMessages() {
  const q = query(
    collection(db, "chats", currentChatId, "messages"),
    orderBy("createdAt")
  );

  onSnapshot(q, snapshot => {
    chatBox.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "msg " + (data.sender === currentUser.email ? "me" : "");

      div.innerHTML = `
        <img src="https://i.pravatar.cc/150">
        <span>${data.text}</span>
      `;

      chatBox.appendChild(div);
    });
  });
}

// AUTH STATE
onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    auth.style.display = "none";
    app.style.display = "block";
    welcome.innerText = user.email;

    loadUsers();
  }
});

// LOGOUT
window.logout = () => signOut(auth);

</script>

</body>
</html>
