<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
</head>
<body>

<h2>TeamUp Global</h2>
<button onclick="logout()">Logout</button>

<h3>All Users</h3>
<div id="users"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.firebasestorage.app",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// CHECK LOGIN
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    loadUsers(user.uid);
  }
});

// LOAD USERS
async function loadUsers(currentUserId) {
  const usersDiv = document.getElementById("users");
  usersDiv.innerHTML = "Loading...";

  const snapshot = await getDocs(collection(db, "users"));

  usersDiv.innerHTML = "";

  snapshot.forEach(doc => {
    const data = doc.data();

    if (data.uid === currentUserId) return;

    const name = data.name ? data.name : data.email;
    const email = data.email ? data.email : "";

    usersDiv.innerHTML += `
      <div>
        <h4>${name}</h4>
        <p>${email}</p>
        <button onclick="openChat('${data.uid}')">Chat</button>
      </div>
      <hr>
    `;
  });
}

// OPEN CHAT
window.openChat = function(uid) {
  localStorage.setItem("chatUser", uid);
  window.location.href = "chat.html";
};

// LOGOUT
window.logout = async function () {
  await signOut(auth);
  window.location.href = "login.html";
};
</script>

</body>
</html>
