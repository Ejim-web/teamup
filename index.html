<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 30px auto 10px;
      border-radius: 50%;
      background: white;
      color: #ff4b2b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
    }

    button {
      padding: 12px;
      border-radius: 20px;
      border: none;
      background: white;
      color: #ff4b2b;
      font-weight: bold;
      cursor: pointer;
      margin: 5px;
    }

    #users {
      margin: 10px;
    }

    .user {
      background: rgba(255,255,255,0.3);
      padding: 10px;
      border-radius: 20px;
      margin: 5px;
      cursor: pointer;
    }

    #chatBox {
      height: 300px;
      overflow-y: auto;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 10px;
      margin: 10px;
    }

    .row {
      display: flex;
      align-items: center;
      margin: 5px;
    }

    .me { justify-content: flex-end; }
    .other { justify-content: flex-start; }

    .bubble {
      padding: 10px;
      border-radius: 20px;
      max-width: 60%;
    }

    .me .bubble {
      background: white;
      color: #ff4b2b;
    }

    .other .bubble {
      background: rgba(255,255,255,0.6);
      color: black;
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      margin: 5px;
    }

    .input-area {
      display: flex;
      gap: 10px;
      margin: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
    }
  </style>
</head>

<body>

<div class="logo">TG</div>
<h1>TeamUp Global</h1>

<div id="auth">
  <button onclick="googleLogin()">Continue with Google</button>
</div>

<div id="app" style="display:none;">
  <p id="welcome"></p>

  <!-- USERS -->
  <div id="users"></div>

  <!-- CHAT -->
  <div id="chatBox"></div>

  <div class="input-area">
    <input id="message" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
  </div>

  <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithRedirect,
  getRedirectResult,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp,
  setDoc,
  doc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:b80b61d82df788cc0339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const provider = new GoogleAuthProvider();

let currentUser;
let selectedUser = null;

/* LOGIN */
window.googleLogin = () => signInWithRedirect(auth, provider);
getRedirectResult(auth).catch(() => {});

/* AUTH */
onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;

    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";

    document.getElementById("welcome").innerText =
      "Welcome " + (user.displayName || user.email);

    /* SAVE USER */
    await setDoc(doc(db, "users", user.uid), {
      name: user.displayName || user.email,
      uid: user.uid,
      photo: user.photoURL || ""
    });

    loadUsers();
  }
});

/* LOAD USERS */
async function loadUsers() {
  const usersDiv = document.getElementById("users");
  usersDiv.innerHTML = "";

  const snapshot = await getDocs(collection(db, "users"));

  snapshot.forEach(docSnap => {
    const user = docSnap.data();

    if (user.uid === currentUser.uid) return;

    const div = document.createElement("div");
    div.className = "user";
    div.innerText = user.name;

    div.onclick = () => {
      selectedUser = user;
      loadMessages();
    };

    usersDiv.appendChild(div);
  });
}

/* SEND MESSAGE */
window.sendMessage = async function () {
  if (!selectedUser) return alert("Select a user first");

  const text = document.getElementById("message").value;
  if (!text) return;

  const chatId = [currentUser.uid, selectedUser.uid].sort().join("_");

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text,
    sender: currentUser.uid,
    photo: currentUser.photoURL || "",
    createdAt: serverTimestamp()
  });

  document.getElementById("message").value = "";
};

/* LOAD MESSAGES */
function loadMessages() {
  const chatBox = document.getElementById("chatBox");

  const chatId = [currentUser.uid, selectedUser.uid].sort().join("_");

  const q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("createdAt")
  );

  onSnapshot(q, snapshot => {
    chatBox.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      const row = document.createElement("div");
      row.className = "row " + (data.sender === currentUser.uid ? "me" : "other");

      const img = document.createElement("img");
      img.className = "avatar";
      img.src = data.photo || "https://via.placeholder.com/30";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerText = data.text;

      if (data.sender === currentUser.uid) {
        row.appendChild(bubble);
        row.appendChild(img);
      } else {
        row.appendChild(img);
        row.appendChild(bubble);
      }

      chatBox.appendChild(row);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

/* LOGOUT */
window.logout = () => signOut(auth);
</script>

</body>
      </html>
