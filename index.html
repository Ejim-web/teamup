<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #ece5dd;
    }

    .header {
      background: #075e54;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 8px;
      border-radius: 20px;
      border: none;
    }

    button {
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #25d366;
      color: white;
      margin: 5px;
      cursor: pointer;
    }

    #usersList div {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      background: white;
      cursor: pointer;
    }

    #chatBox {
      height: 50vh;
      overflow-y: auto;
      padding: 10px;
      background: #e5ddd5;
    }

    .msg {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      max-width: 70%;
    }

    .me {
      background: #dcf8c6;
      margin-left: auto;
    }

    .other {
      background: white;
    }

    .time {
      font-size: 10px;
      color: gray;
    }

    .bottom {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #ece5dd;
      padding: 10px;
    }
  </style>
</head>

<body>

<div class="header">TeamUp Global</div>

<div id="auth">
  <input id="name" placeholder="Name">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <p id="welcome"></p>

  <h3>Users</h3>
  <div id="usersList"></div>

  <h3 id="chatTitle"></h3>
  <p id="typing" style="color:gray;"></p>

  <div id="chatBox"></div>

  <div class="bottom">
    <input id="message" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
  </div>

  <br><br><br>
  <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword,
  signInWithEmailAndPassword, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore, collection, addDoc, query, orderBy,
  onSnapshot, serverTimestamp, doc, setDoc, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9",
  measurementId: "G-EJ59MW0TMC"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser, selectedUser, unsubscribe;

/* SIGNUP */
window.signup = async () => {
  const cred = await createUserWithEmailAndPassword(auth, email.value, password.value);

  await setDoc(doc(db, "users", cred.user.uid), {
    name: name.value || cred.user.email,
    email: cred.user.email,
    online: true,
    lastSeen: serverTimestamp()
  });

  alert("Account created");
};

/* LOGIN */
window.login = () => {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

/* STATUS */
function updateStatus() {
  const ref = doc(db, "users", currentUser.uid);

  setDoc(ref, {
    online: true,
    lastSeen: serverTimestamp()
  }, { merge: true });

  window.addEventListener("beforeunload", () => {
    setDoc(ref, {
      online: false,
      lastSeen: new Date()
    }, { merge: true });
  });
}

/* AUTH */
onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    updateStatus();

    authDiv.style.display = "none";
    app.style.display = "block";

    welcome.innerText = "Welcome " + user.email;

    loadUsers();
  } else {
    authDiv.style.display = "block";
    app.style.display = "none";
  }
});

/* USERS */
async function loadUsers() {
  const snap = await getDocs(collection(db, "users"));
  usersList.innerHTML = "";

  snap.forEach(d => {
    if (d.id === currentUser.uid) return;

    const data = d.data();

    let status = "Offline";
    if (data.online) status = "🟢 Online";
    else if (data.lastSeen)
      status = "Last seen: " + data.lastSeen.toDate().toLocaleTimeString();

    const div = document.createElement("div");
    div.innerHTML = `<b>${data.name}</b><br><small>${status}</small>`;

    div.onclick = () => openChat(d.id, data.name);
    usersList.appendChild(div);
  });
}

/* CHAT */
function openChat(uid, name) {
  selectedUser = uid;
  chatTitle.innerText = "Chat with " + name;
  loadMessages();
}

/* SEND */
window.sendMessage = async () => {
  if (!selectedUser) return alert("Select user");

  const text = message.value.trim();
  if (!text) return;

  const chatId = [currentUser.uid, selectedUser].sort().join("_");

  await setDoc(doc(db, "chats", chatId), {
    participants: [currentUser.uid, selectedUser]
  }, { merge: true });

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text,
    senderId: currentUser.uid,
    timestamp: serverTimestamp()
  });

  message.value = "";
};

/* TYPING */
message.addEventListener("input", async () => {
  if (!selectedUser) return;

  const chatId = [currentUser.uid, selectedUser].sort().join("_");

  await setDoc(doc(db, "chats", chatId), {
    typing: currentUser.uid
  }, { merge: true });

  setTimeout(() => {
    setDoc(doc(db, "chats", chatId), { typing: "" }, { merge: true });
  }, 1500);
});

/* LOAD MESSAGES */
function loadMessages() {
  const chatId = [currentUser.uid, selectedUser].sort().join("_");

  if (unsubscribe) unsubscribe();

  const q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("timestamp")
  );

  unsubscribe = onSnapshot(q, snap => {
    chatBox.innerHTML = "";

    snap.forEach(d => {
      const data = d.data();

      const div = document.createElement("div");
      div.className = "msg " + (data.senderId === currentUser.uid ? "me" : "other");

      const time = data.timestamp?.toDate().toLocaleTimeString();

      div.innerHTML = `${data.text}<div class="time">${time || ""}</div>`;
      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });

  // typing listener
  onSnapshot(doc(db, "chats", chatId), snap => {
    const data = snap.data();
    typing.innerText =
      data?.typing && data.typing !== currentUser.uid ? "Typing..." : "";
  });
}

/* LOGOUT */
window.logout = () => signOut(auth);
</script>

</body>
</html>
