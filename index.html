<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f2f2;
    }

    header {
      background: #0f6d5c;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .section {
      padding: 10px;
    }

    .user, .chat {
      background: white;
      padding: 12px;
      margin: 5px 0;
      border-radius: 10px;
      cursor: pointer;
    }

    #chatBox {
      height: 300px;
      overflow-y: auto;
      background: #ddd;
      padding: 10px;
      border-radius: 10px;
    }

    .msg {
      padding: 10px;
      margin: 5px 0;
      border-radius: 10px;
      max-width: 70%;
    }

    .me {
      background: #4CAF50;
      color: white;
      margin-left: auto;
    }

    .other {
      background: white;
    }

    .inputArea {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
    }

    button {
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #4CAF50;
      color: white;
    }
  </style>
</head>

<body>

<header>TeamUp Global</header>

<div id="auth" class="section">
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

  <div class="section">
    <b id="welcome"></b>
  </div>

  <div class="section">
    <h3>Start Chat</h3>
    <div id="users"></div>
  </div>

  <div class="section">
    <h3 id="chatTitle">Select a chat</h3>
    <div id="chatBox"></div>

    <div class="inputArea">
      <input id="msgInput" placeholder="Type message">
      <button onclick="sendMessage()">Send</button>
    </div>

    <button onclick="logout()">Logout</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth, createUserWithEmailAndPassword,
  signInWithEmailAndPassword, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore, collection, addDoc,
  getDocs, query, where,
  onSnapshot, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;
let currentChatId = null;
let unsubscribe = null;

window.signup = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const userCred = await createUserWithEmailAndPassword(auth, email, password);

  await addDoc(collection(db, "users"), {
    email
  });
};

window.login = () => {
  signInWithEmailAndPassword(
    auth,
    document.getElementById("email").value,
    document.getElementById("password").value
  );
};

onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;

    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";

    document.getElementById("welcome").innerText = user.email;

    loadUsers();
  } else {
    document.getElementById("auth").style.display = "block";
    document.getElementById("app").style.display = "none";
  }
});

async function loadUsers() {
  const usersDiv = document.getElementById("users");
  usersDiv.innerHTML = "";

  const snapshot = await getDocs(collection(db, "users"));

  snapshot.forEach(doc => {
    const data = doc.data();

    if (data.email === currentUser.email) return;

    const div = document.createElement("div");
    div.className = "user";
    div.innerText = data.email;

    div.onclick = () => openChat(data.email);

    usersDiv.appendChild(div);
  });
}

async function openChat(otherUser) {
  document.getElementById("chatTitle").innerText = "Chat with " + otherUser;

  const chatsRef = collection(db, "chats");

  const q = query(
    chatsRef,
    where("users", "array-contains", currentUser.email)
  );

  const snapshot = await getDocs(q);

  let found = null;

  snapshot.forEach(doc => {
    const data = doc.data();
    if (data.users.includes(otherUser)) {
      found = { id: doc.id, ...data };
    }
  });

  if (!found) {
    const newChat = await addDoc(chatsRef, {
      users: [currentUser.email, otherUser]
    });

    currentChatId = newChat.id;
  } else {
    currentChatId = found.id;
  }

  loadMessages();
}

function loadMessages() {
  if (unsubscribe) unsubscribe();

  const chatBox = document.getElementById("chatBox");

  const q = query(
    collection(db, "chats", currentChatId, "messages"),
    orderBy("time")
  );

  unsubscribe = onSnapshot(q, snapshot => {
    chatBox.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "msg " + (data.sender === currentUser.email ? "me" : "other");
      div.innerText = data.text;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

window.sendMessage = async () => {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();

  if (!text || !currentChatId) return;

  await addDoc(collection(db, "chats", currentChatId, "messages"), {
    text,
    sender: currentUser.email,
    time: serverTimestamp()
  });

  input.value = "";
};

window.logout = () => {
  signOut(auth);
};
</script>

</body>
</html>
