<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TeamUp Global – Swipe, Match, Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body {
      background: #1a1a2e;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .app-container {
      width: 100%;
      max-width: 500px;
      height: 95vh;
      background: white;
      border-radius: 32px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 45px rgba(0,0,0,0.2);
    }
    /* Login screen */
    .login-screen {
      background: linear-gradient(145deg, #f9ecec, #ffe0e0);
      justify-content: center;
      align-items: center;
      padding: 32px 24px;
      gap: 20px;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .login-screen h1 {
      font-size: 2.2rem;
      color: #c44545;
      letter-spacing: -0.5px;
    }
    .login-screen input {
      width: 100%;
      padding: 14px 20px;
      border: 1px solid #ffc2c2;
      border-radius: 60px;
      background: white;
      font-size: 1rem;
    }
    .login-screen button {
      background: #c44545;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 60px;
      width: 100%;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    #signupBtn {
      background: #e07a7a;
    }
    .error-msg {
      color: #c44545;
      font-size: 0.8rem;
      text-align: center;
      margin-top: 5px;
    }
    /* Main app */
    #mainApp {
      display: none;
      flex-direction: column;
      flex: 1;
    }
    .app-header {
      padding: 20px 20px 8px;
      background: white;
      border-bottom: 1px solid #f0f0f0;
    }
    .app-header h2 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #c44545, #e07a7a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .header-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }
    .user-email {
      font-size: 0.7rem;
      color: #888;
    }
    .icon-btn {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: #c44545;
    }
    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: #fafafa;
    }
    /* Swipe card */
    .swipe-container {
      position: relative;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .card {
      position: absolute;
      width: 100%;
      max-width: 340px;
      background: white;
      border-radius: 32px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.1);
      overflow: hidden;
      cursor: grab;
      transition: transform 0.2s;
    }
    .card-img {
      height: 280px;
      background: #eaeef3;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      color: #a0aec0;
    }
    .card-info {
      padding: 20px;
    }
    .card-info h3 {
      font-size: 1.6rem;
      margin-bottom: 5px;
    }
    .location {
      font-size: 0.85rem;
      color: #5a6e85;
      margin: 6px 0;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .last-active {
      font-size: 0.7rem;
      color: #22c55e;
      margin-bottom: 12px;
    }
    .stats-row {
      display: flex;
      gap: 20px;
      margin-top: 12px;
      color: #555;
      font-size: 0.8rem;
    }
    /* People lists (matches & liked) */
    .people-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .person-card {
      background: white;
      border-radius: 24px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .person-avatar {
      width: 56px;
      height: 56px;
      background: #f0d9d9;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
    }
    .person-info {
      flex: 1;
    }
    .online-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: #2ecc71;
      border-radius: 50%;
      margin-left: 6px;
    }
    /* Chat view */
    .chat-view {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .chat-header {
      padding: 12px 16px;
      background: white;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #fefefe;
    }
    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 22px;
      font-size: 0.9rem;
    }
    .message.me {
      align-self: flex-end;
      background: #c44545;
      color: white;
      border-bottom-right-radius: 5px;
    }
    .message.other {
      align-self: flex-start;
      background: #eef2ff;
      color: #1f2a48;
      border-bottom-left-radius: 5px;
    }
    .chat-input {
      display: flex;
      gap: 10px;
      padding: 12px;
      background: white;
      border-top: 1px solid #eee;
    }
    .chat-input input {
      flex: 1;
      padding: 12px;
      border-radius: 40px;
      border: 1px solid #ddd;
    }
    .no-profiles {
      text-align: center;
      padding: 50px 20px;
      color: #8892a0;
    }
    /* Bottom tab bar */
    .tab-bar {
      display: flex;
      background: white;
      border-top: 1px solid #eee;
      padding: 8px 20px;
      justify-content: space-around;
    }
    .tab {
      font-size: 1.6rem;
      color: #aaa;
      cursor: pointer;
      text-align: center;
      flex: 1;
    }
    .tab.active {
      color: #c44545;
    }
    .back-btn {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: #c44545;
    }
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
      display: none;
    }
    .modal-content {
      background: white;
      width: 85%;
      max-width: 350px;
      border-radius: 32px;
      padding: 24px;
    }
    .modal-content input,
    .modal-content textarea {
      width: 100%;
      margin: 8px 0;
      padding: 10px;
      border-radius: 30px;
      border: 1px solid #ddd;
    }
    .modal-content button {
      background: #c44545;
      color: white;
      padding: 10px;
      border-radius: 40px;
      width: 100%;
      border: none;
      margin-top: 8px;
    }
    .cancel-btn {
      background: #ccc !important;
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- Login Screen -->
  <div id="loginScreen" class="login-screen">
    <h1>💙 TeamUp Global</h1>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <div id="loginError" class="error-msg"></div>
    <button id="loginBtn">Login</button>
    <button id="signupBtn">Create Account</button>
  </div>

  <!-- Main App (hidden until logged in) -->
  <div id="mainApp" style="display:none;">
    <div class="app-header">
      <h2>TeamUp Global</h2>
      <div class="header-actions">
        <span class="user-email" id="currentUserEmail"></span>
        <button id="editProfileBtn" class="icon-btn"><i class="fas fa-user-edit"></i></button>
        <button id="logoutMainBtn" class="icon-btn"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>
    <div id="contentArea" class="content-area"></div>
    <div class="tab-bar">
      <div class="tab" data-main-tab="swipe"><i class="fas fa-fire"></i></div>
      <div class="tab" data-main-tab="matches"><i class="fas fa-heart"></i></div>
      <div class="tab" data-main-tab="likes"><i class="fas fa-star"></i></div>
    </div>
  </div>

  <!-- Edit Profile Modal -->
  <div id="editModal" class="modal-overlay">
    <div class="modal-content">
      <h3>Edit Profile</h3>
      <input type="text" id="editName" placeholder="Full Name">
      <input type="number" id="editAge" placeholder="Age">
      <input type="text" id="editLocation" placeholder="City, Country">
      <input type="text" id="editAvatar" placeholder="Avatar emoji (e.g. 🧑)" maxlength="2">
      <textarea id="editBio" placeholder="Bio (e.g. 'Adventure lover')" rows="2"></textarea>
      <button id="saveProfileBtn">Save</button>
      <button id="closeModalBtn" class="cancel-btn">Cancel</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, getDocs, onSnapshot, addDoc, serverTimestamp, increment, arrayUnion, arrayRemove, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
    authDomain: "teamup-68a21.firebaseapp.com",
    projectId: "teamup-68a21",
    storageBucket: "teamup-68a21.firebasestorage.app",
    messagingSenderId: "379106762572",
    appId: "1:379106762572:web:a1537754ed17d3a60339e9"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // DOM elements
  const loginScreen = document.getElementById("loginScreen");
  const mainApp = document.getElementById("mainApp");
  const loginEmail = document.getElementById("loginEmail");
  const loginPassword = document.getElementById("loginPassword");
  const loginBtn = document.getElementById("loginBtn");
  const signupBtn = document.getElementById("signupBtn");
  const logoutMainBtn = document.getElementById("logoutMainBtn");
  const editProfileBtn = document.getElementById("editProfileBtn");
  const editModal = document.getElementById("editModal");
  const saveProfileBtn = document.getElementById("saveProfileBtn");
  const closeModalBtn = document.getElementById("closeModalBtn");
  const editName = document.getElementById("editName");
  const editAge = document.getElementById("editAge");
  const editLocation = document.getElementById("editLocation");
  const editAvatar = document.getElementById("editAvatar");
  const editBio = document.getElementById("editBio");
  const contentArea = document.getElementById("contentArea");
  const mainTabs = document.querySelectorAll(".tab");
  const currentUserEmailSpan = document.getElementById("currentUserEmail");
  const loginError = document.getElementById("loginError");

  let currentUser = null, currentUserId = null;
  let currentMainTab = "swipe";
  let unsubscribeChat = null, swipeCards = [], currentCardIndex = 0;

  // Helper functions
  async function setUserOnline(uid, on) {
    try { await updateDoc(doc(db, "users", uid), { online: on, lastSeen: serverTimestamp() }); } catch(e) {}
  }

  async function createUserProfile(user) {
    await setDoc(doc(db, "users", user.uid), {
      email: user.email,
      name: user.email.split('@')[0],
      age: null,
      location: null,
      bio: "New to TeamUp!",
      photoIcon: "🧑",
      online: true,
      lastSeen: serverTimestamp(),
      joinDate: serverTimestamp(),
      likesReceived: 0,
      swipedRight: [],
      swipedLeft: [],
      likedBy: []
    });
  }

  async function getAllUsers(uid) {
    const q = query(collection(db, "users"), limit(50));
    const snap = await getDocs(q);
    let users = [];
    snap.forEach(d => { if (d.id !== uid) users.push({ id: d.id, ...d.data() }); });
    return users;
  }

  async function getSwipeCandidates(uid) {
    const userDoc = await getDoc(doc(db, "users", uid));
    const swipedRight = userDoc.data()?.swipedRight || [];
    const swipedLeft = userDoc.data()?.swipedLeft || [];
    const swipedIds = [...swipedRight, ...swipedLeft];
    const all = await getAllUsers(uid);
    return all.filter(u => !swipedIds.includes(u.id));
  }

  function formatLastActive(ts) {
    if (!ts) return "Recently";
    const diff = (Date.now() - ts.toDate()) / 1000;
    if (diff < 60) return "Active now";
    if (diff < 3600) return `${Math.floor(diff/60)} min ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)} hours ago`;
    return `${Math.floor(diff/86400)} days ago`;
  }

  async function renderSwipeDeck() {
    contentArea.innerHTML = `<div class="swipe-container" id="swipeContainer"></div>`;
    const candidates = await getSwipeCandidates(currentUserId);
    if (candidates.length === 0) {
      document.getElementById("swipeContainer").innerHTML = '<div class="no-profiles">✨ No new people nearby ✨</div>';
      return;
    }
    swipeCards = candidates;
    currentCardIndex = 0;
    displayNextCard();
  }

  function displayNextCard() {
    const container = document.getElementById("swipeContainer");
    if (!container) return;
    if (currentCardIndex >= swipeCards.length) {
      container.innerHTML = '<div class="no-profiles">🎉 You\'ve seen everyone! Check later.</div>';
      return;
    }
    const user = swipeCards[currentCardIndex];
    const lastActive = user.lastSeen ? formatLastActive(user.lastSeen) : "Recently";
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="card-img">${user.photoIcon || "👤"}</div>
      <div class="card-info">
        <h3>${user.name || "?"}, ${user.age || "?"}</h3>
        <div class="location"><i class="fas fa-map-marker-alt"></i> ${user.location || "Unknown"}</div>
        <div class="last-active"><i class="fas fa-clock"></i> ${lastActive}</div>
        <p>${user.bio || ""}</p>
        <div class="stats-row">
          <span><i class="fas fa-heart"></i> ${user.likesReceived || 0}</span>
          <span><i class="fas fa-comment"></i> 8</span>
          <span><i class="fas fa-eye"></i> 43</span>
        </div>
      </div>
    `;
    container.innerHTML = "";
    container.appendChild(card);
    attachSwipeEvents(card, user);
  }

  function attachSwipeEvents(card, user) {
    let startX = 0, currentX = 0, dragging = false;
    const onStart = (e) => {
      dragging = true;
      startX = e.clientX ?? e.touches[0].clientX;
      card.style.transition = "none";
    };
    const onMove = (e) => {
      if (!dragging) return;
      currentX = (e.clientX ?? e.touches[0].clientX) - startX;
      card.style.transform = `translateX(${currentX}px) rotate(${currentX * 0.02}deg)`;
    };
    const onEnd = async () => {
      if (!dragging) return;
      dragging = false;
      card.style.transition = "transform 0.3s";
      if (Math.abs(currentX) > 100) {
        const liked = currentX > 0;
        card.style.transform = `translateX(${liked ? 500 : -500}px) rotate(${liked ? 30 : -30}deg)`;
        setTimeout(async () => {
          if (liked) {
            await updateDoc(doc(db, "users", currentUserId), { swipedRight: arrayUnion(user.id) });
            // Add current user to likedBy of the other person
            await updateDoc(doc(db, "users", user.id), { likedBy: arrayUnion(currentUserId), likesReceived: increment(1) });
            // Check for match
            const otherDoc = await getDoc(doc(db, "users", user.id));
            if (otherDoc.exists() && (otherDoc.data().swipedRight || []).includes(currentUserId)) {
              const matchId = [currentUserId, user.id].sort().join("_");
              await setDoc(doc(db, "matches", matchId), { users: [currentUserId, user.id], createdAt: serverTimestamp() });
              alert("💖 It's a match! 💖");
            }
          } else {
            await updateDoc(doc(db, "users", currentUserId), { swipedLeft: arrayUnion(user.id) });
          }
          currentCardIndex++;
          displayNextCard();
        }, 200);
      } else {
        card.style.transform = "translateX(0) rotate(0deg)";
      }
      currentX = 0;
    };
    card.addEventListener("mousedown", onStart);
    card.addEventListener("touchstart", onStart, { passive: false });
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onEnd);
    window.addEventListener("touchmove", onMove, { passive: false });
    window.addEventListener("touchend", onEnd);
  }

  // Render matches (mutual)
  async function renderMatches() {
    contentArea.innerHTML = `<div id="matchesList" class="people-list"></div>`;
    const matchesSnap = await getDocs(query(collection(db, "matches"), where("users", "array-contains", currentUserId)));
    const matchIds = [];
    matchesSnap.forEach(d => {
      const users = d.data().users;
      const other = users.find(id => id !== currentUserId);
      if (other) matchIds.push(other);
    });
    const container = document.getElementById("matchesList");
    if (matchIds.length === 0) {
      container.innerHTML = '<div class="no-profiles">💔 No matches yet. Keep swiping!</div>';
      return;
    }
    for (const id of matchIds) {
      const userSnap = await getDoc(doc(db, "users", id));
      if (userSnap.exists()) {
        const data = userSnap.data();
        const onlineDot = data.online ? '<span class="online-indicator"></span>' : '';
        const div = document.createElement("div");
        div.className = "person-card";
        div.innerHTML = `
          <div class="person-avatar">${data.photoIcon || "👤"}</div>
          <div class="person-info">
            <strong>${data.name || "?"}, ${data.age || "?"}</strong> ${onlineDot}<br>
            <small>${data.location || "Unknown"}</small>
          </div>
        `;
        div.addEventListener("click", () => openChat(id, data.name));
        container.appendChild(div);
      }
    }
  }

  // Render people who liked me (not yet matched)
  async function renderLikedBy() {
    contentArea.innerHTML = `<div id="likedList" class="people-list"></div>`;
    const currentUserDoc = await getDoc(doc(db, "users", currentUserId));
    const likedByIds = currentUserDoc.data()?.likedBy || [];
    // exclude already matched ones
    const matchesSnap = await getDocs(query(collection(db, "matches"), where("users", "array-contains", currentUserId)));
    const matchedIds = [];
    matchesSnap.forEach(d => {
      const users = d.data().users;
      const other = users.find(id => id !== currentUserId);
      if (other) matchedIds.push(other);
    });
    const notYetMatched = likedByIds.filter(id => !matchedIds.includes(id));
    const container = document.getElementById("likedList");
    if (notYetMatched.length === 0) {
      container.innerHTML = '<div class="no-profiles">🌟 No likes yet. Swipe more!</div>';
      return;
    }
    for (const id of notYetMatched) {
      const userSnap = await getDoc(doc(db, "users", id));
      if (userSnap.exists()) {
        const data = userSnap.data();
        const div = document.createElement("div");
        div.className = "person-card";
        div.innerHTML = `
          <div class="person-avatar">${data.photoIcon || "👤"}</div>
          <div class="person-info">
            <strong>${data.name || "?"}, ${data.age || "?"}</strong><br>
            <small>${data.location || "Unknown"}</small>
          </div>
        `;
        // clicking on a like does not open chat, just shows profile (optional)
        div.addEventListener("click", () => alert(`${data.name} liked you! Swipe right to match.`));
        container.appendChild(div);
      }
    }
  }

  async function openChat(otherId, otherName) {
    if (unsubscribeChat) unsubscribeChat();
    contentArea.innerHTML = `
      <div class="chat-view">
        <div class="chat-header">
          <button id="chatBackBtn" class="back-btn"><i class="fas fa-arrow-left"></i></button>
          <strong>${otherName}</strong>
        </div>
        <div id="chatMessagesArea" class="chat-messages"></div>
        <div class="chat-input">
          <input id="chatInputField" placeholder="Message...">
          <button id="chatSendBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    `;
    document.getElementById("chatBackBtn").addEventListener("click", () => {
      if (unsubscribeChat) unsubscribeChat();
      renderMatches();
    });
    const roomId = [currentUserId, otherId].sort().join("__");
    const messagesRef = collection(db, "chats", roomId, "messages");
    const q = query(messagesRef, orderBy("timestamp", "asc"));
    unsubscribeChat = onSnapshot(q, (snap) => {
      const container = document.getElementById("chatMessagesArea");
      if (!container) return;
      container.innerHTML = "";
      snap.forEach(d => {
        const msg = d.data();
        const div = document.createElement("div");
        div.className = `message ${msg.senderId === currentUserId ? "me" : "other"}`;
        div.innerText = msg.text;
        container.appendChild(div);
      });
      container.scrollTop = container.scrollHeight;
    });
    document.getElementById("chatSendBtn").addEventListener("click", async () => {
      const input = document.getElementById("chatInputField");
      const text = input.value.trim();
      if (!text) return;
      await addDoc(messagesRef, { text, senderId: currentUserId, timestamp: serverTimestamp() });
      input.value = "";
    });
  }

  async function refreshContent() {
    if (currentMainTab === "swipe") await renderSwipeDeck();
    else if (currentMainTab === "matches") await renderMatches();
    else if (currentMainTab === "likes") await renderLikedBy();
  }

  mainTabs.forEach(tab => {
    tab.addEventListener("click", () => {
      mainTabs.forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      currentMainTab = tab.getAttribute("data-main-tab");
      refreshContent();
    });
  });

  editProfileBtn.onclick = async () => {
    const d = (await getDoc(doc(db, "users", currentUserId))).data();
    editName.value = d.name || "";
    editAge.value = d.age || "";
    editLocation.value = d.location || "";
    editAvatar.value = d.photoIcon || "🧑";
    editBio.value = d.bio || "";
    editModal.style.display = "flex";
  };
  saveProfileBtn.onclick = async () => {
    await updateDoc(doc(db, "users", currentUserId), {
      name: editName.value,
      age: parseInt(editAge.value) || null,
      location: editLocation.value,
      photoIcon: editAvatar.value || "🧑",
      bio: editBio.value
    });
    editModal.style.display = "none";
    refreshContent();
  };
  closeModalBtn.onclick = () => editModal.style.display = "none";

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      currentUserId = user.uid;
      currentUserEmailSpan.innerText = user.email;
      const snap = await getDoc(doc(db, "users", user.uid));
      if (!snap.exists()) await createUserProfile(user);
      await setUserOnline(user.uid, true);
      loginScreen.style.display = "none";
      mainApp.style.display = "flex";
      document.querySelector('.tab[data-main-tab="swipe"]').classList.add("active");
      currentMainTab = "swipe";
      await refreshContent();
      setInterval(() => setUserOnline(user.uid, true), 30000);
    } else {
      if (currentUserId) setUserOnline(currentUserId, false);
      loginScreen.style.display = "flex";
      mainApp.style.display = "none";
      loginError.innerText = "";
    }
  });

  loginBtn.onclick = async () => {
    loginError.innerText = "";
    try {
      await signInWithEmailAndPassword(auth, loginEmail.value, loginPassword.value);
    } catch (err) {
      let msg = err.message;
      if (msg.includes("auth/user-not-found")) msg = "❌ No account. Click 'Create Account'.";
      else if (msg.includes("auth/wrong-password")) msg = "❌ Wrong password.";
      else if (msg.includes("auth/operation-not-allowed")) msg = "❌ Email/Password sign-in disabled. Enable in Firebase Console.";
      else msg = "❌ " + msg;
      loginError.innerText = msg;
    }
  };
  signupBtn.onclick = async () => {
    loginError.innerText = "";
    try {
      const cred = await createUserWithEmailAndPassword(auth, loginEmail.value, loginPassword.value);
      await createUserProfile(cred.user);
    } catch (err) {
      let msg = err.message;
      if (msg.includes("auth/email-already-in-use")) msg = "❌ Email already in use. Login instead.";
      else if (msg.includes("auth/weak-password")) msg = "❌ Password must be at least 6 characters.";
      else if (msg.includes("auth/operation-not-allowed")) msg = "❌ Email/Password sign-in disabled. Enable in Firebase Console.";
      else msg = "❌ " + msg;
      loginError.innerText = msg;
    }
  };
  logoutMainBtn.onclick = async () => { await signOut(auth); };
  window.addEventListener("beforeunload", () => { if (currentUserId) setUserOnline(currentUserId, false); });
</script>
</body>
</html>
