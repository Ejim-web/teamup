<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
      text-align: center;
    }

    .logo {
      width: 90px;
      height: 90px;
      margin: 20px auto;
      border-radius: 50%;
      background: white;
      overflow: hidden;
      cursor: pointer;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    input {
      width: 80%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 20px;
      border: none;
    }

    button {
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: white;
      color: #ff4b2b;
      font-weight: bold;
      cursor: pointer;
    }

    #chatBox {
      height: 300px;
      overflow-y: auto;
      background: rgba(255,255,255,0.2);
      margin: 10px;
      border-radius: 15px;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .message {
      padding: 10px;
      margin: 5px;
      border-radius: 15px;
      max-width: 70%;
      word-wrap: break-word;
    }

    .me {
      background: white;
      color: #ff4b2b;
      align-self: flex-end;
    }

    .other {
      background: rgba(255,255,255,0.7);
      color: black;
      align-self: flex-start;
    }

    #usersList div {
      background: white;
      color: black;
      margin: 5px;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<input type="file" id="profileInput" hidden>

<div class="logo" onclick="document.getElementById('profileInput').click()">
  <img id="profileImage">
</div>

<h2>TeamUp Global</h2>

<div id="auth">
  <input id="name" placeholder="Your Name"><br>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <p id="welcome"></p>

  <div id="usersList"></div>

  <div id="chatBox"></div>

  <input id="message" placeholder="Type message">
  <button onclick="sendMessage()">Send</button>

  <br><br>
  <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp,
  doc,
  setDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;
let selectedUser = null;
let unsubscribeMessages = null;

/* ELEMENTS */
const nameInput = document.getElementById("name");
const email = document.getElementById("email");
const password = document.getElementById("password");
const chatBox = document.getElementById("chatBox");
const message = document.getElementById("message");
const usersList = document.getElementById("usersList");
const welcome = document.getElementById("welcome");

/* SIGNUP */
window.signup = async () => {
  try {
    const cred = await createUserWithEmailAndPassword(auth, email.value, password.value);

    await setDoc(doc(db, "users", cred.user.uid), {
      email: cred.user.email,
      name: nameInput.value || "User"
    });

    alert("Account created!");
  } catch (e) {
    alert(e.message);
  }
};

/* LOGIN */
window.login = async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
  } catch (e) {
    alert(e.message);
  }
};

/* AUTH STATE */
onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;

    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";

    const snap = await getDocs(collection(db, "users"));
    snap.forEach(docSnap => {
      if (docSnap.id === user.uid) {
        welcome.innerText = "Welcome " + docSnap.data().name;
      }
    });

    loadUsers();
  } else {
    document.getElementById("auth").style.display = "block";
    document.getElementById("app").style.display = "none";
  }
});

/* LOAD USERS */
async function loadUsers() {
  const snap = await getDocs(collection(db, "users"));
  usersList.innerHTML = "<h3>Select User</h3>";

  snap.forEach(docSnap => {
    if (docSnap.id === currentUser.uid) return;

    const data = docSnap.data();

    const div = document.createElement("div");
    div.innerText = data.name || data.email;

    div.onclick = () => openChat(docSnap.id, data.name);

    usersList.appendChild(div);
  });
}

/* OPEN CHAT */
function openChat(uid, name) {
  selectedUser = uid;
  welcome.innerText = "Chat with " + name;

  if (unsubscribeMessages) unsubscribeMessages();

  loadMessages();
}

/* SEND */
window.sendMessage = async () => {
  if (!selectedUser) return alert("Select user first");

  if (!message.value.trim()) return;

  const chatId = [currentUser.uid, selectedUser].sort().join("_");

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text: message.value,
    sender: currentUser.uid,
    createdAt: serverTimestamp()
  });

  message.value = "";
};

/* LOAD MESSAGES */
function loadMessages() {
  const chatId = [currentUser.uid, selectedUser].sort().join("_");

  const q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("createdAt")
  );

  unsubscribeMessages = onSnapshot(q, snap => {
    chatBox.innerHTML = "";

    snap.forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "message " + (data.sender === currentUser.uid ? "me" : "other");
      div.innerText = data.text;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

/* LOGOUT */
window.logout = async () => {
  await signOut(auth);
  selectedUser = null;
  chatBox.innerHTML = "";
};

/* PROFILE IMAGE */
const input = document.getElementById("profileInput");
const img = document.getElementById("profileImage");

input.onchange = () => {
  const reader = new FileReader();
  reader.onload = e => {
    img.src = e.target.result;
    localStorage.setItem("pic", e.target.result);
  };
  reader.readAsDataURL(input.files[0]);
};

window.onload = () => {
  const saved = localStorage.getItem("pic");
  if (saved) img.src = saved;
};
</script>

</body>
</html>
