<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
      text-align: center;
    }

    .logo {
      width: 70px;
      height: 70px;
      margin: 20px auto;
      border-radius: 50%;
      background: white;
      color: #ff4b2b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    input {
      width: 80%;
      padding: 12px;
      margin: 8px;
      border-radius: 20px;
      border: none;
    }

    button {
      padding: 10px 15px;
      border-radius: 20px;
      border: none;
      background: white;
      color: #ff4b2b;
      font-weight: bold;
      margin: 5px;
    }

    #chatBox {
      height: 300px;
      overflow-y: auto;
      background: rgba(255,255,255,0.2);
      border-radius: 15px;
      margin: 15px;
      padding: 10px;
      text-align: left;
    }

    .msg {
      background: white;
      color: black;
      padding: 8px;
      margin: 5px;
      border-radius: 10px;
    }

    .me {
      background: #ffe0e0;
      text-align: right;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="logo">TG</div>
<h2>TeamUp Global</h2>

<div id="auth">
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" class="hidden">
  <h3 id="welcome"></h3>

  <div id="chatBox"></div>

  <input id="message" placeholder="Type message">
  <button onclick="sendMessage()">Send</button><br>

  <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword,
  signInWithEmailAndPassword, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore, collection, addDoc,
  query, orderBy, onSnapshot, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:b80b61d82df788cc0339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;

// SIGN UP
window.signup = async function () {
  try {
    await createUserWithEmailAndPassword(auth, email.value, password.value);
  } catch (e) {
    alert(e.message);
  }
};

// LOGIN
window.login = async function () {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
  } catch (e) {
    alert(e.message);
  }
};

// AUTH STATE
onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;

    document.getElementById("auth").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    document.getElementById("welcome").innerText =
      "Welcome " + user.email;

    loadMessages();
  }
});

// SEND MESSAGE
window.sendMessage = async function () {
  if (!message.value) return;

  await addDoc(collection(db, "messages"), {
    text: message.value,
    user: currentUser.email,
    createdAt: serverTimestamp()
  });

  message.value = "";
};

// LOAD MESSAGES
function loadMessages() {
  const q = query(collection(db, "messages"), orderBy("createdAt"));

  onSnapshot(q, snapshot => {
    chatBox.innerHTML = "";

    snapshot.forEach(doc => {
      const d = doc.data();
      const div = document.createElement("div");

      div.classList.add("msg");

      if (d.user === currentUser.email) {
        div.classList.add("me");
      }

      div.innerHTML = "<b>" + d.user + "</b><br>" + d.text;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

// LOGOUT
window.logout = function () {
  signOut(auth);
  location.reload();
};
</script>

</body>
  </html>
