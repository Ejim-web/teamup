<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #ece5dd;
    }

    header {
      background: #075e54;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .welcome {
      padding: 10px;
      font-weight: bold;
      background: #ddd;
    }

    .upload-box {
      padding: 10px;
      background: white;
      display: flex;
      gap: 10px;
    }

    .upload-box button {
      background: #25D366;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 5px;
    }

    .user {
      display: flex;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid #ddd;
      background: white;
      cursor: pointer;
    }

    .avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      margin-right: 12px;
      object-fit: cover;
    }

    .name {
      font-size: 16px;
      font-weight: bold;
    }

    .sub {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

<header>TeamUp Global</header>

<div class="welcome" id="welcome"></div>

<!-- IMAGE UPLOAD -->
<div class="upload-box">
  <input type="file" id="file">
  <button id="uploadBtn">Upload</button>
</div>

<div id="users"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
  getAuth, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
  getFirestore, doc, updateDoc, collection, getDocs 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { 
  getStorage, ref, uploadBytes, getDownloadURL 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();
const storage = getStorage();

const usersDiv = document.getElementById("users");
const welcome = document.getElementById("welcome");
const uploadBtn = document.getElementById("uploadBtn");
const fileInput = document.getElementById("file");

let currentUser = null;

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  currentUser = user;
  welcome.innerText = "Welcome " + (user.email || "Guest");

  loadUsers();
});


// ✅ UPLOAD IMAGE
uploadBtn.onclick = async () => {
  const file = fileInput.files[0];

  if (!file) {
    alert("Select image first");
    return;
  }

  const storageRef = ref(storage, "profiles/" + currentUser.uid);

  await uploadBytes(storageRef, file);

  const url = await getDownloadURL(storageRef);

  // save to Firestore
  await updateDoc(doc(db, "users", currentUser.uid), {
    photo: url
  });

  alert("Uploaded successfully!");

  loadUsers(); // refresh list
};


// ✅ LOAD USERS
async function loadUsers() {
  usersDiv.innerHTML = "";

  const snap = await getDocs(collection(db, "users"));

  snap.forEach(docSnap => {
    if (docSnap.id === currentUser.uid) return;

    const data = docSnap.data();

    const name = data.name || data.email || "User";

    const photo = data.photo || 
      `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=25D366&color=fff`;

    const div = document.createElement("div");
    div.className = "user";

    div.innerHTML = `
      <img class="avatar" src="${photo}" 
        onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(name)}'" />

      <div>
        <div class="name">${name}</div>
        <div class="sub">Tap to chat</div>
      </div>
    `;

    div.onclick = () => {
      localStorage.setItem("chatUserId", docSnap.id);
      localStorage.setItem("chatUserName", name);
      window.location.href = "chat.html";
    };

    usersDiv.appendChild(div);
  });
}
</script>

</body>
</html>
