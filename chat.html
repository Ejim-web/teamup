<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #ece5dd;
    }

    .header {
      background: #075e54;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    #chatBox {
      height: 70vh;
      overflow-y: auto;
      padding: 10px;
      background: #e5ddd5;
    }

    .msg {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      max-width: 70%;
      font-size: 14px;
    }

    .me {
      background: #dcf8c6;
      margin-left: auto;
    }

    .other {
      background: white;
    }

    .time {
      font-size: 10px;
      color: gray;
    }

    .inputBox {
      display: flex;
      padding: 10px;
      background: #fff;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
    }

    button {
      margin-left: 5px;
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #25d366;
      color: white;
    }
  </style>
</head>

<body>

<div class="header" id="chatName">Chat</div>

<div id="chatBox"></div>

<div class="inputBox">
  <input id="message" placeholder="Type message">
  <button onclick="sendMessage()">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* SAME CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9",
  measurementId: "G-EJ59MWCTMC"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const chatBox = document.getElementById("chatBox");
const message = document.getElementById("message");
const chatName = document.getElementById("chatName");

const selectedUser = localStorage.getItem("chatUserId");
const selectedName = localStorage.getItem("chatUserName");

chatName.innerText = selectedName;

/* LOAD CHAT */
auth.onAuthStateChanged(user => {
  if (!user) return;

  const chatId = [user.uid, selectedUser].sort().join("_");

  const q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("createdAt")
  );

  onSnapshot(q, snap => {
    chatBox.innerHTML = "";

    snap.forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "msg " + (data.sender === user.uid ? "me" : "other");

      const time = data.createdAt?.toDate().toLocaleTimeString();

      div.innerHTML = `
        ${data.text}
        <div class="time">${time || ""}</div>
      `;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
});

/* SEND */
window.sendMessage = async () => {
  const user = auth.currentUser;
  if (!user) return alert("Login again");

  const text = message.value.trim();
  if (!text) return;

  const chatId = [user.uid, selectedUser].sort().join("_");

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text,
    sender: user.uid,
    createdAt: serverTimestamp()
  });

  message.value = "";
};
</script>

</body>
  </html>
