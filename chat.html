<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f2f2f2;
    }

    header {
      background: #0f6d5b;
      color: white;
      padding: 15px;
      text-align: center;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 5px;
      margin-top: 5px;
    }

    .logout {
      background: red;
      color: white;
    }

    .card {
      background: white;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
    }

    .addBtn {
      background: #0f6d5b;
      color: white;
    }
  </style>
</head>

<body>

<header>
  <h2>TeamUp Global</h2>
  <button class="logout" onclick="logout()">Logout</button>
</header>

<h3 style="padding-left:10px;">Friend Requests</h3>
<div id="requests"></div>

<h3 style="padding-left:10px;">All Users</h3>
<div id="users"></div>

<h3 style="padding-left:10px;">Friends</h3>
<div id="friendsList"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.firebasestorage.app",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9",
  measurementId: "G-EJ59MW0TMC"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUserId = null;

auth.onAuthStateChanged(user => {
  if (user) {
    currentUserId = user.uid;

    loadUsers();
    loadRequests();
    loadFriends();

  } else {
    window.location.href = "login.html";
  }
});


// 🔴 LOGOUT FIX
function logout() {
  auth.signOut()
    .then(() => {
      alert("Logged out");
      window.location.href = "login.html";
    })
    .catch(err => alert(err.message));
}


// ✅ LOAD USERS
function loadUsers() {
  const div = document.getElementById("users");

  db.collection("users").onSnapshot(snapshot => {
    div.innerHTML = "";

    snapshot.forEach(doc => {
      const user = doc.data();

      if (doc.id !== currentUserId) {
        div.innerHTML += `
          <div class="card">
            <p>${user.name || user.email}</p>
            <button class="addBtn" onclick="sendRequest('${doc.id}')">Add Friend</button>
          </div>
        `;
      }
    });
  });
}


// ✅ SEND REQUEST (NO DUPLICATES)
function sendRequest(toId) {

  const requestId = currentUserId + "_" + toId;

  db.collection("friendRequests").doc(requestId).get().then(doc => {

    if (doc.exists) {
      alert("Request already sent");
    } else {
      db.collection("friendRequests").doc(requestId).set({
        from: currentUserId,
        to: toId,
        status: "pending"
      }).then(() => {
        alert("Request sent");
      });
    }

  });
}


// ✅ LOAD REQUESTS (SHOW NAME)
function loadRequests() {
  const div = document.getElementById("requests");

  db.collection("friendRequests")
    .where("to", "==", currentUserId)
    .where("status", "==", "pending")
    .onSnapshot(async snapshot => {

      div.innerHTML = "";

      for (const doc of snapshot.docs) {
        const data = doc.data();

        const userDoc = await db.collection("users").doc(data.from).get();
        const userData = userDoc.data();

        div.innerHTML += `
          <div class="card">
            <p>Request from: ${userData.name || userData.email}</p>
            <button onclick="acceptRequest('${doc.id}', '${data.from}')">Accept</button>
          </div>
        `;
      }
    });
}


// ✅ ACCEPT REQUEST
function acceptRequest(requestId, fromId) {

  const friendId = currentUserId + "_" + fromId;

  db.collection("friends").doc(friendId).set({
    users: [currentUserId, fromId]
  }).then(() => {

    db.collection("friendRequests").doc(requestId).delete();

    alert("Friend added");

  });
}


// ✅ LOAD FRIENDS (SHOW NAME)
function loadFriends() {
  const div = document.getElementById("friendsList");

  db.collection("friends")
    .where("users", "array-contains", currentUserId)
    .onSnapshot(async snapshot => {

      div.innerHTML = "";

      for (const doc of snapshot.docs) {
        const data = doc.data();
        const friendId = data.users.find(id => id !== currentUserId);

        const userDoc = await db.collection("users").doc(friendId).get();
        const userData = userDoc.data();

        div.innerHTML += `
          <div class="card">
            <p>${userData.name || userData.email}</p>
          </div>
        `;
      }
    });
}

</script>

</body>
</html>
