<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #e5ddd5;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      background: #075e54;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 18px;
    }

    #chatBox {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      border: 2px solid red; /* DEBUG: to confirm it's visible */
    }

    .message {
      background: white;
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      max-width: 70%;
    }

    .me {
      background: #dcf8c6;
      margin-left: auto;
    }

    .inputBox {
      display: flex;
      padding: 10px;
      background: #f0f0f0;
    }

    .inputBox input {
      flex: 1;
      padding: 10px;
    }

    .inputBox button {
      margin-left: 10px;
      padding: 10px;
    }
  </style>
</head>

<body>

  <div class="header" id="chatTitle">Loading...</div>

  <div id="chatBox"></div>

  <div class="inputBox">
    <input type="text" id="messageInput">
    <button onclick="sendMessage()">Send</button>
  </div>

  <script>
    const chatUser = localStorage.getItem("chatUser");

    console.log("Selected user:", chatUser); // DEBUG

    if (!chatUser) {
      alert("No user selected!");
    }

    document.getElementById("chatTitle").innerText = chatUser || "No User";

    const chatBox = document.getElementById("chatBox");

    function loadMessages() {
      console.log("Loading messages..."); // DEBUG

      chatBox.innerHTML = "";

      const messages = JSON.parse(localStorage.getItem(chatUser)) || [];

      messages.forEach(msg => {
        const div = document.createElement("div");
        div.className = "message " + (msg.sender === "me" ? "me" : "");
        div.innerText = msg.text;
        chatBox.appendChild(div);
      });
    }

    function sendMessage() {
      const input = document.getElementById("messageInput");
      const text = input.value;

      if (!text) return;

      let messages = JSON.parse(localStorage.getItem(chatUser)) || [];

      messages.push({
        sender: "me",
        text: text
      });

      localStorage.setItem(chatUser, JSON.stringify(messages));

      input.value = "";
      loadMessages();
    }

    loadMessages();
  </script>

</body>
</html>
