<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    .header {
      background: #0f6d5c;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .logout-btn {
      background: red;
      color: white;
      border: none;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: white;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
    }

    button {
      padding: 8px;
      border: none;
      border-radius: 5px;
      margin-top: 5px;
      cursor: pointer;
      background: #0f6d5c;
      color: white;
    }
  </style>
</head>

<body>

<div class="header">
  <h2>TeamUp Global</h2>
  <button class="logout-btn" onclick="logoutUser()">Logout</button>
</div>

<div class="container">
  <h3>All Users</h3>
  <div id="users"></div>
</div>

<!-- ✅ Firebase (COMPAT VERSION - STABLE) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
  // 🔥 Your config
  const firebaseConfig = {
    apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
    authDomain: "teamup-68a21.firebaseapp.com",
    projectId: "teamup-68a21",
    storageBucket: "teamup-68a21.firebasestorage.app",
    messagingSenderId: "379106762572",
    appId: "1:379106762572:web:a1537754ed17d3a60339e9",
    measurementId: "G-EJ59MW0TMC"
  };

  // ✅ Initialize once
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }

  const auth = firebase.auth();
  const db = firebase.firestore();

  // ✅ Check login state
  auth.onAuthStateChanged(user => {
    if (!user) {
      window.location.href = "login.html";
    } else {
      loadUsers(user.uid);
    }
  });

  // ✅ LOGOUT (FIXED)
  function logoutUser() {
    auth.signOut()
      .then(() => {
        alert("Logged out successfully");
        window.location.href = "login.html";
      })
      .catch(error => {
        alert("Logout error: " + error.message);
      });
  }

  // 👥 Load users
  function loadUsers(currentUserId) {
    db.collection("users").get().then(snapshot => {
      let html = "";

      snapshot.forEach(doc => {
        const user = doc.data();

        if (doc.id !== currentUserId) {
          html += `
            <div class="card">
              <p>${user.name || user.email}</p>
              <button onclick="sendRequest('${doc.id}')">Add Friend</button>
            </div>
          `;
        }
      });

      document.getElementById("users").innerHTML = html;
    });
  }

  // 📩 Send request
  function sendRequest(toUserId) {
    const currentUser = auth.currentUser;

    db.collection("friendRequests").add({
      from: currentUser.uid,
      to: toUserId,
      status: "pending"
    })
    .then(() => {
      alert("Friend request sent!");
    })
    .catch(err => {
      alert(err.message);
    });
  }
</script>

</body>
  </html>
