<!DOCTYPE html>
<html>
<head>
  <title>Chat - TeamUp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #ece5dd;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      background: #075e54;
      color: white;
      padding: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .back {
      cursor: pointer;
      font-size: 18px;
    }

    #chatName {
      font-weight: bold;
    }

    #chatBox {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      background: #e5ddd5;
    }

    .msg {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      max-width: 70%;
      font-size: 14px;
    }

    .me {
      background: #dcf8c6;
      margin-left: auto;
    }

    .other {
      background: white;
    }

    .time {
      font-size: 10px;
      color: gray;
      margin-top: 4px;
    }

    .bottom {
      display: flex;
      padding: 10px;
      background: white;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 25px;
      border: 1px solid #ccc;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 12px 16px;
      border: none;
      border-radius: 20px;
      background: #25d366;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="header">
  <div class="back" onclick="goBack()">⬅</div>
  <div id="chatName">User</div>
</div>

<div id="chatBox"></div>

<div class="bottom">
  <input id="message" placeholder="Type message">
  <button id="sendBtn">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* SAME FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.appspot.com",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* GET SELECTED USER */
const selectedUser = localStorage.getItem("chatUserId");
const selectedName = localStorage.getItem("chatUserName");

document.getElementById("chatName").innerText = selectedName || "Chat";

const chatBox = document.getElementById("chatBox");
const message = document.getElementById("message");
const sendBtn = document.getElementById("sendBtn");

let currentUser;
let unsubscribe;

/* AUTH */
onAuthStateChanged(auth, user => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  currentUser = user;
  loadMessages();
});

/* SEND */
sendBtn.onclick = async () => {
  if (!selectedUser) return alert("No user selected");

  const text = message.value.trim();
  if (!text) return;

  const chatId = [currentUser.uid, selectedUser].sort().join("_");

  await setDoc(doc(db, "chats", chatId), {
    participants: [currentUser.uid, selectedUser]
  }, { merge: true });

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text,
    sender: currentUser.uid,
    createdAt: serverTimestamp()
  });

  message.value = "";
};

/* LOAD MESSAGES */
function loadMessages() {
  const chatId = [currentUser.uid, selectedUser].sort().join("_");

  if (unsubscribe) unsubscribe();

  const q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("createdAt")
  );

  unsubscribe = onSnapshot(q, snap => {
    chatBox.innerHTML = "";

    snap.forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "msg " + (data.sender === currentUser.uid ? "me" : "other");

      const time = data.createdAt?.toDate().toLocaleTimeString();

      div.innerHTML = `
        ${data.text}
        <div class="time">${time || ""}</div>
      `;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

/* BACK */
window.goBack = () => {
  window.location.href = "index.html";
};
</script>

</body>
</html>
