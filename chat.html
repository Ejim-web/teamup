<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; font-family:Arial; background:#f2f2f2;">

<div style="background:#1f6f5e; color:white; padding:20px; text-align:center;">
  <h2>TeamUp Global</h2>
  <button onclick="logout()" style="background:red; color:white; padding:10px; border:none;">Logout</button>
</div>

<div style="padding:15px;">
  <h3>All Users</h3>
  <div id="users"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getAuth, 
  onAuthStateChanged, 
  signOut 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
  getFirestore, 
  collection, 
  getDocs 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// CHECK LOGIN
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  loadUsers(user.uid);
});

// LOAD USERS
async function loadUsers(currentUserId) {
  const usersDiv = document.getElementById("users");
  usersDiv.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "users"));

  querySnapshot.forEach((docSnap) => {
    const data = docSnap.data();

    // hide yourself
    if (docSnap.id === currentUserId) return;

    usersDiv.innerHTML += `
      <div style="background:white; padding:15px; margin:10px 0; border-radius:10px;">
        <h3>${data.name || "No Name"}</h3>
        <p>${data.email || "No Email"}</p>
        <button>Add Friend</button>
      </div>
    `;
  });
}

// LOGOUT
window.logout = async function () {
  await signOut(auth);
  window.location.href = "index.html";
};
</script>

</body>
</html>
