<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase v8 (works perfectly with your setup) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #ece5dd;
    }

    header {
      background: #075e54;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 18px;
    }

    #users {
      padding: 10px;
    }

    .user {
      background: white;
      padding: 12px;
      margin-bottom: 8px;
      border-radius: 8px;
      cursor: pointer;
    }

    #chatBox {
      display: none;
      height: 100vh;
      flex-direction: column;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      padding: 8px;
      margin: 5px 0;
      border-radius: 8px;
      max-width: 70%;
    }

    .me {
      background: #25d366;
      color: white;
      margin-left: auto;
    }

    .other {
      background: white;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: white;
    }

    input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      background: #25d366;
      border: none;
      color: white;
    }
  </style>
</head>

<body>

<header>TeamUp Chat</header>

<!-- USERS -->
<div id="users"></div>

<!-- CHAT -->
<div id="chatBox">
  <div id="messages"></div>

  <div id="inputArea">
    <input id="msgInput" placeholder="Type message..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.firebasestorage.app",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let chatUser = null;
let chatId = null;

// ✅ CHECK LOGIN
auth.onAuthStateChanged(user => {
  if (!user) {
    document.body.innerHTML = "<h3 style='text-align:center'>You are not logged in</h3>";
    return;
  }

  currentUser = user;
  loadUsers();
});

// ✅ LOAD USERS
function loadUsers() {
  const usersDiv = document.getElementById("users");

  db.collection("users").onSnapshot(snapshot => {
    usersDiv.innerHTML = "";

    snapshot.forEach(doc => {
      if (doc.id === currentUser.uid) return;

      const data = doc.data();

      const div = document.createElement("div");
      div.className = "user";

      div.innerHTML = `
        <b>${data.name || "User"}</b><br>
        <small>${data.email || ""}</small>
      `;

      div.onclick = () => openChat(doc.id);

      usersDiv.appendChild(div);
    });
  });
}

// ✅ OPEN CHAT
function openChat(uid) {
  chatUser = uid;

  chatId = currentUser.uid < uid
    ? currentUser.uid + "_" + uid
    : uid + "_" + currentUser.uid;

  document.getElementById("users").style.display = "none";
  document.getElementById("chatBox").style.display = "flex";

  loadMessages();
}

// ✅ LOAD MESSAGES
function loadMessages() {
  const messagesDiv = document.getElementById("messages");

  db.collection("chats")
    .doc(chatId)
    .collection("messages")
    .orderBy("time")
    .onSnapshot(snapshot => {

      messagesDiv.innerHTML = "";

      snapshot.forEach(doc => {
        const msg = doc.data();

        const div = document.createElement("div");
        div.className = "msg " + (msg.sender === currentUser.uid ? "me" : "other");

        div.textContent = msg.text;

        messagesDiv.appendChild(div);
      });

      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });
}

// ✅ SEND MESSAGE
function sendMessage() {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();

  if (!text) return;

  db.collection("chats")
    .doc(chatId)
    .collection("messages")
    .add({
      text: text,
      sender: currentUser.uid,
      time: Date.now()
    });

  input.value = "";
}
</script>

</body>
</html>
