<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f2f2;
    }

    .header {
      background: #1f7a63;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .logout-btn {
      background: red;
      border: none;
      padding: 10px 20px;
      color: white;
      margin-top: 10px;
      border-radius: 5px;
    }

    .container {
      padding: 15px;
    }

    .user-card {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .btn {
      background: #1f7a63;
      color: white;
      padding: 8px 15px;
      border: none;
      border-radius: 5px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="header">
  <h2>TeamUp Global</h2>
  <button class="logout-btn" id="logoutBtn">Logout</button>
</div>

<div class="container">
  <h3>All Users</h3>
  <div id="usersList"></div>
</div>

<!-- ✅ Firebase v10 (MODULAR - CORRECT WAY) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // ✅ YOUR CONFIG (ALREADY FIXED)
  const firebaseConfig = {
    apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
    authDomain: "teamup-68a21.firebaseapp.com",
    projectId: "teamup-68a21",
    storageBucket: "teamup-68a21.firebasestorage.app",
    messagingSenderId: "379106762572",
    appId: "1:379106762572:web:a1537754ed17d3a60339e9",
    measurementId: "G-EJ59MW0TMC"
  };

  // INIT
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUserId = null;

  // ✅ CHECK LOGIN
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "index.html";
    } else {
      currentUserId = user.uid;
      loadUsers();
    }
  });

  // ✅ LOAD USERS
  async function loadUsers() {
    const usersList = document.getElementById("usersList");
    usersList.innerHTML = "";

    const querySnapshot = await getDocs(collection(db, "users"));

    querySnapshot.forEach((doc) => {
      const user = doc.data();

      // ❌ Skip yourself
      if (user.uid === currentUserId) return;

      const name = user.name || "No Name";
      const email = user.email || "No Email";

      usersList.innerHTML += `
        <div class="user-card">
          <strong>${name}</strong><br>
          <small>${email}</small><br>
          <button class="btn">Add Friend</button>
        </div>
      `;
    });
  }

  // ✅ LOGOUT FIXED
  document.getElementById("logoutBtn").addEventListener("click", async () => {
    try {
      await signOut(auth);
      alert("Logged out");
      window.location.href = "index.html";
    } catch (error) {
      alert(error.message);
    }
  });

</script>

</body>
</html>
