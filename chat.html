<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #e5ddd5;
    }

    .header {
      background: #075e54;
      color: white;
      padding: 10px;
      display: flex;
      align-items: center;
    }

    .back {
      font-size: 20px;
      margin-right: 10px;
      cursor: pointer;
    }

    .info {
      display: flex;
      flex-direction: column;
    }

    .name { font-weight: bold; }
    .status { font-size: 12px; color: #ddd; }

    .actionBar {
      display: flex;
      justify-content: space-around;
      padding: 10px;
      background: #fff;
      border-bottom: 1px solid #ccc;
    }

    .actionBar button {
      padding: 8px 15px;
      border: none;
      border-radius: 20px;
      color: white;
    }

    .match { background: green; }
    .reject { background: red; }

    #chatBox {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .message {
      background: white;
      padding: 8px;
      margin: 5px;
      border-radius: 8px;
      max-width: 70%;
    }

    .me {
      background: #dcf8c6;
      margin-left: auto;
    }

    .system {
      text-align: center;
      font-size: 12px;
      color: gray;
    }

    .time {
      font-size: 10px;
      text-align: right;
      color: gray;
    }

    .inputBox {
      display: flex;
      padding: 10px;
      background: #f0f0f0;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      border: none;
      background: #075e54;
      color: white;
      border-radius: 20px;
    }
  </style>
</head>

<body>

<div class="header">
  <span class="back" onclick="history.back()">⬅</span>
  <div class="info">
    <div id="chatTitle" class="name">User</div>
    <div id="status" class="status">offline</div>
  </div>
</div>

<!-- ✅ MATCH / REJECT -->
<div class="actionBar">
  <button class="match" onclick="matchUser()">Match</button>
  <button class="reject" onclick="rejectUser()">Reject</button>
</div>

<div id="chatBox"></div>

<div class="inputBox">
  <input type="text" id="messageInput" placeholder="Type message...">
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.firebasestorage.app",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let myName = localStorage.getItem("myName") || "User" + Math.floor(Math.random()*1000);
localStorage.setItem("myName", myName);

let chatUser = localStorage.getItem("chatUser") || "Public";

document.getElementById("chatTitle").innerText = chatUser;

// STATUS
const myRef = db.ref("status/" + myName);

db.ref(".info/connected").on("value", snap => {
  if (snap.val()) {
    myRef.onDisconnect().set({state:"offline", lastSeen:Date.now()});
    myRef.set({state:"online", lastSeen:Date.now()});
  }
});

db.ref("status/" + chatUser).on("value", snap => {
  const d = snap.val();
  if (!d) return;
  document.getElementById("status").innerText =
    d.state === "online" ? "🟢 online" : "Last seen " + new Date(d.lastSeen).toLocaleTimeString();
});

// CHAT ID
const chatId = myName < chatUser ? myName+"_"+chatUser : chatUser+"_"+myName;
const chatBox = document.getElementById("chatBox");

// SEND
function sendMessage() {
  const input = document.getElementById("messageInput");
  const text = input.value.trim();
  if (!text) return;

  db.ref("messages/"+chatId).push({
    sender: myName,
    text,
    time: Date.now()
  });

  input.value = "";
}

// MATCH
function matchUser() {
  db.ref("messages/"+chatId).push({
    system: true,
    text: "🎉 You matched with " + chatUser,
    time: Date.now()
  });
}

// REJECT
function rejectUser() {
  db.ref("messages/"+chatId).push({
    system: true,
    text: "❌ Chat rejected",
    time: Date.now()
  });

  setTimeout(() => {
    history.back();
  }, 500);
}

// RECEIVE
db.ref("messages/"+chatId).on("child_added", snap => {
  const msg = snap.val();
  const div = document.createElement("div");

  if (msg.system) {
    div.className = "system";
    div.innerText = msg.text;
  } else {
    div.className = "message " + (msg.sender === myName ? "me" : "");
    div.innerHTML = `
      <div>${msg.text}</div>
      <div class="time">${new Date(msg.time).toLocaleTimeString()}</div>
    `;
  }

  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
});
</script>

</body>
</html>
