<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #e5ddd5;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      background: #075e54;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 18px;
    }

    #chatBox {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .message {
      background: white;
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      max-width: 70%;
    }

    .me {
      background: #dcf8c6;
      margin-left: auto;
    }

    .inputBox {
      display: flex;
      padding: 10px;
      background: #f0f0f0;
    }

    .inputBox input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 20px;
      outline: none;
    }

    .inputBox button {
      margin-left: 10px;
      padding: 10px 15px;
      border: none;
      background: #075e54;
      color: white;
      border-radius: 20px;
    }
  </style>
</head>

<body>

  <div class="header" id="chatTitle">Chat</div>

  <div id="chatBox"></div>

  <div class="inputBox">
    <input type="text" id="messageInput" placeholder="Type a message">
    <button onclick="sendMessage()">Send</button>
  </div>

  <script>
    // Get selected user
    const chatUser = localStorage.getItem("chatUser");

    if (!chatUser) {
      alert("No user selected!");
    }

    document.getElementById("chatTitle").innerText = chatUser;

    const chatBox = document.getElementById("chatBox");

    // Load messages
    function loadMessages() {
      chatBox.innerHTML = "";

      const messages = JSON.parse(localStorage.getItem(chatUser)) || [];

      messages.forEach(msg => {
        const div = document.createElement("div");
        div.classList.add("message");

        if (msg.sender === "me") {
          div.classList.add("me");
        }

        div.innerText = msg.text;
        chatBox.appendChild(div);
      });

      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Send message
    function sendMessage() {
      const input = document.getElementById("messageInput");
      const text = input.value.trim();

      if (text === "") return;

      let messages = JSON.parse(localStorage.getItem(chatUser)) || [];

      messages.push({
        sender: "me",
        text: text
      });

      localStorage.setItem(chatUser, JSON.stringify(messages));

      input.value = "";
      loadMessages();
    }

    // Load on start
    loadMessages();
  </script>

</body>
</html>
