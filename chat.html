<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#e5ddd5; }
    .header { background:#075E54; color:white; padding:10px; display:flex; }
    .back { margin-right:10px; cursor:pointer; }
    .chat-box { height:75vh; overflow-y:auto; padding:10px; }
    .msg { padding:10px; margin:5px; border-radius:10px; max-width:70%; }
    .me { background:#dcf8c6; margin-left:auto; }
    .other { background:white; }
    .input-box { display:flex; padding:10px; background:white; }
    input { flex:1; padding:10px; border-radius:20px; border:1px solid #ccc; }
    button { margin-left:10px; padding:10px; background:#075E54; color:white; border:none; border-radius:50%; }
  </style>
</head>

<body>

<div class="header">
  <div class="back" onclick="goBack()">←</div>
  <div id="name"></div>
</div>

<div class="chat-box" id="chatBox"></div>

<div class="input-box">
  <input id="msg" placeholder="Type message...">
  <button onclick="send()">➤</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.firebasestorage.app",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9",
  measurementId: "G-EJ59MW0TMC"
};

firebase.initializeApp(firebaseConfig);

// PROTECT
firebase.auth().onAuthStateChanged(user => {
  if (!user) window.location.href = "index.html";
});

const currentUser = localStorage.getItem("userId");
const friendId = localStorage.getItem("chatUserId");
const friendName = localStorage.getItem("chatUserName");

document.getElementById("name").innerText = friendName;

// UNIQUE CHAT ID
const chatId = [currentUser, friendId].sort().join("_");

// LOAD
function load() {
  const msgs = JSON.parse(localStorage.getItem(chatId)) || [];
  const box = document.getElementById("chatBox");
  box.innerHTML = "";

  msgs.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + (m.sender === currentUser ? "me" : "other");
    div.innerText = m.text;
    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}

// SEND
function send() {
  const text = msg.value;
  if (!text) return;

  const msgs = JSON.parse(localStorage.getItem(chatId)) || [];

  msgs.push({ sender: currentUser, text: text });

  localStorage.setItem(chatId, JSON.stringify(msgs));
  msg.value = "";
  load();
}

// BACK
function goBack() {
  window.location.href = "home.html";
}

setInterval(load, 500);
</script>

</body>
</html>
