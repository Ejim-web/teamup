<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; margin: 0; background: #f2f2f2; }

    header {
      background: #0f6d5b;
      color: white;
      padding: 15px;
      text-align: center;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 5px;
      margin-top: 5px;
    }

    .logout { background: red; color: white; }
    .addBtn { background: #0f6d5b; color: white; }

    .card {
      background: white;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
    }

    #chatBox {
      display: none;
      padding: 10px;
    }

    #messages {
      background: white;
      height: 300px;
      overflow: auto;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<header>
  <h2>TeamUp Global</h2>
  <button class="logout" onclick="logout()">Logout</button>
</header>

<h3 style="padding-left:10px;">Friend Requests</h3>
<div id="requests"></div>

<h3 style="padding-left:10px;">All Users</h3>
<div id="users"></div>

<h3 style="padding-left:10px;">Friends (Click to Chat)</h3>
<div id="friendsList"></div>

<h3 style="padding-left:10px;">Chat</h3>
<div id="chatBox">
  <div id="messages"></div>
  <input id="msgInput" placeholder="Type message..." style="width:70%; padding:10px;">
  <button onclick="sendMessage()">Send</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.firebasestorage.app",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9",
  measurementId: "G-EJ59MW0TMC"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUserId = null;
let currentChatId = null;

auth.onAuthStateChanged(user => {
  if (user) {
    currentUserId = user.uid;

    loadUsers();
    loadRequests();
    loadFriends();
  } else {
    window.location.href = "login.html";
  }
});


// 🔴 LOGOUT
function logout() {
  auth.signOut()
    .then(() => window.location.href = "login.html")
    .catch(err => alert(err.message));
}


// 🔍 LOAD USERS
function loadUsers() {
  const div = document.getElementById("users");

  db.collection("users").onSnapshot(async snapshot => {
    div.innerHTML = "";

    for (const doc of snapshot.docs) {
      if (doc.id === currentUserId) continue;

      const user = doc.data();
      let button = "";

      // check friends
      const friendsSnap = await db.collection("friends")
        .where("users", "array-contains", currentUserId)
        .get();

      let isFriend = false;

      friendsSnap.forEach(f => {
        if (f.data().users.includes(doc.id)) {
          isFriend = true;
        }
      });

      if (isFriend) {
        button = `<button disabled>Friends ✅</button>`;
      } else {

        const requestId = currentUserId + "_" + doc.id;
        const reverseId = doc.id + "_" + currentUserId;

        const sent = await db.collection("friendRequests").doc(requestId).get();
        const received = await db.collection("friendRequests").doc(reverseId).get();

        if (sent.exists) {
          button = `<button disabled>Pending ⏳</button>`;
        } else if (received.exists) {
          button = `<button onclick="acceptRequest('${reverseId}', '${doc.id}')">Accept</button>`;
        } else {
          button = `<button class="addBtn" onclick="sendRequest('${doc.id}')">Add Friend</button>`;
        }
      }

      div.innerHTML += `
        <div class="card">
          <p>${user.name || user.email}</p>
          ${button}
        </div>
      `;
    }
  });
}


// 📤 SEND REQUEST
function sendRequest(toId) {
  const requestId = currentUserId + "_" + toId;

  db.collection("friendRequests").doc(requestId).get().then(doc => {
    if (doc.exists) {
      alert("Already sent");
    } else {
      db.collection("friendRequests").doc(requestId).set({
        from: currentUserId,
        to: toId,
        status: "pending"
      }).then(() => alert("Request sent"));
    }
  });
}


// 📥 LOAD REQUESTS (FIXED)
function loadRequests() {
  const div = document.getElementById("requests");

  db.collection("friendRequests")
    .where("to", "==", currentUserId)
    .onSnapshot(async snapshot => {

      div.innerHTML = "";

      for (const doc of snapshot.docs) {
        const data = doc.data();

        if (data.status !== "pending") continue;

        const userDoc = await db.collection("users").doc(data.from).get();
        const userData = userDoc.data();

        div.innerHTML += `
          <div class="card">
            <p>Request from: ${userData.name || userData.email}</p>
            <button onclick="acceptRequest('${doc.id}', '${data.from}')">Accept</button>
          </div>
        `;
      }
    });
}


// ✅ ACCEPT REQUEST
function acceptRequest(requestId, fromId) {
  const friendId = currentUserId + "_" + fromId;

  db.collection("friends").doc(friendId).set({
    users: [currentUserId, fromId]
  }).then(() => {
    db.collection("friendRequests").doc(requestId).delete();
    alert("Friend added");
  });
}


// 👥 LOAD FRIENDS (CLICK TO CHAT)
function loadFriends() {
  const div = document.getElementById("friendsList");

  db.collection("friends")
    .where("users", "array-contains", currentUserId)
    .onSnapshot(async snapshot => {

      div.innerHTML = "";

      for (const doc of snapshot.docs) {
        const data = doc.data();
        const friendId = data.users.find(id => id !== currentUserId);

        const userDoc = await db.collection("users").doc(friendId).get();
        const userData = userDoc.data();

        div.innerHTML += `
          <div class="card" onclick="openChat('${friendId}')">
            <p>${userData.name || userData.email}</p>
          </div>
        `;
      }
    });
}


// 💬 OPEN CHAT
async function openChat(friendId) {

  const ids = [currentUserId, friendId].sort();
  currentChatId = ids[0] + "_" + ids[1];

  const chatRef = db.collection("chats").doc(currentChatId);
  const chatDoc = await chatRef.get();

  if (!chatDoc.exists) {
    await chatRef.set({
      participants: ids
    });
  }

  document.getElementById("chatBox").style.display = "block";

  loadMessages();
}


// 📥 LOAD MESSAGES
function loadMessages() {
  const div = document.getElementById("messages");

  db.collection("chats")
    .doc(currentChatId)
    .collection("messages")
    .orderBy("time")
    .onSnapshot(snapshot => {

      div.innerHTML = "";

      snapshot.forEach(doc => {
        const msg = doc.data();
        const align = msg.sender === currentUserId ? "right" : "left";

        div.innerHTML += `
          <p style="text-align:${align};">${msg.text}</p>
        `;
      });

      div.scrollTop = div.scrollHeight;
    });
}


// 📤 SEND MESSAGE
function sendMessage() {
  const input = document.getElementById("msgInput");
  const text = input.value;

  if (!text) return;

  db.collection("chats")
    .doc(currentChatId)
    .collection("messages")
    .add({
      text: text,
      sender: currentUserId,
      time: Date.now()
    });

  input.value = "";
}
</script>

</body>
</html>
