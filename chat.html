<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f2f2;
    }

    header {
      background: #0f6d5f;
      color: white;
      padding: 20px;
      text-align: center;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .logout {
      background: red;
      color: white;
      margin-top: 10px;
    }

    .card {
      background: white;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
    }

    .add {
      background: #0f6d5f;
      color: white;
      margin-top: 10px;
    }

    h2 {
      padding: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>TeamUp Global</h1>
  <button class="logout" onclick="logout()">Logout</button>
</header>

<h2>All Users</h2>
<div id="users"></div>

<h2>Friends</h2>
<div id="friends"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.firebasestorage.app",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9",
  measurementId: "G-EJ59MW0TMC"
};

// INIT
const app = firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// LOGOUT
function logout(){
  auth.signOut().then(()=>{
    location.reload();
  });
}

// LOAD USERS
auth.onAuthStateChanged(user => {
  if(user){
    loadUsers(user.uid);
  } else {
    alert("Not logged in");
  }
});

async function loadUsers(currentUserId){
  const usersDiv = document.getElementById("users");
  usersDiv.innerHTML = "";

  const snapshot = await db.collection("users").get();

  snapshot.forEach(doc => {
    const data = doc.data();

    // skip yourself
    if(doc.id === currentUserId) return;

    const name = data.name || data.email || "No Name";

    usersDiv.innerHTML += `
      <div class="card">
        <b>${name}</b><br>
        <button class="add" onclick="addFriend('${doc.id}')">Add Friend</button>
      </div>
    `;
  });
}

// ADD FRIEND
async function addFriend(userId){
  const currentUser = auth.currentUser;

  await db.collection("friendRequests").add({
    from: currentUser.uid,
    to: userId,
    status: "pending"
  });

  alert("Friend request sent!");
}
</script>

</body>
</html>
