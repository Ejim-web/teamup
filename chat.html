<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f2f2;
    }

    .header {
      background: #0f6d5c;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .logout {
      background: red;
      border: none;
      padding: 10px 20px;
      color: white;
      margin-top: 10px;
      border-radius: 5px;
    }

    .card {
      background: white;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
    }

    button {
      padding: 8px 15px;
      border: none;
      border-radius: 5px;
      background: #0f6d5c;
      color: white;
    }

    .pending {
      background: gray;
    }

    .accept {
      background: orange;
    }
  </style>
</head>

<body>

<div class="header">
  <h2>TeamUp Global</h2>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<h3 style="padding:10px;">Friend Requests</h3>
<div id="requests"></div>

<h3 style="padding:10px;">All Users</h3>
<div id="users"></div>

<h3 style="padding:10px;">Friends (Click to Chat)</h3>
<div id="friends"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
  storageBucket: "teamup-68a21.firebasestorage.app",
  messagingSenderId: "379106762572",
  appId: "1:379106762572:web:a1537754ed17d3a60339e9",
  measurementId: "G-EJ59MW0TMC"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser;

auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    currentUser = user;
    loadUsers();
    loadRequests();
    loadFriends();
  }
});

function logout() {
  auth.signOut().then(() => {
    window.location.href = "login.html";
  });
}

/* ================= USERS ================= */

function loadUsers() {
  db.collection("users").get().then(snapshot => {
    const usersDiv = document.getElementById("users");
    usersDiv.innerHTML = "";

    snapshot.forEach(doc => {
      const user = doc.data();
      const uid = doc.id;

      if (uid === currentUser.uid) return;

      checkRelationship(uid, user.name || user.email);
    });
  });
}

/* ================= CHECK RELATION ================= */

function checkRelationship(otherUid, name) {

  // Check if already friends
  db.collection("friends")
    .where("users", "array-contains", currentUser.uid)
    .get()
    .then(snapshot => {

      let isFriend = false;

      snapshot.forEach(doc => {
        if (doc.data().users.includes(otherUid)) {
          isFriend = true;
        }
      });

      if (isFriend) {
        return;
      }

      // Check if I sent request
      db.collection("friendRequests")
        .where("from", "==", currentUser.uid)
        .where("to", "==", otherUid)
        .get()
        .then(sentSnap => {

          if (!sentSnap.empty) {
            renderUser(name, otherUid, "pending");
            return;
          }

          // Check if THEY sent request
          db.collection("friendRequests")
            .where("from", "==", otherUid)
            .where("to", "==", currentUser.uid)
            .get()
            .then(receivedSnap => {

              if (!receivedSnap.empty) {
                renderUser(name, otherUid, "accept", receivedSnap.docs[0].id);
              } else {
                renderUser(name, otherUid, "add");
              }

            });

        });

    });
}

/* ================= RENDER USER ================= */

function renderUser(name, uid, type, requestId = null) {
  const usersDiv = document.getElementById("users");

  let button = "";

  if (type === "add") {
    button = `<button onclick="addFriend('${uid}')">Add Friend</button>`;
  }

  if (type === "pending") {
    button = `<button class="pending">Pending ⏳</button>`;
  }

  if (type === "accept") {
    button = `<button class="accept" onclick="acceptRequest('${requestId}', '${uid}')">Accept</button>`;
  }

  usersDiv.innerHTML += `
    <div class="card">
      ${name}<br><br>
      ${button}
    </div>
  `;
}

/* ================= ADD FRIEND ================= */

function addFriend(uid) {
  db.collection("friendRequests").add({
    from: currentUser.uid,
    to: uid,
    status: "pending"
  }).then(() => {
    alert("Request sent");
    loadUsers();
  });
}

/* ================= LOAD REQUESTS ================= */

function loadRequests() {
  db.collection("friendRequests")
    .where("to", "==", currentUser.uid)
    .where("status", "==", "pending")
    .onSnapshot(snapshot => {

      const div = document.getElementById("requests");
      div.innerHTML = "";

      snapshot.forEach(doc => {
        const data = doc.data();

        div.innerHTML += `
          <div class="card">
            Request from: ${data.from}<br><br>
            <button onclick="acceptRequest('${doc.id}', '${data.from}')">Accept</button>
          </div>
        `;
      });
    });
}

/* ================= ACCEPT ================= */

function acceptRequest(requestId, otherUid) {

  db.collection("friends").add({
    users: [currentUser.uid, otherUid]
  });

  db.collection("friendRequests").doc(requestId).delete();

  loadUsers();
  loadFriends();
}

/* ================= FRIENDS ================= */

function loadFriends() {
  db.collection("friends")
    .where("users", "array-contains", currentUser.uid)
    .onSnapshot(snapshot => {

      const div = document.getElementById("friends");
      div.innerHTML = "";

      snapshot.forEach(doc => {
        const users = doc.data().users;
        const friendId = users.find(u => u !== currentUser.uid);

        div.innerHTML += `
          <div class="card" onclick="openChat('${doc.id}', '${friendId}')">
            Friend: ${friendId}
          </div>
        `;
      });
    });
}

/* ================= CHAT ================= */

function openChat(chatId, friendId) {
  localStorage.setItem("chatId", chatId);
  localStorage.setItem("friendId", friendId);
  window.location.href = "messages.html";
}

</script>

</body>
</html>
