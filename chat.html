<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f2f2;
    }

    header {
      background: #1f6f5e;
      color: white;
      padding: 20px;
      text-align: center;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .logout {
      background: red;
      color: white;
      margin-top: 10px;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .add-btn {
      background: #1f6f5e;
      color: white;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>
  <h2>TeamUp Global</h2>
  <button class="logout" onclick="logout()">Logout</button>
</header>

<div class="container">
  <h3>All Users</h3>
  <div id="users"></div>
</div>

<script>
  // 🔥 YOUR FIREBASE CONFIG (keep yours)
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
  };

  const app = firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // ✅ CHECK LOGIN
  auth.onAuthStateChanged(user => {
    if (!user) {
      window.location.href = "index.html";
    } else {
      loadUsers(user.uid);
    }
  });

  // ✅ LOAD USERS
  function loadUsers(currentUserId) {
    db.collection("users").onSnapshot(snapshot => {
      const usersDiv = document.getElementById("users");
      usersDiv.innerHTML = "";

      snapshot.forEach(doc => {
        const user = doc.data();

        // ❌ Don't show yourself
        if (user.uid === currentUserId) return;

        usersDiv.innerHTML += `
          <div class="card">
            <h4>${user.name || "No Name"}</h4>
            <p>${user.email || "No Email"}</p>
            <button class="add-btn" onclick="addFriend('${user.uid}')">
              Add Friend
            </button>
          </div>
        `;
      });
    });
  }

  // ✅ ADD FRIEND (simple version)
  function addFriend(friendId) {
    const user = auth.currentUser;

    db.collection("friends").add({
      userId: user.uid,
      friendId: friendId
    });

    alert("Friend request sent");
  }

  // ✅ LOGOUT FIX
  function logout() {
    auth.signOut()
      .then(() => {
        window.location.href = "index.html";
      })
      .catch(error => {
        alert("Logout error: " + error.message);
      });
  }
</script>

</body>
</html>
