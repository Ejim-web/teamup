<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Chats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f2f2;
    }

    header {
      background: #075e54;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 18px;
    }

    .chat {
      background: white;
      padding: 15px;
      border-bottom: 1px solid #ddd;
      cursor: pointer;
    }

    .name {
      font-weight: bold;
    }

    .msg {
      color: gray;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>Chats</header>

<div id="chatList">Loading...</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
  authDomain: "teamup-68a21.firebaseapp.com",
  projectId: "teamup-68a21",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUserId = null;

firebase.auth().onAuthStateChanged(async user => {
  if(!user){
    window.location.href = "index.html";
    return;
  }

  currentUserId = user.uid;
  loadChats();
});


// LOAD CHAT LIST
async function loadChats(){
  const list = document.getElementById("chatList");
  list.innerHTML = "";

  const snapshot = await db.collection("chats").get();

  snapshot.forEach(async doc => {
    if(!doc.id.includes(currentUserId)) return;

    const chatId = doc.id;
    const otherUserId = chatId.replace(currentUserId, "").replace("_", "");

    const userDoc = await db.collection("users").doc(otherUserId).get();
    const userData = userDoc.data() || {};

    // LAST MESSAGE
    const msgSnap = await db.collection("chats")
      .doc(chatId)
      .collection("messages")
      .orderBy("timestamp", "desc")
      .limit(1)
      .get();

    let lastMsg = "No messages yet";

    msgSnap.forEach(m => {
      lastMsg = m.data().text;
    });

    list.innerHTML += `
      <div class="chat" onclick="openChat('${chatId}')">
        <div class="name">${userData.name || "Unknown User"}</div>
        <div class="msg">${lastMsg}</div>
      </div>
    `;
  });
}


// OPEN CHAT
function openChat(chatId){
  window.location.href = "chat.html?chatId=" + chatId;
}
</script>

</body>
</html>
