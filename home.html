<!DOCTYPE html>
<html>
<head>
  <title>TeamUp Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f0f0f0;
    }

    .header {
      background: #075e54;
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 20px;
      position: relative;
    }

    .logout {
      position: absolute;
      right: 15px;
      top: 15px;
      background: red;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
    }

    .section {
      padding: 15px;
    }

    .user {
      background: white;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 5px;
      background: #075e54;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="header">
    TeamUp Global
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <div class="section">
    <h3>Friends</h3>
    <div id="friendsList"></div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCk_rTdccHGEr49Zec_eGSJwfOOJPeHYdY",
      authDomain: "teamup-68a21.firebaseapp.com",
      projectId: "teamup-68a21",
      storageBucket: "teamup-68a21.firebasestorage.app",
      messagingSenderId: "379106762572",
      appId: "1:379106762572:web:a1537754ed17d3a60339e9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    firebase.auth().onAuthStateChanged(user => {
      if (!user) {
        location.href = "index.html";
      } else {
        loadFriends();
      }
    });

    // ✅ LOAD FRIENDS (ALL USERS EXCEPT YOU)
    function loadFriends() {
      const user = firebase.auth().currentUser;

      db.collection("users").onSnapshot(snapshot => {
        const list = document.getElementById("friendsList");
        list.innerHTML = "";

        snapshot.forEach(doc => {
          const data = doc.data();
          const uid = doc.id;

          if (uid !== user.uid) {
            const div = document.createElement("div");
            div.className = "user";

            div.innerHTML = `
              <b>${data.name || "User"}</b><br>
              <button onclick="openChat('${uid}', '${data.name || "User"}')">Chat</button>
            `;

            list.appendChild(div);
          }
        });
      });
    }

    // ✅ OPEN CHAT (VERY IMPORTANT FIX)
    function openChat(uid, name) {
      localStorage.setItem("chatUser", uid);
      localStorage.setItem("chatName", name);

      window.location.href = "chat.html";
    }

    // ✅ LOGOUT (FIXED)
    function logout() {
      firebase.auth().signOut().then(() => {
        localStorage.clear();
        location.href = "index.html";
      });
    }
  </script>

</body>
    </html>
